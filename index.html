    const [patientName, medicalId] = patientVal.split('|');
    const teethNumbers = window._selectedDentalTeeth || [];
    if (!teethNumbers.length) { showToast('اختر سنًا واحدًا على الأقل', 'error'); return; }

    const teeth = teethNumbers.map(t => {
        const diag = document.getElementById('dv_diag_'+t)?.value || '';
        const proc = document.getElementById('dv_proc_'+t)?.value || '';
        const notes = document.getElementById('dv_notes_'+t)?.value || '';
        return { tooth: t, name: TOOTH_NAMES[t] || '', diagnosis: diag, procedure: proc, notes };
    });

    APP.dentalVisits = APP.dentalVisits || [];
    const newVisit = {
        id: APP.dentalVisits.length ? Math.max(...APP.dentalVisits.map(v => v.id)) + 1 : 1,
        patientName, medicalId,
        dentist: APP.currentUser?.name || 'طبيب الأسنان',
        date: new Date().toISOString().split('T')[0],
        teeth,
        notes: document.getElementById('dv_notes').value
    };
    APP.dentalVisits.push(newVisit);
    closeModal();
    showToast('تم حفظ الزيارة', 'success');
    saveToFirebase();
    navigateTo('dental');
}

// عرض تفاصيل شريحة
function viewDentalVisitDetails(id) {
    const v = (APP.dentalVisits || []).find(x => x.id === id);
    if (!v) return;
    const teethList = v.teeth.map(t => `<li><strong>سن ${t.tooth} (${t.name})</strong>: ${t.diagnosis || 'لا يوجد'} - ${t.procedure || 'لا إجراء'}</li>`).join('');
    openModal(`
    <div class="modal-header"><h3>تفاصيل زيارة ${v.patientName}</h3></div>
    <div class="p-6">
        <p><strong>التاريخ:</strong> ${v.date} | <strong>الطبيب:</strong> ${v.dentist}</p>
        <h4 class="font-bold mt-3 mb-2">الأسنان المعالجة:</h4>
        <ul class="list-disc pr-5">${teethList}</ul>
        <p class="mt-3 text-sm text-gray-600">${v.notes || ''}</p>
        <button onclick="closeModal()" class="btn-olive mt-4 w-full">إغلاق</button>
    </div>`);
}

// دوال التسعيرة والتقرير المالي (من الأجزاء السابقة، محدثة)
function showDentalPricingModal() {
    let html = APP.dentalPricing.map((dp,i) => `
    <div class="flex gap-2 mb-2"><input id="dprc_proc_${i}" class="input-field flex-1" value="${dp.procedure}"><input id="dprc_price_${i}" type="number" class="input-field w-24" value="${dp.price}"><button onclick="APP.dentalPricing.splice(${i},1);showDentalPricingModal();" class="text-red-500">×</button></div>`).join('');
    html += `<button onclick="APP.dentalPricing.push({procedure:'',price:0});showDentalPricingModal();" class="btn-accent text-sm mt-2">+ إضافة خدمة</button>`;
    openModal(`<div class="modal-header"><h3>تسعيرة الأسنان</h3></div><div class="p-6">${html}<div class="flex gap-2 mt-4"><button onclick="saveDentalPricingFromModal()" class="btn-olive flex-1">حفظ</button><button onclick="closeModal()" class="border px-4 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function saveDentalPricingFromModal() {
    const newList = [];
    APP.dentalPricing.forEach((_, i) => {
        const proc = document.getElementById('dprc_proc_'+i)?.value.trim();
        const price = parseFloat(document.getElementById('dprc_price_'+i)?.value) || 0;
        if (proc) newList.push({ procedure: proc, price });
    });
    APP.dentalPricing = newList;
    closeModal();
    showToast('تم حفظ التسعيرة','success');
    saveToFirebase();
    navigateTo('dental');
}

function downloadDentalReport() {
    const totalRevenue = (APP.dentalVisits || []).reduce((sum, v) => sum + (v.teeth || []).reduce((s, t) => {
        const p = APP.dentalPricing.find(x => x.procedure === t.procedure);
        return s + (p ? p.price : 0);
    }, 0), 0);
    const content = `<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>تقرير مالي عيادة الأسنان</title><style>body{font-family:'Tajawal',sans-serif;padding:40px;background:#f5f5f5}.header{background:linear-gradient(135deg,#556B2F,#3D4A1F);color:white;padding:30px;border-radius:10px;text-align:center;margin-bottom:30px}.header img{width:80px}table{width:100%;border-collapse:collapse;background:white}th,td{padding:10px;border:1px solid #ddd}th{background:#556B2F;color:white}.total{font-size:18px;font-weight:bold;color:#556B2F;text-align:center;margin-top:20px}</style></head><body><div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"><h1>المستشفى السعودي الميداني - العبر</h1><p>تقرير مالي - عيادة الأسنان</p></div><div class="section"><table><tr><th>المريض</th><th>الإجراء</th><th>التاريخ</th><th>السعر (ر.س)</th></tr>${(APP.dentalVisits||[]).map(v=> (v.teeth||[]).map(t=>{ const price=APP.dentalPricing.find(p=>p.procedure===t.procedure); return `<tr><td>${v.patientName}</td><td>${t.procedure||''} (سن ${t.tooth})</td><td>${v.date}</td><td>${price?price.price:0}</td></tr>`; }).join('')).join('')}</table><p class="total">إجمالي الإيرادات: ${totalRevenue} ر.س</p></div><p style="text-align:center;font-size:10px;color:#666">${new Date().toLocaleDateString('ar-SA')}</p></body></html>`;
    const blob = new Blob([content], {type:'text/html'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'تقرير_مالي_أسنان.html'; a.click();
    showToast('تم تحميل التقرير المالي', 'success');
}

// ==================== العلاج الطبيعي ====================
function renderTherapy(c) {
    if (!APP.therapySessions) APP.therapySessions = [];
    const today = new Date().toISOString().split('T')[0];
    const sessions = APP.therapySessions || [];
    const todaySessions = sessions.filter(s => s.date === today);

    c.innerHTML = `
    <div class="fade-in">
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h2 class="font-bold text-xl text-olive"><i data-lucide="activity" class="w-6 h-6 inline"></i> العلاج الطبيعي</h2>
            <button onclick="showAddTherapySessionModal()" class="btn-olive px-4 py-2 rounded-lg text-sm">+ جلسة جديدة</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="stats-card"><p class="text-xs">جلسات اليوم</p><p class="text-2xl font-bold text-olive">${todaySessions.length}</p></div>
            <div class="stats-card"><p class="text-xs">إجمالي الجلسات</p><p class="text-2xl font-bold text-olive">${sessions.length}</p></div>
            <div class="stats-card"><p class="text-xs">البرامج النشطة</p><p class="text-2xl font-bold text-olive">8</p></div>
        </div>
        <div class="flex gap-2 mb-4">
            <label class="text-sm font-bold">التاريخ:</label>
            <input type="date" id="therapyDateFilter" class="input-field w-40" value="${today}" onchange="filterTherapySessions()">
            <button onclick="document.getElementById('therapyDateFilter').value='';filterTherapySessions();" class="text-xs text-accent">عرض الكل</button>
        </div>
        <div id="therapySessionsList" class="space-y-3">${renderTherapyCards(todaySessions)}</div>
    </div>`;
    lucide.createIcons();
}

function renderTherapyCards(sessions) {
    if (!sessions.length) return '<p class="text-gray-400 text-center py-8">لا توجد جلسات لهذا اليوم</p>';
    return sessions.map(s => `
    <div class="bg-white rounded-xl border p-4 card-hover">
        <div class="flex justify-between">
            <div>
                <p class="font-bold text-olive">${s.patientName}</p>
                <p class="text-xs text-gray-500">البرنامج: ${s.program}</p>
                <p class="text-xs text-gray-400">${s.date} | المعالج: ${s.therapist}</p>
            </div>
            <span class="badge bg-green-100 text-success text-xs">مكتملة</span>
        </div>
        ${s.notes ? `<p class="text-xs text-gray-600 mt-2">${s.notes}</p>` : ''}
    </div>`).join('');
}

function filterTherapySessions() {
    const date = document.getElementById('therapyDateFilter').value;
    let filtered = APP.therapySessions || [];
    if (date) filtered = filtered.filter(s => s.date === date);
    document.getElementById('therapySessionsList').innerHTML = renderTherapyCards(filtered);
    lucide.createIcons();
}

function showAddTherapySessionModal() {
    const programs = ['علاج طبيعي للظهر','تأهيل إصابات رياضية','علاج طبيعي للركبة','تأهيل ما بعد الجراحة','علاج طبيعي للرقبة','تمارين تقوية عامة','علاج طبيعي للكتف','تأهيل عصبي'];
    openModal(`
    <div class="modal-header"><h3>جلسة علاج طبيعي جديدة</h3></div>
    <div class="p-6">
        <input id="tp_patient_search" class="input-field mb-2" placeholder="🔍 بحث عن مريض..." oninput="searchTherapyPatient()">
        <select id="tp_patient" class="input-field mb-3" size="4"></select>
        <select id="tp_program" class="input-field mb-3">${programs.map(p=>'<option>'+p+'</option>').join('')}</select>
        <textarea id="tp_notes" class="input-field" rows="2" placeholder="ملاحظات الجلسة..."></textarea>
        <div class="flex gap-2 mt-6"><button onclick="addTherapySession()" class="btn-olive px-6 py-2 rounded-lg flex-1">إضافة</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div>
    </div>`);
    searchTherapyPatient();
}

function searchTherapyPatient() {
    const filter = document.getElementById('tp_patient_search').value.toLowerCase();
    const list = document.getElementById('tp_patient');
    const patients = filter ? APP.patients.filter(p => p.name.includes(filter) || p.medicalId.includes(filter)) : APP.patients;
    list.innerHTML = patients.map(p => `<option value="${p.name}|${p.medicalId}">${p.name} (${p.medicalId})</option>`).join('');
}

function addTherapySession() {
    const patientVal = document.getElementById('tp_patient').value;
    if (!patientVal) { showToast('اختر مريضاً', 'error'); return; }
    const [patientName] = patientVal.split('|');
    APP.therapySessions.push({
        id: Date.now(),
        patientName,
        program: document.getElementById('tp_program').value,
        notes: document.getElementById('tp_notes').value,
        therapist: APP.currentUser?.name || 'المعالج',
        date: new Date().toISOString().split('T')[0]
    });
    closeModal();
    showToast('تمت إضافة الجلسة', 'success');
    saveToFirebase();
    navigateTo('therapy');
}
</script>

// ==================== دوال الموظفين (موجودة مسبقاً، التأكيد عليها) ====================
function showAddEmployeeModal() {
    openModal(`
    <div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3>إضافة موظف جديد</h3></div></div>
    <div class="p-6">

            <input id="ne_name" class="input-field" placeholder="الاسم الكامل *">
            <input id="ne_empid" class="input-field" placeholder="المعرف الوظيفي *">
            <select id="ne_dept" class="input-field"><option>الإدارة</option><option>الأطباء</option><option>التمريض</option><option>الصيدلة</option><option>الأشعة</option><option>المختبرات</option><option>عيادة الأسنان</option><option>العلاج الطبيعي</option></select>
            <input id="ne_position" class="input-field" placeholder="المنصب">
            <input id="ne_phone" class="input-field" placeholder="الهاتف">
            <input id="ne_education" class="input-field" placeholder="المؤهل العلمي">
            <input id="ne_joindate" type="date" class="input-field" value="${new Date().toISOString().split('T')[0]}">
            <input id="ne_salary" type="number" class="input-field" placeholder="الراتب (ر.س)">
            <select id="ne_contract" class="input-field"><option>دوام كامل</option><option>دوام جزئي</option><option>عقد مؤقت</option><option>استشاري</option></select>
        </div>
        <div class="flex gap-2 mt-6"><button onclick="addEmployee()" class="btn-olive px-6 py-2 rounded-lg flex-1">إضافة</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div>
    </div>`);
}

function addEmployee() {
    const name = document.getElementById('ne_name').value.trim();
    const empId = document.getElementById('ne_empid').value.trim();
    if (!name || !empId) { showToast('الاسم والمعرف مطلوبان', 'error'); return; }
    APP.employees.push({
        id: ++APP.nextId.employee, name, empId,
        dept: document.getElementById('ne_dept').value,
        position: document.getElementById('ne_position').value,
        phone: document.getElementById('ne_phone').value,
        education: document.getElementById('ne_education').value,
        joinDate: document.getElementById('ne_joindate').value,
        salary: document.getElementById('ne_salary').value,
        contractType: document.getElementById('ne_contract').value,
        status: 'نشط'
    });
    closeModal(); showToast('تم إضافة الموظف', 'success'); saveToFirebase(); navigateTo('hr');
}

function editEmployee(id) {
    const emp = APP.employees.find(e => e.id === id); if (!emp) return;
    openModal(`<div class="modal-header"><h3>تعديل - ${emp.name}</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input id="ee_name" class="input-field" value="${emp.name}"><input id="ee_phone" class="input-field" value="${emp.phone || ''}">
        <input id="ee_education" class="input-field" value="${emp.education || ''}"><input id="ee_salary" type="number" class="input-field" value="${emp.salary || ''}">
        <select id="ee_status" class="input-field"><option ${emp.status==='نشط'?'selected':''}>نشط</option><option ${emp.status==='غير نشط'?'selected':''}>غير نشط</option></select>
    </div><div class="flex gap-2 mt-6"><button onclick="updateEmployee(${id})" class="btn-olive flex-1">حفظ</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`);
}

function updateEmployee(id) {
    const emp = APP.employees.find(e => e.id === id); if (!emp) return;
    emp.name = document.getElementById('ee_name').value;
    emp.phone = document.getElementById('ee_phone').value;
    emp.education = document.getElementById('ee_education').value;
    emp.salary = document.getElementById('ee_salary').value;
    emp.status = document.getElementById('ee_status').value;
    closeModal(); showToast('تم التحديث', 'success'); saveToFirebase(); navigateTo('hr');
}

function viewEmployeeContract(id) {
    const emp = APP.employees.find(e => e.id === id); if (!emp) return;
    openModal(`<div class="modal-header"><h3>عقد العمل - ${emp.name}</h3></div><div class="p-6"><div class="grid grid-cols-2 gap-4 text-sm">
        <div><span class="text-gray-500">الاسم:</span><p class="font-bold">${emp.name}</p></div><div><span class="text-gray-500">المعرف:</span><p class="font-bold">${emp.empId}</p></div>

function renderAttendanceTable() {
    const date = document.getElementById('attDate').value;
    const records = (APP.attendanceRecords || []).filter(r => r.date === date);
    const employees = APP.employees.filter(e => e.status === 'نشط');
    const container = document.getElementById('attendanceTableContainer');
    let html = '<table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>الموظف</th><th>الحالة</th><th>وقت الحضور</th><th>وقت الانصراف</th></tr></thead><tbody>';
    employees.forEach(emp => {
        const rec = records.find(r => r.empId === emp.id);
        const status = rec ? rec.status : 'حاضر';
        const checkIn = rec ? rec.checkIn : '';
        const checkOut = rec ? rec.checkOut : '';
        html += `<tr>
            <td class="p-2">${emp.name} (${emp.empId})</td>
            <td class="p-2"><select id="att_status_${emp.id}" class="input-field text-xs"><option value="حاضر" ${status==='حاضر'?'selected':''}>حاضر</option><option value="غائب" ${status==='غائب'?'selected':''}>غائب</option><option value="متأخر" ${status==='متأخر'?'selected':''}>متأخر</option><option value="إجازة" ${status==='إجازة'?'selected':''}>إجازة</option></select></td>
            <td class="p-2"><input id="att_in_${emp.id}" type="time" class="input-field text-xs" value="${checkIn}"></td>
            <td class="p-2"><input id="att_out_${emp.id}" type="time" class="input-field text-xs" value="${checkOut}"></td>
        </tr>`;
    });

    container.innerHTML = html;
}

function saveAttendance() {
    const date = document.getElementById('attDate').value;
    APP.employees.filter(e => e.status === 'نشط').forEach(emp => {
        const status = document.getElementById('att_status_'+emp.id)?.value || 'حاضر';
        const checkIn = document.getElementById('att_in_'+emp.id)?.value || '';
        const checkOut = document.getElementById('att_out_'+emp.id)?.value || '';
        const existing = (APP.attendanceRecords || []).find(r => r.empId === emp.id && r.date === date);
        if (existing) {
            existing.status = status; existing.checkIn = checkIn; existing.checkOut = checkOut;
        } else {
            APP.attendanceRecords.push({ id: Date.now()+Math.random(), empId: emp.id, date, status, checkIn, checkOut });
        }
    });
    closeModal(); showToast('تم حفظ الحضور','success'); saveToFirebase();
}

    openModal(`<div class="modal-header"><h3>حاسبة الخصومات</h3></div><div class="p-6">

            <div><label class="text-sm">إلى تاريخ</label><input id="calc_end" type="date" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div>
            <div><label class="text-sm">الخصم عن كل يوم غياب (ر.س)</label><input id="calc_deduction" type="number" class="input-field" value="${APP.hrSettings.absenceDeductionPerDay}"></div>
        </div>
        <button onclick="calculateDeductions()" class="btn-olive w-full py-2 rounded-lg mb-4">احسب</button>
        <div id="calcResult" class="bg-gray-50 rounded-lg p-4"></div>
        <button onclick="printDeductionReport()" id="calcPrintBtn" class="btn-accent w-full py-2 rounded-lg mt-2 hidden">🖨 طباعة التقرير</button>
    </div>`);
}

function calculateDeductions() {
    const empId = parseInt(document.getElementById('calc_emp').value);
    const start = document.getElementById('calc_start').value;
    const end = document.getElementById('calc_end').value;
    const deductionPerDay = parseFloat(document.getElementById('calc_deduction').value) || APP.hrSettings.absenceDeductionPerDay;
    if (!empId || !start || !end) { showToast('املأ الحقول','error'); return; }
    const emp = APP.employees.find(e => e.id === empId);
    if (!emp) return;
    const records = (APP.attendanceRecords || []).filter(r => r.empId === empId && r.date >= start && r.date <= end);
    const totalDays = records.length;
    const presentDays = records.filter(r => r.status === 'حاضر' || r.status === 'متأخر').length;
    const absentDays = records.filter(r => r.status === 'غائب').length;
    const leaveDays = records.filter(r => r.status === 'إجازة').length;
    const deduction = absentDays * deductionPerDay;
    const container = document.getElementById('calcResult');
    container.innerHTML = `
        <p><strong>الموظف:</strong> ${emp.name} (${emp.empId})</p>
        <p><strong>الفترة:</strong> ${start} - ${end}</p>
        <p>📅 إجمالي أيام مسجلة: <strong>${totalDays}</strong></p>
        <p>✅ حضور: <strong>${presentDays}</strong></p>
        <p>❌ غياب: <strong>${absentDays}</strong></p>
        <p>🏖️ إجازة: <strong>${leaveDays}</strong></p>
        <p>💰 الخصم المستحق: <strong>${deduction} ر.س</strong></p>
    `;
    document.getElementById('calcPrintBtn').classList.remove('hidden');
    window._lastDeductionData = { emp, start, end, totalDays, presentDays, absentDays, leaveDays, deduction };
}

function printDeductionReport() {
    const d = window._lastDeductionData;
    if (!d) return;
    const win = window.open('','_blank','width=700,height=600');
    win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>تقرير خصومات</title><style>body{font-family:'Tajawal',sans-serif;padding:30px}.header{text-align:center;border-bottom:2px solid #556B2F;padding-bottom:20px;margin-bottom:20px}.header img{width:60px}table{width:100%;border-collapse:collapse}td,th{padding:10px;border:1px solid #ddd}th{background:#556B2F;color:white;width:40%}</style></head><body><div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"><h2>المستشفى السعودي الميداني - العبر</h2><h3>تقرير الخصومات</h3></div><table><tr><th>الموظف</th><td>${d.emp.name} (${d.emp.empId})</td></tr><tr><th>الفترة</th><td>${d.start} - ${d.end}</td></tr><tr><th>أيام الحضور</th><td>${d.presentDays}</td></tr><tr><th>أيام الغياب</th><td>${d.absentDays}</td></tr><tr><th>أيام الإجازة</th><td>${d.leaveDays}</td></tr><tr><th>الخصم المستحق</th><td>${d.deduction} ر.س</td></tr></table><p style="text-align:center;font-size:10px;margin-top:30px">${new Date().toLocaleDateString('ar-SA')}</p><script>window.print();<\/script></body></html>`);

function updateStatDates() {
    const type = document.getElementById('stat_type').value;
    const today = new Date();
    let start, end;
    if (type === 'monthly') {
        start = new Date(today.getFullYear(), today.getMonth(), 1);
        end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    } else if (type === 'semiannual') {
        const half = today.getMonth() < 6 ? 0 : 1;
        start = new Date(today.getFullYear(), half * 6, 1);
        end = new Date(today.getFullYear(), half * 6 + 5, new Date(today.getFullYear(), half * 6 + 6, 0).getDate());
    } else if (type === 'annual') {
        start = new Date(today.getFullYear(), 0, 1);
        end = new Date(today.getFullYear(), 11, 31);
    } else {
        start = new Date(today.getFullYear(), today.getMonth(), 1);
        end = today;
    }
    document.getElementById('stat_start').value = start.toISOString().split('T')[0];
    document.getElementById('stat_end').value = end.toISOString().split('T')[0];
}

function generateStatisticsReport() {

    const end = document.getElementById('stat_end').value;
    const dept = document.getElementById('stat_dept').value;
    const startDate = new Date(start), endDate = new Date(end);
    
    // جمع البيانات
    let patients = APP.patients.filter(p => { const d = new Date(p.visitDate); return d >= startDate && d <= endDate; });
    if (dept !== 'all') patients = patients.filter(p => p.dept === dept);
    const appointments = APP.appointments.filter(a => { const d = new Date(a.date); return d >= startDate && d <= endDate; });
    const prescriptions = APP.prescriptions.filter(p => { const d = new Date(p.date); return d >= startDate && d <= endDate; });
    const dispensed = APP.pharmacyDispenses.filter(d => { const dt = new Date(d.date); return dt >= startDate && dt <= endDate; });
    const labResults = APP.labResults.filter(l => { const d = new Date(l.date); return d >= startDate && d <= endDate; });
    const radiologyResults = APP.radiologyResults.filter(r => { const d = new Date(r.date); return d >= startDate && d <= endDate; });
    const dentalVisits = (APP.dentalVisits || []).filter(v => { const d = new Date(v.date); return d >= startDate && d <= endDate; });
    const vitalSigns = (APP.vitalSigns || []).filter(v => { const d = new Date(v.date); return d >= startDate && d <= endDate; });
    const nursingTasks = (APP.nursingTasks || []).filter(t => { const d = new Date(t.date); return d >= startDate && d <= endDate; });
    
    // الإيرادات

function exportFullReportCSV() {
    const rows = [
        ['القسم', 'العدد'],
        ['المرضى', APP.patients.length],
        ['المواعيد', APP.appointments.length],
        ['الوصفات', APP.prescriptions.length],
        ['الوصفات المصروفة', APP.pharmacyDispenses.length],
        ['فحوصات مختبر', APP.labResults.length],
        ['فحوصات أشعة', APP.radiologyResults.length],
        ['إجراءات أسنان', (APP.dentalVisits || []).length],
        ['جلسات علاج طبيعي', (APP.therapySessions || []).length],
        ['الموظفون', APP.employees.length],
        ['المستخدمون', APP.users.length]
    ];
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'تقرير_شامل_' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    showToast('تم تصدير التقرير الشامل', 'success');
}

        </div>
        <textarea id="vs_notes" class="input-field mt-3" rows="2" placeholder="ملاحظات..."></textarea>
        <div class="flex gap-2 mt-6">
            <button onclick="saveVitalSigns(${patientId})" class="btn-olive px-6 py-2 rounded-lg flex-1">حفظ</button>
            <button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button>
        </div>
    </div>`);
}

function saveVitalSigns(patientId) {
    const vitals = {
        id: Date.now(),
        patientId,
        nurse: APP.currentUser?.name || 'ممرض',
        date: new Date().toISOString(),
        temperature: document.getElementById('vs_temp').value,
        bloodPressure: document.getElementById('vs_bp').value,
        heartRate: document.getElementById('vs_hr').value,
        respiratoryRate: document.getElementById('vs_rr').value,
        spo2: document.getElementById('vs_spo2').value,
        notes: document.getElementById('vs_notes').value
    };
    APP.vitalSigns = APP.vitalSigns || [];
    APP.vitalSigns.push(vitals);
    closeModal();
    showToast('تم تسجيل العلامات الحيوية', 'success');
    saveToFirebase();
}

// ==================== إعطاء دواء ====================
function openNursingDrugModal() {
    const pending = APP.prescriptions.filter(p => !p.dispensed);
    if (!pending.length) { showToast('لا توجد أدوية معلقة', 'warning'); return; }
    openModal(`
    <div class="modal-header"><h3>إعطاء دواء</h3></div>
    <div class="p-6">
        <select id="ad_prescription_select" class="input-field mb-3">
            <option value="">-- اختر الوصفة --</option>
            ${pending.map(pr => `<option value="${pr.id}">${pr.patient} - ${pr.meds}</option>`).join('')}
        </select>
        <div class="flex gap-2 mt-4">
            <button onclick="loadAdminForm()" class="btn-olive flex-1">متابعة</button>
            <button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button>
        </div>
    </div>`);
}

function loadAdminForm() {
    const prescId = document.getElementById('ad_prescription_select').value;
    if (!prescId) { showToast('اختر وصفة', 'error'); return; }
    closeModal();
    administerDrug(parseInt(prescId));
}

function administerDrug(prescriptionId) {
    const pr = APP.prescriptions.find(x => x.id === prescriptionId);
    if (!pr) return;
    openModal(`
    <div class="modal-header"><h3>إعطاء دواء - ${pr.patient}</h3></div>
    <div class="p-6">
        <p class="text-sm mb-3"><strong>الوصفة:</strong> ${pr.meds}</p>
        <div class="grid grid-cols-2 gap-3">
            <input id="ad_time" type="time" class="input-field" value="${new Date().toTimeString().slice(0,5)}">
            <input id="ad_dose" class="input-field" placeholder="الجرعة المعطاة">
        </div>
        <textarea id="ad_notes" class="input-field mt-3" rows="2" placeholder="ملاحظات..."></textarea>
        <div class="flex gap-2 mt-6">
            <button onclick="confirmDrugAdmin(${prescriptionId})" class="btn-olive flex-1">تأكيد</button>
            <button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button>
        </div>
    </div>`);
}

function confirmDrugAdmin(prescriptionId) {
    APP.drugAdministrations = APP.drugAdministrations || [];
    APP.drugAdministrations.push({
        id: Date.now(),
        prescriptionId,
        nurse: APP.currentUser?.name,
        time: document.getElementById('ad_time').value,
        dose: document.getElementById('ad_dose').value,
        notes: document.getElementById('ad_notes').value,
        date: new Date().toISOString().split('T')[0]
    });
    closeModal();
    showToast('تم تسجيل إعطاء الدواء', 'success');
    saveToFirebase();
}

// ==================== إكمال مهمة تمريضية ====================
function completeNursingTask(taskId) {
    const task = (APP.nursingTasks || []).find(t => t.id === taskId);
    if (!task) return;
    task.status = 'completed';
    task.completedBy = APP.currentUser?.name;
    task.completedDate = new Date().toISOString().split('T')[0];
    showToast('تم إكمال المهمة', 'success');
    saveToFirebase();
    navigateTo('nursing');
}
</script>
<script>
// ==================== تهيئة النظام النهائية ====================
(function() {
    // ضبط التاريخ الحالي في الشريط العلوي
    const updateCurrentDate = () => {
        const el = document.getElementById('currentDate');
        if (el) el.textContent = new Date().toLocaleDateString('ar-SA', { weekday:'short', month:'short', day:'numeric' });
    };
    updateCurrentDate();

    // التأكد من تعريف showModernConfirm
    if (typeof showModernConfirm !== 'function') {
        window.showModernConfirm = function(msg, onYes, onNo) {
            showConfirm(msg, onYes, onNo);
        };
    }

    // التأكد من تهيئة Firebase عند تحميل الصفحة
    if (typeof syncFromFirebase === 'function') {
        syncFromFirebase();
    } else {
        console.warn('Firebase sync function not found');
    }

    // مستمع النقر على المودال
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // مستمع النقر خارج إشعارات التنبيهات
    document.addEventListener('click', function(e) {
        const notifDropdown = document.getElementById('notifDropdown');
        if (notifDropdown && !e.target.closest('#notifDropdown') && !e.target.closest('[onclick*="toggleNotifications"]')) {
            notifDropdown.classList.add('hidden');
        }
    });

    // تعريف دالة filterTable إن لم تكن موجودة
    if (typeof filterTable !== 'function') {
        window.filterTable = function(inputId, tableId) {
            const filter = document.getElementById(inputId).value.toUpperCase();
            Array.from(document.getElementById(tableId).querySelectorAll('tbody tr')).forEach(row => {
                row.style.display = Array.from(row.cells).some(cell => cell.textContent.toUpperCase().includes(filter)) ? '' : 'none';
            });
        };
    }

    // التأكد من وجود دالة togglePasswordVisibility
    if (typeof togglePasswordVisibility !== 'function') {
        window.togglePasswordVisibility = function(inputId, btn) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                if (icon) icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                if (icon) icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        };
    }

    // التأكد من أن العناصر الناقصه تمتلك قيماً بدئية
    if (!APP.nextId) APP.nextId = { patient:1001, employee:1, med:1, appointment:1, prescription:1, labResult:1, radiologyResult:1, dental:1, radiologyRequest:1 };
    if (!APP.purchaseOrders) APP.purchaseOrders = [];
    if (!APP.dentalVisits) APP.dentalVisits = [];
    if (!APP.therapySessions) APP.therapySessions = [];
    if (!APP.nursingTasks) APP.nursingTasks = [];
    if (!APP.vitalSigns) APP.vitalSigns = [];
    if (!APP.labRequests) APP.labRequests = [];
    if (!APP.radiologyResults) APP.radiologyResults = [];
    if (!APP.drugAdministrations) APP.drugAdministrations = [];

    // تحديث حالة زر تسجيل الدخول بعد التأكد من Firebase
    setTimeout(() => {
        if (APP.dataReady) {
            enableLoginButton();
        }
            }, 500);

    // أيقونات initial
    lucide.createIcons();
})();
</script>
</body>
  </html>

  <div id="app" class="h-full w-full flex flex-col">
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2"></div>
    <div id="app-content" class="flex-1 flex flex-col overflow-hidden"></div>
    <div id="global-loading" class="fixed inset-0 bg-black/20 z-[10000] hidden items-center justify-center backdrop-blur-sm">
      <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-2xl flex items-center gap-3">
        <div class="loading-spinner"></div>
        <span class="text-sm font-medium">جاري التحميل...</span>
      </div>
    </div>

  <script>
    // ---------- Global State & Helpers ----------
    window.HMS = {
      currentUser: null,
      userRole: null,
      userData: null,
      departments: [],
      deathTypes: [],
      cache: { patients: null, employees: null, inventory: null, appointments: null }
    };

    const LOCAL_PREFIX = 'hms_cache_';
    const CACHE_TTL = 5 * 60 * 1000;

    function setLocalCache(key, data) {
      try { localStorage.setItem(LOCAL_PREFIX + key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
    }
    function getLocalCache(key) {
      try {
        const raw = localStorage.getItem(LOCAL_PREFIX + key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (Date.now() - parsed.ts < CACHE_TTL) return parsed.data;
        localStorage.removeItem(LOCAL_PREFIX + key);
      } catch(e) {}
      return null;
    }

    window.showToast = (msg, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast px-5 py-3 rounded-xl text-white text-sm font-medium ${
        type === 'success' ? 'bg-olive-600' : (type === 'error' ? 'bg-red-600' : 'bg-gray-800')
      }`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    };

    window.showLoading = (show) => {
      document.getElementById('global-loading').classList.toggle('hidden', !show);
    };

    window.toggleDark = () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('hms_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    };

    (function initTheme() {
      if (localStorage.getItem('hms_theme') === 'dark') document.documentElement.classList.add('dark');
    })();

    const dbRef = (path) => window.firebaseDB.ref(window.db, path);
    const dbGet = async (path) => (await window.firebaseDB.get(dbRef(path))).val();
    const dbSet = (path, data) => window.firebaseDB.set(dbRef(path), data);
    const dbPush = (path, data) => window.firebaseDB.push(dbRef(path), data);
    const dbUpdate = (path, data) => window.firebaseDB.update(dbRef(path), data);
    const dbRemove = (path) => window.firebaseDB.remove(dbRef(path));

    window.dbGet = dbGet; window.dbSet = dbSet; window.dbPush = dbPush;
    window.dbUpdate = dbUpdate; window.dbRemove = dbRemove;

    window.closeModal = (id) => { const modal = document.getElementById(id); if (modal) modal.remove(); };

    window.logout = async () => {
      try {
        await window.firebaseAuth.signOut(window.auth);
        window.HMS.currentUser = null; window.HMS.userRole = null; window.HMS.userData = null;
        Object.keys(window.HMS.cache).forEach(k => window.HMS.cache[k] = null);
      } catch(e) { showToast('خطأ في تسجيل الخروج', 'error'); }
    };

    async function loadDepartments() {
      const cached = getLocalCache('departments');
      if (cached) { window.HMS.departments = cached; return; }
      const depts = await dbGet('departments');
      if (depts) {
        window.HMS.departments = Object.entries(depts).map(([key, val]) => ({ key, ...val }));
      } else {
        window.HMS.departments = [
          { key:'emergency', label:'الطوارئ', icon:'🚑', color:'#ef4444' },
          { key:'inpatient', label:'التنويم', icon:'🛏️', color:'#06b6d4' },
          { key:'internal', label:'الباطنية', icon:'💊', color:'#10b981' },
          { key:'surgery', label:'الجراحة', icon:'🔪', color:'#3b82f6' },
          { key:'cardiology', label:'القلب', icon:'❤️', color:'#ef4444' },
          { key:'pediatrics', label:'الأطفال', icon:'🧸', color:'#f59e0b' }
        ];
        await dbSet('departments', Object.fromEntries(window.HMS.departments.map(d => [d.key, {label:d.label,icon:d.icon,color:d.color}])));
      }
      setLocalCache('departments', window.HMS.departments);
    }

    async function loadDeathTypes() {
      const deaths = await dbGet('deathTypes');
      if (deaths) {
        window.HMS.deathTypes = Object.entries(deaths).map(([key, val]) => ({ key, ...val }));
      } else {
        window.HMS.deathTypes = [
          { key:'natural', label:'طبيعية', icon:'⚫', color:'#6b7280' },
          { key:'accident', label:'حوادث', icon:'🔴', color:'#dc2626' }
        ];
        await dbSet('deathTypes', Object.fromEntries(window.HMS.deathTypes.map(d => [d.key, {label:d.label,icon:d.icon,color:d.color}])));
      }
    }
    window.loadDepartments = loadDepartments;
    window.loadDeathTypes = loadDeathTypes;
  </script>

  <script>
    // ---------- Authentication & Login ----------
    window.renderLoginPage = () => {
      const appContent = document.getElementById('app-content');
      appContent.innerHTML = `
        <div class="min-h-full flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8">
          <div class="max-w-md w-full space-y-8">
            <div class="text-center">
              <div class="mx-auto h-24 w-24 rounded-2xl bg-gradient-to-br from-olive-100 to-gold-100 dark:from-gray-700 dark:to-gray-600 p-1 shadow-lg">
                <img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="شعار المستشفى" class="h-full w-full object-contain rounded-xl bg-white p-1" onerror="this.style.background='linear-gradient(135deg,#5f673d,#d9a825)';this.alt='الشعار';">
              </div>
              <h2 class="mt-6 text-3xl font-extrabold text-olive-800 dark:text-olive-100">نظام إدارة المستشفى</h2>
              <p class="mt-2 text-sm text-olive-600 dark:text-olive-400">المستشفى السعودي الميداني - العبر</p>
            </div>
            <form class="mt-8 space-y-6" id="login-form" onsubmit="return false;">
              <div class="space-y-4">
                <div>
                  <label for="email" class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
                  <input id="email" name="email" type="email" autocomplete="email" required class="w-full px-4 py-3 border border-olive-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 focus:ring-2 focus:ring-olive-500 focus:border-transparent transition" placeholder="أدخل بريدك الإلكتروني">
                </div>
                <div>
                  <label for="password" class="block text-sm font-medium mb-1">كلمة المرور</label>
                  <input id="password" name="password" type="password" autocomplete="current-password" required class="w-full px-4 py-3 border border-olive-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 focus:ring-2 focus:ring-olive-500 focus:border-transparent transition" placeholder="********">
                </div>
              </div>
              <div>
                <button type="submit" id="login-btn" class="group relative w-full flex justify-center py-3.5 px-4 text-sm font-bold rounded-xl text-white bg-gradient-to-r from-olive-600 to-olive-700 hover:from-olive-700 hover:to-olive-800 shadow-md transition-all">
                  <i data-lucide="log-in" class="w-5 h-5 ml-2"></i>
                  تسجيل الدخول
                </button>
              </div>
              <p class="text-xs text-center text-gray-500 dark:text-gray-400">الدخول مخصص للموظفين المسجلين في قاعدة البيانات</p>
            </form>
          </div>
        </div>
      `;
      lucide.createIcons();

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> جاري الدخول...';
        try {
          const userCredential = await window.firebaseAuth.signInWithEmailAndPassword(window.auth, email, password);
          const user = userCredential.user;
          let userData = await dbGet(`users/${user.uid}`);
          if (!userData) {
            userData = {
              email: user.email,
              fullName: user.email.split('@')[0],
              role: 'Admin',
              department: 'الإدارة',
              createdAt: new Date().toISOString()
            };
            await dbSet(`users/${user.uid}`, userData);
          }
          window.HMS.currentUser = user;
          window.HMS.userData = userData;
          window.HMS.userRole = userData.role;
          renderMainApp('dashboard');
        } catch (error) {
          let msg = 'فشل تسجيل الدخول';
          if (error.code === 'auth/user-not-found') msg = 'المستخدم غير موجود';
          else if (error.code === 'auth/wrong-password') msg = 'كلمة المرور خاطئة';
          else if (error.code === 'auth/invalid-email') msg = 'بريد إلكتروني غير صالح';
          else if (error.code === 'auth/too-many-requests') msg = 'محاولات كثيرة. حاول لاحقاً.';
          showToast(msg, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5 ml-2"></i> تسجيل الدخول';
          lucide.createIcons();
        }
      });
    };

    window.createAdminUser = async (email, password, fullName) => {
      try {
        const userCredential = await window.firebaseAuth.createUserWithEmailAndPassword(window.auth, email, password);
        const user = userCredential.user;
        await dbSet(`users/${user.uid}`, {
          email, fullName, role: 'Admin', department: 'الإدارة', createdAt: new Date().toISOString()
        });
        showToast('تم إنشاء المدير بنجاح', 'success');
      } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    };
  </script>

  <script>
    window.renderMainApp = async (activePage = 'dashboard', subParams = null) => {
      const userData = window.HMS.userData;
      const role = window.HMS.userRole;
      const appContent = document.getElementById('app-content');

      const navItems = [
        { id: 'dashboard', label: 'لوحة التحكم', icon: 'layout-dashboard', roles: ['Admin', 'Doctor', 'Nurse', 'Accountant', 'HR Manager', 'Pharmacist', 'Receptionist'] },
        { id: 'patients', label: 'المرضى والعيادات', icon: 'users', roles: ['Admin', 'Doctor', 'Nurse', 'Receptionist'] },
        { id: 'departments', label: 'الأقسام الطبية', icon: 'building', roles: ['Admin', 'Doctor', 'Nurse'] },
        { id: 'pharmacy', label: 'الصيدلية والمستودع', icon: 'pill', roles: ['Admin', 'Pharmacist'] },
        { id: 'hr', label: 'الموارد البشرية', icon: 'briefcase', roles: ['Admin', 'HR Manager'] },
        { id: 'reports', label: 'التقارير', icon: 'file-text', roles: ['Admin', 'Doctor', 'Accountant', 'HR Manager'] },
        { id: 'admin', label: 'الإدارة', icon: 'settings', roles: ['Admin'] },
        { id: 'users', label: 'إدارة المستخدمين', icon: 'shield', roles: ['Admin'] }
      ];

      const filteredNav = navItems.filter(item => item.roles.includes(role));

      let html = `
        <header class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md shadow-sm border-b border-olive-200/50 dark:border-gray-700/50 sticky top-0 z-50">
          <div class="w-full px-4 md:px-6 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="شعار المستشفى" class="w-10 h-10 md:w-11 md:h-11 rounded-xl object-contain bg-white shadow-sm">
              <div>
                <h1 class="text-base md:text-xl font-bold text-olive-800 dark:text-olive-100">نظام إدارة المستشفى</h1>
                <p class="text-xs text-olive-600 dark:text-olive-400">${userData.fullName} · ${role}</p>
              </div>
            </div>
            <div class="flex items-center gap-1 md:gap-2">
              <button onclick="toggleDark()" class="p-2.5 rounded-xl bg-olive-100/70 dark:bg-gray-700/70 hover:bg-olive-200 dark:hover:bg-gray-600 transition">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i><i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
              </button>
              <button onclick="logout()" class="hidden md:flex items-center gap-1.5 px-4 py-2.5 rounded-xl text-sm font-semibold bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/50 transition">
                <i data-lucide="log-out" class="w-4 h-4"></i> خروج
              </button>
            </div>
          </div>
          <nav class="w-full px-3 md:px-5 pb-2.5 flex gap-1.5 overflow-x-auto scroll-smooth">
      `;

      filteredNav.forEach(item => {
        html += `<button onclick="navigateTo('${item.id}')" data-nav="${item.id}" class="nav-btn px-4 py-2 rounded-xl text-xs md:text-sm font-semibold whitespace-nowrap bg-olive-100/60 dark:bg-gray-700/60 text-olive-700 dark:text-gray-200 hover:bg-olive-200 dark:hover:bg-gray-600 transition">
          <i data-lucide="${item.icon}" class="w-3.5 h-3.5 md:w-4 md:h-4 inline ml-1.5"></i> ${item.label}
        </button>`;
      });

      html += `
          </nav>
        </header>
        <main class="flex-1 w-full overflow-auto p-4 md:p-6" id="main-content"></main>
        <footer class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm border-t border-olive-200/50 dark:border-gray-700/50 py-3 px-4 text-center text-xs text-olive-500 dark:text-olive-400">
          جميع الحقوق محفوظة للمستشفى السعودي الميداني - العبر © 2026
        </footer>
      `;

      appContent.innerHTML = html;
      lucide.createIcons();

      await loadPageContent(activePage, subParams);

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('bg-olive-600', 'text-white', 'shadow-sm');
        btn.classList.add('bg-olive-100/60', 'dark:bg-gray-700/60', 'text-olive-700', 'dark:text-gray-200');
      });
      const activeBtn = document.querySelector(`[data-nav="${activePage}"]`);
      if (activeBtn) {
        activeBtn.classList.add('bg-olive-600', 'text-white', 'shadow-sm');
        activeBtn.classList.remove('bg-olive-100/60', 'dark:bg-gray-700/60', 'text-olive-700', 'dark:text-gray-200');
      }
    };

    window.navigateTo = (page, subParams) => {
      renderMainApp(page, subParams);
    };

    window.loadPageContent = async (page, params) => {
      const mainContent = document.getElementById('main-content');
      mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;

      if (page === 'dashboard') {
        const role = window.HMS.userRole;
        if (role === 'Receptionist') await renderReceptionistDashboard();
        else if (role === 'Doctor') await renderDoctorDashboard();
        else if (role === 'Nurse') await renderNurseDashboard();
        else await renderAdminDashboard();
      } else if (page === 'patients') {
        await renderPatientsPage(params);
      } else if (page === 'departments') {
        await renderDepartmentsPage();
      } else if (page === 'pharmacy') {
        await renderPharmacyPage();
      } else if (page === 'hr') {
        await renderHRPage();
      } else if (page === 'reports') {
        await renderReportsPage();
      } else if (page === 'admin') {
        await renderAdminPage();
      } else if (page === 'users') {
        await renderUsersPage();
      } else {
        mainContent.innerHTML = `<div class="p-8 text-center text-gray-500">الصفحة غير موجودة</div>`;
      }
    };
  </script>

  <script>
    async function renderAdminDashboard() {
      const mainContent = document.getElementById('main-content');
      await loadDepartments();
      showLoading(true);
      try {
        const patients = await dbGet('patients') || {};
        const employees = await dbGet('employees') || {};
        const appointments = await dbGet('appointments') || {};
        const today = new Date().toISOString().split('T')[0];
        const todayApps = Object.values(appointments).filter(a => a.date === today);
        const patientsCount = Object.keys(patients).length;
        const employeesCount = Object.keys(employees).length;

        let html = `
          <div class="space-y-6 fade-in">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <div class="card-hover bg-white dark:bg-gray-800 rounded-2xl p-5 border border-olive-200/40 dark:border-gray-700/60 shadow-sm">

          </div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-5 shadow-sm">

            <form id="quick-appointment-form" onsubmit="return false;" class="space-y-3">
              <select id="appointment-patient" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></select>
              <input type="date" id="appointment-date" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700">

            </form>
          </div>
        </div>
      `;
      const patients = await dbGet('patients') || {};
      const users = await dbGet('users') || {};
      const patientSelect = document.getElementById('appointment-patient');
      const doctorSelect = document.getElementById('appointment-doctor');
      patientSelect.innerHTML = '<option value="">اختر مريضاً</option>' + Object.entries(patients).map(([id, p]) => `<option value="${id}">${p.fullName}</option>`).join('');
      const doctors = Object.entries(users).filter(([id, u]) => u.role === 'Doctor');
      doctorSelect.innerHTML = '<option value="">اختر طبيباً</option>' + doctors.map(([id, u]) => `<option value="${id}">${u.fullName}</option>`).join('');
      document.getElementById('quick-patient-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const patient = Object.fromEntries(fd.entries()); patient.registeredAt = new Date().toISOString();
        await dbPush('patients', patient); showToast('تم تسجيل المريض', 'success'); e.target.reset();

        const patientId = document.getElementById('appointment-patient').value;

      });
      lucide.createIcons();
    }

  <script>
    async function renderDoctorDashboard() {
      const mainContent = document.getElementById('main-content');
      const doctorId = window.HMS.currentUser.uid;
      const doctorName = window.HMS.userData?.fullName || 'الطبيب';
      mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
      const today = new Date().toISOString().split('T')[0];
      const appointmentsSnapshot = await window.firebaseDB.get(window.firebaseDB.query(window.firebaseDB.ref(window.db, 'appointments'), window.firebaseDB.orderByChild('doctorId'), window.firebaseDB.equalTo(doctorId)));
      const todaysAppointments = [], waitingPatients = [];
      if (appointmentsSnapshot.exists()) {
        const apps = appointmentsSnapshot.val();
        Object.entries(apps).forEach(([id, app]) => { if (app.date === today && app.status !== 'completed') { todaysAppointments.push({ id, ...app }); if (app.status === 'waiting') waitingPatients.push({ id, ...app }); } });
      }
      const patients = await dbGet('patients') || {};
      mainContent.innerHTML = `
        <div class="space-y-5 fade-in">
          <div class="flex items-center justify-between"><h2 class="text-xl font-bold flex items-center"><i data-lucide="stethoscope" class="w-6 h-6 ml-2 text-olive-600"></i> لوحة تحكم الطبيب - د. ${doctorName}</h2></div>
          <div class="grid grid-cols-3 gap-4"><div class="bg-white dark:bg-gray-800 rounded-xl p-4 border shadow-sm"><span class="text-xs text-gray-500">مواعيد اليوم</span><p class="text-2xl font-bold">${todaysAppointments.length}</p></div><div class="bg-white dark:bg-gray-800 rounded-xl p-4 border shadow-sm"><span class="text-xs text-gray-500">قيد الانتظار</span><p class="text-2xl font-bold text-amber-600">${waitingPatients.length}</p></div><div class="bg-white dark:bg-gray-800 rounded-xl p-4 border shadow-sm"><span class="text-xs text-gray-500">مرضى الأسبوع</span><p class="text-2xl font-bold" id="weekly-count">-</p></div></div>
          <div class="grid md:grid-cols-2 gap-5">
            <div class="bg-white dark:bg-gray-800 rounded-xl border p-4 shadow-sm"><h3 class="font-bold mb-3 flex"><i data-lucide="calendar" class="w-4 h-4 ml-1"></i> جدول اليوم</h3><div class="space-y-2 max-h-96 overflow-y-auto" id="doctor-today-appointments"></div></div>
            <div class="bg-white dark:bg-gray-800 rounded-xl border p-4 shadow-sm"><h3 class="font-bold mb-3 flex"><i data-lucide="users" class="w-4 h-4 ml-1"></i> المرضى المنتظرين</h3><div class="space-y-2" id="doctor-waiting"></div></div>
          </div>
        </div>
      `;
      const todayDiv = document.getElementById('doctor-today-appointments');
      const waitingDiv = document.getElementById('doctor-waiting');
      todayDiv.innerHTML = todaysAppointments.length === 0 ? '<p class="text-center py-4 text-gray-500">لا توجد مواعيد</p>' : todaysAppointments.sort((a,b)=> (a.time||'').localeCompare(b.time||'')).map(app => { const p = patients[app.patientId] || { fullName: 'مريض' }; return `<div class="border rounded-lg p-3 flex justify-between items-center"><div><span class="font-bold">${p.fullName}</span><br><span class="text-xs">${app.time||''}</span></div><span class="px-2 py-1 rounded-full text-xs ${app.status==='confirmed'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${app.status==='confirmed'?'مؤكد':'انتظار'}</span><button onclick="startConsultation('${app.patientId}')" class="text-olive-600 text-sm"><i data-lucide="stethoscope" class="w-4 h-4"></i> بدء الكشف</button></div>`; }).join('');
      waitingDiv.innerHTML = waitingPatients.length === 0 ? '<p class="text-center py-4 text-gray-500">لا يوجد مرضى منتظرين</p>' : waitingPatients.map(app => { const p = patients[app.patientId] || { fullName: 'مريض' }; return `<div class="border rounded-lg p-3 flex justify-between items-center bg-amber-50 dark:bg-amber-900/20"><div><span class="font-bold">${p.fullName}</span><br><span class="text-xs">${app.time||''}</span></div><button onclick="startConsultation('${app.patientId}')" class="px-3 py-1 bg-olive-600 text-white rounded-lg text-xs">استدعاء</button></div>`; }).join('');
      const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
      const weekApps = Object.values(appointmentsSnapshot.val() || {}).filter(a => a.date >= weekAgo);
      document.getElementById('weekly-count').textContent = new Set(weekApps.map(a => a.patientId)).size;
      lucide.createIcons();
    }
    window.startConsultation = (patientId) => { viewPatient(patientId); };

    async function renderNurseDashboard() {
      const mainContent = document.getElementById('main-content');
      const nurseDept = window.HMS.userData?.department || 'الطوارئ';
      mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
      const admissions = await dbGet('admissions') || {};
      const patients = await dbGet('patients') || {};
      const deptPatients = Object.entries(admissions).filter(([id, adm]) => adm.department === nurseDept && adm.status === 'active');
      const vitalsList = [];
      for (let [admId, adm] of deptPatients) {
        const patientVitals = await dbGet(`medicalRecords/${adm.patientId}/vitals`);
        const latest = patientVitals ? Object.entries(patientVitals).sort((a,b) => (b[1].date||'').localeCompare(a[1].date||''))[0] : null;
        vitalsList.push({ patientId: adm.patientId, admission: adm, latestVital: latest ? latest[1] : null });
      }
      mainContent.innerHTML = `
        <div class="space-y-5 fade-in">
          <h2 class="text-xl font-bold flex items-center"><i data-lucide="heart" class="w-6 h-6 ml-2 text-red-500"></i> لوحة تحكم الممرض - قسم ${nurseDept}</h2>
          <div class="grid grid-cols-2 gap-4"><div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">المرضى في القسم</span><p class="text-2xl font-bold">${deptPatients.length}</p></div><div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">تنبيهات الأدوية</span><p class="text-2xl font-bold text-orange-500">0</p></div></div>
          <div class="bg-white dark:bg-gray-800 rounded-xl border p-4"><h3 class="font-bold mb-3">المرضى وآخر العلامات</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>المريض</th><th>الغرفة</th><th>ضغط</th><th>نبض</th><th>حرارة</th><th></th></tr></thead><tbody>${vitalsList.map(v => { const p = patients[v.patientId] || { fullName: 'مريض' }; return `<tr><td>${p.fullName}</td><td>${v.admission.room||'-'}</td><td>${v.latestVital?.bloodPressure||'-'}</td><td>${v.latestVital?.pulse||'-'}</td><td>${v.latestVital?.temperature||'-'}</td><td><button onclick="viewPatient('${v.patientId}')" class="text-olive-600"><i data-lucide="activity" class="w-4"></i></button></td></tr>`; }).join('')}</tbody></table></div></div>
        </div>
      `;
      lucide.createIcons();
    }
  </script>

      });
      tbody.innerHTML = html;
      lucide.createIcons();

    window.viewPatient = async (patientId) => {

    window.switchPatientTab = async (tab, patientId) => {
      document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active', 'border-olive-600', 'text-olive-600', 'dark:text-olive-300'); });

      const role = window.HMS.userRole;
      const canEdit = ['Admin', 'Doctor'].includes(role);
      const canAddVitals = ['Admin', 'Doctor', 'Nurse'].includes(role);
      
      if (tab === 'visits') {
        const visits = (await dbGet(`medicalRecords/${patientId}/visits`)) || {};
        contentDiv.innerHTML = await renderVisitsTab(patientId, visits, canEdit);
      } else if (tab === 'vitals') {
        const vitals = (await dbGet(`medicalRecords/${patientId}/vitals`)) || {};
        contentDiv.innerHTML = await renderVitalsTab(patientId, vitals, canAddVitals);
      } else if (tab === 'prescriptions') {
        const prescriptions = (await dbGet(`medicalRecords/${patientId}/prescriptions`)) || {};
        contentDiv.innerHTML = await renderPrescriptionsTab(patientId, prescriptions, canEdit);
      }
      lucide.createIcons();
    };

    async function renderVisitsTab(patientId, visits, canEdit) {
      let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">سجل الزيارات</h3>`;
      if (canEdit) html += `<button onclick="showAddVisitModal('${patientId}')" class="px-4 py-2 bg-gradient-to-r from-olive-600 to-olive-700 text-white rounded-xl text-sm font-bold shadow-sm"><i data-lucide="plus" class="w-4 h-4 inline ml-1"></i> إضافة زيارة</button>`;
      html += `</div>`;
      if (Object.keys(visits).length === 0) return html + `<div class="text-center py-12 text-gray-500"><i data-lucide="clipboard" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>لا توجد زيارات مسجلة</div>`;
      html += `<div class="space-y-4">`;
      Object.entries(visits).sort((a,b) => (b[1].date || '').localeCompare(a[1].date || '')).forEach(([vid, visit]) => {
        html += `<div class="border border-olive-200 dark:border-gray-700 rounded-xl p-4 bg-olive-50/30 dark:bg-gray-700/30"><div class="flex justify-between items-start"><span class="font-bold text-lg">${visit.date || '—'}</span><span class="text-sm bg-olive-100 dark:bg-gray-600 px-3 py-1 rounded-full">د. ${visit.doctor || ''}</span></div>

        ${visit.notes ? `<p class="mt-2 text-sm text-gray-600 dark:text-gray-400">${visit.notes}</p>` : ''}</div>`;
      });
      return html + `</div>`;
    }

    async function renderVitalsTab(patientId, vitals, canAdd) {
      let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">العلامات الحيوية</h3>`;

      html += `</div>`;
      if (Object.keys(vitals).length === 0) return html + `<div class="text-center py-12 text-gray-500"><i data-lucide="heart" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>لا توجد قراءات</div>`;

      return html + `</tbody></table></div>`;

      const color = document.getElementById('edit-dept-color').value;

      await loadDepartments();
      renderDepartmentsList();
      closeModal('edit-dept-modal');
      showToast('تم تحديث القسم', 'success');
    };

    window.deleteDepartment = async (key) => {
      if (!confirm('هل أنت متأكد من حذف هذا القسم؟')) return;
      await dbRemove(`departments/${key}`);
      await loadDepartments();
      renderDepartmentsList();
      showToast('تم حذف القسم', 'success');

    async function loadAppointmentsForCalendar() {
      const container = document.getElementById('appointments-calendar');
      container.innerHTML = `<div class="loading-spinner mx-auto"></div>`;
      const apps = await dbGet('appointments');
      if (!apps) { container.innerHTML = '<p class="text-center py-6 text-gray-500">لا توجد مواعيد</p>'; return; }
      const today = new Date().toISOString().split('T')[0];
      const todayApps = Object.entries(apps).filter(([id, a]) => a.date === today);
      if (todayApps.length === 0) { container.innerHTML = '<p class="text-center py-6 text-gray-500">لا توجد مواعيد اليوم</p>'; return; }
      const patients = await dbGet('patients') || {};
      const users = await dbGet('users') || {};
      let html = '<div class="grid gap-2">';
      todayApps.forEach(([id, app]) => {
        const patient = patients[app.patientId] || { fullName: 'مريض' };
        const doctor = users[app.doctorId] || { fullName: 'طبيب' };
        html += `<div class="flex items-center justify-between p-3 bg-olive-50 dark:bg-gray-700/30 rounded-lg"><div><span class="font-medium">${patient.fullName}</span><br><span class="text-xs">د. ${doctor.fullName}</span></div><div><span class="text-sm">${app.time || ''}</span><span class="mr-2 px-2 py-1 rounded-full text-xs ${app.status==='confirmed'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${app.status==='confirmed'?'مؤكد':'انتظار'}</span></div></div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }
  </script>

    async function renderPharmacyPage() {

    async function loadInventory() {
      const tbody = document.getElementById('inventory-table');
      const alertsDiv = document.getElementById('inventory-alerts');
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6"><div class="loading-spinner mx-auto"></div></td></tr>`;
      
      let inventory = window.HMS.cache.inventory;
      if (!inventory) {
        inventory = await dbGet('inventory') || {};
        window.HMS.cache.inventory = inventory;
      }
      const items = Object.entries(inventory);
      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500"><i data-lucide="pill" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>المخزون فارغ</td></tr>`;
        lucide.createIcons();
        return;
      }
      
      const today = new Date();
      const alerts = [];
      let html = '';
      items.sort((a,b) => (a[1].name || '').localeCompare(b[1].name || '')).forEach(([id, med]) => {
        const expiry = med.expiryDate ? new Date(med.expiryDate) : null;
        const isExpired = expiry && expiry < today;
        const isLow = med.quantity <= (med.minQuantity || 10);
        if (isExpired) alerts.push(`⚠️ ${med.name} منتهي الصلاحية`);
        else if (isLow) alerts.push(`📦 ${med.name} منخفض المخزون (${med.quantity})`);
        
        html += `<tr class="hover:bg-olive-50/50"><td class="py-2 px-3 font-medium">${med.name || med.tradeName}</td>
          <td class="py-2 px-3 ${isLow ? 'text-amber-600 font-bold' : ''}">${med.quantity || 0}</td>
          <td class="py-2 px-3">${med.price || 0} ريال</td>
          <td class="py-2 px-3 ${isExpired ? 'text-red-600' : ''}">${med.expiryDate || '—'}</td>
          <td class="py-2 px-3"><button onclick="editMedicine('${id}')" class="text-olive-600 p-1"><i data-lucide="edit" class="w-4 h-4"></i></button></td></tr>`;
      });
      tbody.innerHTML = html;
      
      if (alerts.length > 0) {
        alertsDiv.innerHTML = `<div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl p-3 text-sm">${alerts.map(a => `<div class="flex items-center gap-1"><i data-lucide="alert-triangle" class="w-4 h-4 text-amber-600"></i> ${a}</div>`).join('')}</div>`;
      } else {
        alertsDiv.innerHTML = '';
      }
      lucide.createIcons();
    }

    window.filterInventory = () => {
      const term = document.getElementById('inventory-search')?.value.toLowerCase() || '';
      const rows = document.querySelectorAll('#inventory-table tr');
      rows.forEach(row => {
        const name = row.querySelector('td')?.textContent.toLowerCase() || '';
        row.style.display = name.includes(term) ? '' : 'none';
      });
    };

    async function loadPendingPrescriptions() {
      const container = document.getElementById('pending-prescriptions');
      container.innerHTML = `<div class="loading-spinner mx-auto"></div>`;
      const prescriptions = await dbGet('prescriptions') || {};
      const pending = Object.entries(prescriptions).filter(([id, p]) => p.status === 'pending');
      if (pending.length === 0) {
        container.innerHTML = `<div class="text-center py-10 text-gray-500"><i data-lucide="clipboard-check" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>لا توجد وصفات معلقة</div>`;
        lucide.createIcons();
        return;
      }
      const patients = await dbGet('patients') || {};
      let html = '';
      pending.forEach(([id, p]) => {
        const patient = patients[p.patientId] || { fullName: 'مريض' };
        html += `<div class="border rounded-xl p-4 bg-amber-50/30 dark:bg-gray-700/30"><div class="flex justify-between"><span class="font-bold">${patient.fullName}</span><span class="text-xs">${p.date || ''}</span></div>
          <p class="mt-1"><span class="font-semibold">الدواء:</span> ${p.medication}</p><p><span class="font-semibold">الجرعة:</span> ${p.dosage}</p>
          <button onclick="dispensePrescription('${id}')" class="mt-3 w-full py-2 bg-gradient-to-r from-olive-600 to-olive-700 text-white rounded-lg text-sm font-bold">صرف الدواء</button></div>`;
      });
      container.innerHTML = html;
    }

    window.dispensePrescription = async (prescriptionId) => {
      showLoading(true);
      try {
        const prescription = (await dbGet(`prescriptions/${prescriptionId}`)) || {};
        const inventory = await dbGet('inventory') || {};
        const medEntry = Object.entries(inventory).find(([id, m]) => m.name === prescription.medication);
        if (!medEntry) { showToast('الدواء غير موجود في المخزون', 'error'); return; }
        const [medId, med] = medEntry;
        if (med.quantity < 1) { showToast('الكمية غير كافية', 'error'); return; }
        await dbUpdate(`inventory/${medId}`, { quantity: med.quantity - 1 });
        await dbUpdate(`prescriptions/${prescriptionId}`, { status: 'dispensed', dispensedAt: new Date().toISOString() });
        showToast('تم صرف الدواء بنجاح', 'success');
        window.HMS.cache.inventory = null;
        await loadInventory();
        await loadPendingPrescriptions();
      } catch(e) { showToast('حدث خطأ', 'error'); }
      finally { showLoading(false); }
    };

    window.showAddMedicineModal = () => {

              <div><label>الكمية</label><input name="quantity" type="number" value="0" required class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الحد الأدنى للتنبيه</label><input name="minQuantity" type="number" value="10" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>سعر الوحدة</label><input name="price" type="number" step="0.01" value="0" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>تاريخ الانتهاء</label><input name="expiryDate" type="date" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-olive-600 to-olive-700 text-white font-bold">حفظ</button>
              <button type="button" onclick="closeModal('med-modal')" class="flex-1 py-3 rounded-xl border">إلغاء</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('add-med-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const med = Object.fromEntries(fd.entries());
        med.quantity = Number(med.quantity);
        med.minQuantity = Number(med.minQuantity);
        med.price = Number(med.price);

        window.HMS.cache.inventory = null;
        showToast('تمت إضافة الدواء', 'success');
        closeModal('med-modal');
        await loadInventory();
      });
    };

      const med = (await dbGet(`inventory/${id}`)) || {};
      const modal = document.createElement('div');
      modal.id = 'edit-med-modal';
      modal.className = 'fixed inset-0 bg-black/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-md w-full shadow-2xl">
          <h3 class="font-bold text-xl mb-4">تعديل الدواء</h3>
          <form id="edit-med-form" onsubmit="return false;">
            <div class="space-y-3">
              <div><label>اسم الدواء</label><input name="name" value="${med.name || ''}" required class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الاسم التجاري</label><input name="tradeName" value="${med.tradeName || ''}" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الكمية</label><input name="quantity" type="number" value="${med.quantity || 0}" required class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الحد الأدنى</label><input name="minQuantity" type="number" value="${med.minQuantity || 10}" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>سعر الوحدة</label><input name="price" type="number" step="0.01" value="${med.price || 0}" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>تاريخ الانتهاء</label><input name="expiryDate" type="date" value="${med.expiryDate || ''}" class="w-full px-4 py-2.5 border rounded-xl bg-white dark:bg-gray-700"></div>
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-olive-600 to-olive-700 text-white font-bold">حفظ</button>
              <button type="button" onclick="closeModal('edit-med-modal')" class="flex-1 py-3 rounded-xl border">إلغاء</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('edit-med-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const updated = Object.fromEntries(fd.entries());

        updated.price = Number(updated.price);

      const tbody = document.getElementById('employees-table');

      `;

        e.preventDefault();
        const fd = new FormData(e.target);
        const emp = Object.fromEntries(fd.entries());
        emp.baseSalary = Number(emp.baseSalary) || 0;
        const newRef = await dbPush('employees', emp);
        emp.id = newRef.key;
        if (window.HMS.cache.employees) window.HMS.cache.employees[newRef.key] = emp;
        showToast('تم إضافة الموظف', 'success');
        closeModal('emp-modal');
        await loadEmployees();
      });
    };

    window.editEmployee = async (id) => {
      const emp = (await dbGet(`employees/${id}`)) || {};
      const modal = document.createElement('div');
      modal.id = 'edit-emp-modal';
      modal.className = 'fixed inset-0 bg-black/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-3xl w-full shadow-2xl">
          <h3 class="font-bold text-xl mb-5">تعديل بيانات الموظف</h3>
          <form id="edit-emp-form" onsubmit="return false;">
            <div class="grid grid-cols-2 gap-4">
              <div><label>الاسم الكامل</label><input name="fullName" value="${emp.fullName || ''}" required class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الرقم الوظيفي</label><input name="employeeId" value="${emp.employeeId || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>القسم</label><input name="department" value="${emp.department || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>المسمى الوظيفي</label><input name="jobTitle" value="${emp.jobTitle || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>تاريخ التعيين</label><input name="hireDate" type="date" value="${emp.hireDate || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>الراتب الأساسي</label><input name="baseSalary" type="number" value="${emp.baseSalary || 0}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>رقم الهاتف</label><input name="phone" value="${emp.phone || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label>البريد الإلكتروني</label><input name="email" value="${emp.email || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div class="col-span-2"><label>المؤهل العلمي</label><input name="qualification" value="${emp.qualification || ''}" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-olive-600 to-olive-700 text-white font-bold">حفظ</button>
              <button type="button" onclick="closeModal('edit-emp-modal')" class="flex-1 py-3 rounded-xl border">إلغاء</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('edit-emp-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const updated = Object.fromEntries(fd.entries());
        updated.baseSalary = Number(updated.baseSalary) || 0;
        await dbUpdate(`employees/${id}`, updated);
        if (window.HMS.cache.employees) window.HMS.cache.employees[id] = updated;
        showToast('تم تحديث الموظف', 'success');
        closeModal('edit-emp-modal');

    window.deleteEmployee = async (id) => {
      if (!confirm('حذف الموظف؟')) return;
      await dbRemove(`employees/${id}`);

      showToast('تم الحذف', 'success');

    window.showSalaryManagement = async () => {
      const mainContent = document.getElementById('main-content');
      mainContent.innerHTML = `<div class="p-4"><div class="loading-spinner mx-auto"></div></div>`;
      const employees = await dbGet('employees') || {};
      const month = new Date().toLocaleDateString('ar-SA', {month:'long', year:'numeric'});
      let html = `
        <div class="space-y-5">
          <div class="flex items-center gap-3"><button onclick="navigateTo('hr')" class="p-2 rounded-lg bg-olive-100 dark:bg-gray-700"><i data-lucide="arrow-right" class="w-5 h-5"></i></button><h2 class="font-bold text-xl">إدارة الرواتب - ${month}</h2></div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-5 shadow-sm">
            <table class="w-full text-sm"><thead><tr><th>الموظف</th><th>الأساسي</th><th>البدلات</th><th>الخصومات</th><th>الصافي</th><th>الحالة</th><th></th></tr></thead><tbody id="salary-table"></tbody></table>
            <button onclick="processPayroll()" class="mt-4 px-5 py-2.5 bg-gradient-to-r from-olive-600 to-olive-700 text-white rounded-xl font-bold">تأكيد صرف الرواتب</button>
          </div>
        </div>`;
      mainContent.innerHTML = html;
      const tbody = document.getElementById('salary-table');
      let rows = '';
      for (const [id, emp] of Object.entries(employees)) {
        const net = (emp.baseSalary || 0) + (emp.allowances || 0) - (emp.deductions || 0);
        rows += `<tr><td>${emp.fullName}</td><td>${emp.baseSalary || 0}</td><td><input id="allow-${id}" value="${emp.allowances || 0}" class="w-20 border rounded px-2 py-1"></td><td><input id="deduct-${id}" value="${emp.deductions || 0}" class="w-20 border rounded px-2 py-1"></td><td id="net-${id}">${net}</td><td><span class="px-2 py-1 bg-gray-200 dark:bg-gray-600 rounded text-xs">معلق</span></td><td><button onclick="saveSalaryAdjustment('${id}')" class="text-olive-600">حفظ</button></td></tr>`;
      }
      tbody.innerHTML = rows;
      lucide.createIcons();
    };

    window.saveSalaryAdjustment = async (empId) => {
      const allowances = Number(document.getElementById(`allow-${empId}`).value) || 0;
      const deductions = Number(document.getElementById(`deduct-${empId}`).value) || 0;
      const emp = (await dbGet(`employees/${empId}`)) || {};
      const base = emp.baseSalary || 0;
      const net = base + allowances - deductions;
      await dbUpdate(`employees/${empId}`, { allowances, deductions });
      document.getElementById(`net-${empId}`).textContent = net;
      showToast('تم حفظ التعديلات', 'success');
    };

    window.processPayroll = async () => {
      const employees = await dbGet('employees') || {};
      const month = new Date().toISOString().slice(0,7);
      for (const [id, emp] of Object.entries(employees)) {
        const net = (emp.baseSalary || 0) + (emp.allowances || 0) - (emp.deductions || 0);
        await dbSet(`salaries/${month}/${id}`, {
          employeeId: id, employeeName: emp.fullName, base: emp.baseSalary, allowances: emp.allowances||0, deductions: emp.deductions||0, net, status: 'paid', paidAt: new Date().toISOString()
        });
      }
      showToast('تم صرف الرواتب بنجاح', 'success');
      navigateTo('hr');
    };

    window.showLeaveManagement = () => showToast('واجهة الإجازات قيد التطوير', 'info');
  </script>

  <script>
    async function renderUsersPage() {
      const mainContent = document.getElementById('main-content');
      mainContent.innerHTML = `
        <div class="space-y-5 fade-in">
          <div class="flex justify-between"><h2 class="font-bold text-xl flex items-center"><i data-lucide="shield" class="w-6 h-6 ml-2 text-olive-600"></i> إدارة المستخدمين</h2><button onclick="showAddUserModal()" class="px-4 py-2 bg-gradient-to-r from-olive-600 to-olive-700 text-white rounded-xl"><i data-lucide="user-plus" class="w-4 h-4 inline ml-1"></i> إضافة مستخدم</button></div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-5 shadow-sm overflow-x-auto">
            <table class="w-full text-sm"><thead><tr><th>البريد</th><th>الاسم</th><th>الدور</th><th>القسم</th><th></th></tr></thead><tbody id="users-table-body"></tbody></table>
          </div>
        </div>`;
      await loadUsersList();

    async function loadUsersList() {
      const users = await dbGet('users') || {};
      const tbody = document.getElementById('users-table-body');
      if (Object.keys(users).length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8">لا يوجد مستخدمون</td></tr>';
        return;
      }
      let html = '';
      for (const [uid, u] of Object.entries(users)) {
        html += `<tr><td>${u.email}</td><td>${u.fullName}</td><td>${u.role}</td><td>${u.department||''}</td><td><button onclick="deleteUser('${uid}')" class="text-red-500"><i data-lucide="trash-2" class="w-4"></i></button></td></tr>`;
      }
      tbody.innerHTML = html;
      lucide.createIcons();
    }

    window.showAddUserModal = () => {
      const modal = document.createElement('div');
      modal.id = 'add-user-modal';
      modal.className = 'fixed inset-0 bg-black/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-md w-full">
          <h3 class="font-bold text-xl mb-4">إضافة مستخدم</h3>
          <form id="add-user-form" onsubmit="return false;">
            <div class="space-y-3">
              <input name="email" type="email" placeholder="البريد" required class="w-full px-4 py-3 border rounded-xl">
              <input name="password" type="password" placeholder="كلمة المرور" required class="w-full px-4 py-3 border rounded-xl">
              <input name="fullName" placeholder="الاسم الكامل" required class="w-full px-4 py-3 border rounded-xl">
              <select name="role" class="w-full px-4 py-3 border rounded-xl"><option value="Admin">مدير</option><option value="Doctor">طبيب</option><option value="Nurse">ممرض</option><option value="Receptionist">استقبال</option><option value="Pharmacist">صيدلي</option><option value="HR Manager">موارد بشرية</option></select>
              <input name="department" placeholder="القسم" class="w-full px-4 py-3 border rounded-xl">
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-olive-600 to-olive-700 text-white">إنشاء</button>
              <button type="button" onclick="closeModal('add-user-modal')" class="flex-1 py-3 rounded-xl border">إلغاء</button>
            </div>
          </form>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('add-user-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get('email'), password = fd.get('password'), fullName = fd.get('fullName'), role = fd.get('role'), department = fd.get('department');
        try {
          const cred = await window.firebaseAuth.createUserWithEmailAndPassword(window.auth, email, password);
          await dbSet(`users/${cred.user.uid}`, { email, fullName, role, department, createdAt: new Date().toISOString() });
          showToast('تم إنشاء المستخدم', 'success'); closeModal('add-user-modal'); loadUsersList();
        } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
      });
    };

    window.deleteUser = async (uid) => {
      if (!confirm('حذف المستخدم؟')) return;
      await dbRemove(`users/${uid}`);
      showToast('تم الحذف', 'success');
      loadUsersList();
    };

    async function renderAdminPage() {
      await loadDepartments(); await loadDeathTypes();
      const mainContent = document.getElementById('main-content');
      mainContent.innerHTML = `
        <div class="grid md:grid-cols-2 gap-6 fade-in">
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-5"><h3 class="font-bold mb-3">الأقسام الطبية</h3><div id="dept-manage-list" class="space-y-2"></div><button onclick="addNewDept()" class="mt-3 text-olive-600"><i data-lucide="plus"></i> إضافة</button></div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-5"><h3 class="font-bold mb-3">أنواع الوفيات</h3><div id="death-manage-list" class="space-y-2"></div><button onclick="addNewDeath()" class="mt-3 text-olive-600"><i data-lucide="plus"></i> إضافة</button></div>
        </div>`;
      renderManageLists();
    }

      const deptDiv = document.getElementById('dept-manage-list');

    window.addNewDept = async () => { const key = 'dept_'+Date.now(); await dbSet(`departments/${key}`, {label:'قسم جديد',icon:'📌',color:'#6b7280'}); await loadDepartments(); renderManageLists(); };
    window.addNewDeath = async () => { const key = 'death_'+Date.now(); await dbSet(`deathTypes/${key}`, {label:'نوع جديد',icon:'⚫',color:'#6b7280'}); await loadDeathTypes(); renderManageLists(); };

      const death = window.HMS.deathTypes.find(d => d.key === key);

      const modal = document.createElement('div');
      modal.id = 'edit-death-modal';
      modal.className = 'fixed inset-0 bg-black/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-md w-full shadow-2xl">
          <h3 class="font-bold text-xl mb-4">تعديل نوع الوفاة</h3>
          <div class="space-y-4">
            <div><label>الاسم</label><input id="edit-death-label" value="${death.label}" class="w-full px-4 py-3 border rounded-xl"></div>
            <div><label>الأيقونة</label><input id="edit-death-icon" value="${death.icon}" class="w-full px-4 py-3 border rounded-xl"></div>
            <div><label>اللون</label><input id="edit-death-color" type="color" value="${death.color}" class="w-full h-12 border rounded-xl"></div>
          </div>
          <div class="flex gap-3 mt-6">
            <button onclick="saveDeathChanges('${key}')" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-olive-600 to-olive-700 text-white font-bold">حفظ</button>
            <button onclick="closeModal('edit-death-modal')" class="flex-1 py-3 rounded-xl border">إلغاء</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.saveDeathChanges = async (key) => {
      const label = document.getElementById('edit-death-label').value;
      const icon = document.getElementById('edit-death-icon').value;
      const color = document.getElementById('edit-death-color').value;
      await dbUpdate(`deathTypes/${key}`, { label, icon, color });

      renderManageLists();
      closeModal('edit-death-modal');

    window.deleteDeath = async (key) => {
      if (!confirm('حذف نوع الوفاة؟')) return;

      renderManageLists();
      showToast('تم حذف نوع الوفاة', 'success');

    async function renderReportsPage() {
      const mainContent = document.getElementById('main-content');
      mainContent.innerHTML = `
        <div class="space-y-6 fade-in">
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-6">
            <h2 class="font-bold text-xl mb-4 flex items-center"><i data-lucide="file-text" class="w-6 h-6 ml-2 text-olive-600"></i> التقارير الإحصائية</h2>
            <div class="grid md:grid-cols-3 gap-4 mb-4">
              <div><label class="block text-sm mb-1">من تاريخ</label><input type="date" id="report-from" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div><label class="block text-sm mb-1">إلى تاريخ</label><input type="date" id="report-to" class="w-full px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></div>
              <div class="flex items-end"><button onclick="generateReportPDF()" class="w-full py-3 bg-gradient-to-r from-olive-600 to-olive-700 text-white rounded-xl font-bold"><i data-lucide="download" class="w-4 h-4 inline ml-1"></i> تحميل PDF</button></div>
            </div>
            <div id="report-preview" class="bg-olive-50 dark:bg-gray-700/50 rounded-xl p-4 min-h-[200px] text-sm"></div>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl border p-6">
            <h3 class="font-bold text-lg mb-4 flex items-center"><i data-lucide="stethoscope" class="w-5 h-5 ml-2 text-gold-600"></i> التقرير الطبي للمريض</h3>
            <div class="flex gap-3">
              <select id="patient-select-for-report" class="flex-1 px-4 py-3 border rounded-xl bg-white dark:bg-gray-700"></select>
              <button onclick="createMedicalReport()" class="px-6 py-3 bg-gold-500 text-white rounded-xl font-bold">إنشاء تقرير</button>
            </div>
          </div>
        </div>
      `;
      lucide.createIcons();
      await loadPatientsForSelect();
    }

    async function loadPatientsForSelect() {
      const patients = await dbGet('patients') || {};
      const select = document.getElementById('patient-select-for-report');
      select.innerHTML = '<option value="">اختر مريضاً</option>' + Object.entries(patients).map(([id, p]) => `<option value="${id}">${p.fullName} (${p.medicalId || id})</option>`).join('');
    }

    window.generateReportPDF = async () => {
      const from = document.getElementById('report-from')?.value;
      const to = document.getElementById('report-to')?.value;
      if (!from || !to) { showToast('حدد الفترة', 'error'); return; }
      showLoading(true);
      try {
        const patients = await dbGet('patients') || {};
        const visits = await dbGet('medicalRecords') || {};
        let totalVisits = 0;
        Object.values(visits).forEach(pv => {
          if (pv.visits) Object.values(pv.visits).forEach(v => { if (v.date >= from && v.date <= to) totalVisits++; });
        });
        const html = `
          <!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic&display=swap" rel="stylesheet"><style>
            body { font-family: 'Noto Kufi Arabic'; padding: 20px; background: #f4f7f2; } .report { max-width: 800px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
            h1 { color: #2c3a2d; } .header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #d9a825; padding-bottom: 15px; }
            .stats { display: flex; gap: 20px; margin: 20px 0; } .stat { background: #f8fafc; padding: 15px; border-radius: 12px; flex:1; text-align: center; }
            .footer { margin-top: 30px; text-align: center; color: #7a8450; font-size: 12px; }
          </style></head><body><div class="report">
            <div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" style="width:60px; border-radius:12px;"><h1>المستشفى السعودي الميداني - العبر</h1></div>
            <h2>تقرير إحصائي - من ${from} إلى ${to}</h2>
            <div class="stats"><div class="stat"><h3>إجمالي الزيارات</h3><p style="font-size:28px;font-weight:bold;">${totalVisits}</p></div><div class="stat"><h3>عدد المرضى</h3><p style="font-size:28px;font-weight:bold;">${Object.keys(patients).length}</p></div></div>
            <div class="footer">جميع الحقوق محفوظة للمستشفى السعودي الميداني - العبر © 2026</div>
          </div></body></html>
        `;
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
        w.print();
        document.getElementById('report-preview').innerHTML = `<p class="text-center py-4">تم إنشاء التقرير للفترة ${from} إلى ${to} (${totalVisits} زيارة).</p>`;
      } catch(e) { showToast('خطأ في إنشاء التقرير', 'error'); }
      finally { showLoading(false); }
    };

    window.createMedicalReport = async () => {
      const patientId = document.getElementById('patient-select-for-report').value;
      if (!patientId) { showToast('اختر مريضاً', 'error'); return; }
      const patient = (await dbGet(`patients/${patientId}`)) || {};
      const visits = (await dbGet(`medicalRecords/${patientId}/visits`)) || {};
      const diagnoses = Object.values(visits).map(v => v.diagnosis).filter(Boolean).join('، ');
      const html = `
        <!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic&display=swap" rel="stylesheet"><style>
          body { font-family: 'Noto Kufi Arabic'; padding: 20px; background: #f4f7f2; } .report { max-width: 800px; margin: auto; background: white; border-radius: 20px; padding: 25px; }
          h1 { color: #2c3a2d; } .header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #d9a825; padding-bottom: 15px; }
        </style></head><body><div class="report">
          <div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" style="width:60px; border-radius:12px;"><h1>تقرير طبي</h1></div>
          <h2>${patient.fullName || ''}</h2>
          <p><strong>العمر:</strong> ${patient.birthDate ? Math.floor((new Date() - new Date(patient.birthDate)) / (365.25*24*60*60*1000)) : '—'} سنة | <strong>فصيلة الدم:</strong> ${patient.bloodType || '—'}</p>
          <p><strong>التشخيصات السابقة:</strong> ${diagnoses || 'لا يوجد'}</p>
          <p style="margin-top: 30px; text-align: left;">د. ${window.HMS.userData?.fullName || ''} - ${new Date().toLocaleDateString('ar-SA')}</p>
          <div class="footer" style="margin-top: 30px; text-align: center; color: #7a8450;">المستشفى السعودي الميداني - العبر © 2026</div>
        </div></body></html>
      `;
      const w = window.open('', '_blank');
      w.document.write(html);
      w.document.close();
      w.print();
      showToast('تم فتح التقرير الطبي', 'success');
    };
  </script>

  <script>
    (function init() {
      if (window.location.protocol === 'file:') {
        const banner = document.createElement('div');
        banner.style.cssText = 'direction: rtl; font-family: "Noto Kufi Arabic"; background: #fef3c7; color: #92400e; padding: 12px 20px; text-align: center; border-bottom: 2px solid #f59e0b; position: sticky; top: 0; z-index: 99999;';
        banner.innerHTML = `
          <strong>⚠️ تنبيه:</strong> أنت تفتح الملف مباشرة (file://). بعض الميزات مثل تسجيل الدخول وقاعدة البيانات لن تعمل. 
          يرجى استخدام <strong>Live Server</strong> في VS Code أو أي خادم محلي.
          <button onclick="this.parentElement.remove()" style="margin-right: 20px; background: #d97706; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;">تجاهل</button>
        `;
        document.body.prepend(banner);
      }

      window.firebaseAuth.onAuthStateChanged(window.auth, async (user) => {
        if (user) {
          try {
            let userData = await dbGet(`users/${user.uid}`);
            if (!userData) {
              userData = {
                email: user.email,
                fullName: user.email.split('@')[0],
                role: 'Admin',
                department: 'الإدارة',
                createdAt: new Date().toISOString()
              };
              await dbSet(`users/${user.uid}`, userData);
            }
            window.HMS.currentUser = user;
            window.HMS.userData = userData;
            window.HMS.userRole = userData.role;
            renderMainApp('dashboard');
          } catch (e) {
            console.error('خطأ في تحميل بيانات المستخدم:', e);
            renderLoginPage();
          }
        } else {
          renderLoginPage();
        }
      });

      setTimeout(() => {
        if (!window.HMS.currentUser && document.getElementById('app-content').children.length === 0) {
          renderLoginPage();
        }
      }, 500);
    })();
  </script>
</body>
</html>

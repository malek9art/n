    if (!employees.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10">لا توجد موظفين مسجلين</p><button onclick="showAddEmployeeModal()" class="btn-olive mt-2 w-full">+ إضافة موظف</button>'; return; }
    let html = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th class="p-2">الاسم</th><th class="p-2">الوظيفة</th><th class="p-2">القسم</th><th class="p-2">الهاتف</th><th class="p-2">البريد</th><th class="p-2">تاريخ التعيين</th><th class="p-2">الحالة</th><th class="p-2">إجراءات</th></tr></thead><tbody>`;
    employees.forEach(emp => {
        html += `<tr><td class="p-2 font-medium">${emp.name}</td><td class="p-2">${emp.position || '-'}</td><td class="p-2">${emp.dept || '-'}</td><td class="p-2">${emp.phone || '-'}</td><td class="p-2">${emp.email || '-'}</td><td class="p-2">${emp.hireDate || '-'}</td><td class="p-2"><span class="badge ${emp.active !== false ? 'bg-green-100 text-success' : 'bg-red-100 text-danger'}">${emp.active !== false ? 'نشط' : 'غير نشط'}</span></td><td class="p-2"><div class="flex gap-1"><button onclick="editEmployee(${emp.id})" class="text-info"><i data-lucide="edit-2"></i></button><button onclick="toggleEmployeeStatus(${emp.id})" class="text-warning"><i data-lucide="${emp.active !== false ? 'user-x' : 'user-check'}"></i></button><button onclick="deleteEmployee(${emp.id})" class="text-danger"><i data-lucide="trash-2"></i></button></div></td></tr>`;
    });
    html += `</tbody></table></div>`;
    container.innerHTML = html;
    lucide.createIcons();
}

function showAddEmployeeModal() {
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إضافة موظف جديد</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="emp_name" class="input-field" placeholder="الاسم الكامل *"><input id="emp_position" class="input-field" placeholder="المسمى الوظيفي"><input id="emp_dept" class="input-field" placeholder="القسم"><input id="emp_phone" class="input-field" placeholder="رقم الهاتف"><input id="emp_email" class="input-field" placeholder="البريد الإلكتروني"><input id="emp_hireDate" type="date" class="input-field" value="${new Date().toISOString().split('T')[0]}"><input id="emp_salary" type="number" class="input-field" placeholder="الراتب الأساسي"><select id="emp_active" class="input-field"><option value="true">نشط</option><option value="false">غير نشط</option></select></div><div class="flex gap-2 mt-6"><button onclick="addEmployee()" class="btn-olive flex-1">إضافة</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function addEmployee() {
    const name = document.getElementById('emp_name').value.trim();
    if (!name) { showToast('الاسم مطلوب', 'error'); return; }
    let maxId = 0; if (APP.employees.length) maxId = Math.max(...APP.employees.map(e => e.id));
    const newId = maxId + 1;
    APP.employees.push({
        id: newId, name, position: document.getElementById('emp_position').value,
        dept: document.getElementById('emp_dept').value, phone: document.getElementById('emp_phone').value,
        email: document.getElementById('emp_email').value, hireDate: document.getElementById('emp_hireDate').value,
        salary: parseFloat(document.getElementById('emp_salary').value) || 0,
        active: document.getElementById('emp_active').value === 'true'
    });
    closeModal(); showToast('تمت إضافة الموظف', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('employees');
}
function editEmployee(id) {
    const emp = APP.employees.find(e => e.id === id);
    if (!emp) return;
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">تعديل موظف - ${emp.name}</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="emp_name" class="input-field" value="${emp.name}"><input id="emp_position" class="input-field" value="${emp.position || ''}"><input id="emp_dept" class="input-field" value="${emp.dept || ''}"><input id="emp_phone" class="input-field" value="${emp.phone || ''}"><input id="emp_email" class="input-field" value="${emp.email || ''}"><input id="emp_hireDate" type="date" class="input-field" value="${emp.hireDate || ''}"><input id="emp_salary" type="number" class="input-field" value="${emp.salary || 0}"><select id="emp_active" class="input-field"><option value="true" ${emp.active !== false ? 'selected' : ''}>نشط</option><option value="false" ${emp.active === false ? 'selected' : ''}>غير نشط</option></select></div><div class="flex gap-2 mt-6"><button onclick="updateEmployee(${id})" class="btn-olive flex-1">حفظ</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function updateEmployee(id) {
    const emp = APP.employees.find(e => e.id === id);
    if (emp) {
        emp.name = document.getElementById('emp_name').value.trim();
        emp.position = document.getElementById('emp_position').value;
        emp.dept = document.getElementById('emp_dept').value;
        emp.phone = document.getElementById('emp_phone').value;
        emp.email = document.getElementById('emp_email').value;
        emp.hireDate = document.getElementById('emp_hireDate').value;
        emp.salary = parseFloat(document.getElementById('emp_salary').value) || 0;
        emp.active = document.getElementById('emp_active').value === 'true';
        closeModal(); showToast('تم تحديث الموظف', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('employees');
    }
}
function toggleEmployeeStatus(id) {
    const emp = APP.employees.find(e => e.id === id);
    if (emp) { emp.active = !emp.active; showToast(emp.active ? 'تم تفعيل الموظف' : 'تم تعطيل الموظف', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('employees'); }
}
function deleteEmployee(id) {
    showModernConfirm('حذف هذا الموظف نهائياً؟', () => {
        APP.employees = APP.employees.filter(e => e.id !== id);
        showToast('تم الحذف', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('employees');
    });
}

// ==================== الحضور والانصراف ====================
function renderAttendanceRecords(container) {
    const today = new Date().toISOString().split('T')[0];
    let html = `<div class="mb-4 flex gap-2 flex-wrap"><label class="font-bold text-olive">تصفية حسب التاريخ:</label><input type="date" id="attendanceFilterDate" class="input-field w-40" value="${today}" onchange="loadAttendanceByDate()"><button onclick="document.getElementById('attendanceFilterDate').value='';loadAttendanceByDate();" class="text-xs text-accent">عرض الكل</button><button onclick="showAttendanceModal()" class="btn-olive text-xs px-3 py-1">تسجيل حضور جديد</button></div><div id="attendanceListContainer" class="space-y-2 max-h-[500px] overflow-y-auto"></div>`;
    container.innerHTML = html;
    loadAttendanceByDate();
}
function loadAttendanceByDate() {
    const date = document.getElementById('attendanceFilterDate').value;
    let records = APP.attendanceRecords || [];
    if (date) records = records.filter(r => r.date === date);
    const container = document.getElementById('attendanceListContainer');
    if (!container) return;
    if (!records.length) { container.innerHTML = '<p class="text-gray-400 text-center">لا توجد سجلات حضور</p>'; return; }
    let html = `<table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>الموظف</th><th>التاريخ</th><th>وقت الحضور</th><th>وقت الانصراف</th><th>الحالة</th><th>ملاحظات</th></tr></thead><tbody>`;
    records.forEach(rec => {
        const emp = APP.employees.find(e => e.id === rec.employeeId);
        let statusText = 'حاضر';
        if (rec.late) statusText = 'متأخر';
        if (rec.absent) statusText = 'غائب';
        html += `<tr><td class="p-2">${emp ? emp.name : 'موظف محذوف'}</td><td class="p-2">${rec.date}</td><td class="p-2">${rec.checkIn || '-'}</td><td class="p-2">${rec.checkOut || '-'}</td><td class="p-2"><span class="badge ${rec.late ? 'bg-yellow-100 text-warning' : (rec.absent ? 'bg-red-100 text-danger' : 'bg-green-100 text-success')}">${statusText}</span></td><td class="p-2">${rec.notes || '-'}</td></tr>`;
    });
    html += `</tbody>}</div>`;
    container.innerHTML = html;
    lucide.createIcons();
}
function showAttendanceModal() {
    const employees = APP.employees.filter(e => e.active !== false);
    if (!employees.length) { showToast('لا يوجد موظفين نشطين', 'warning'); return; }
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">تسجيل حضور/انصراف</h3></div><div class="p-6"><select id="att_employee" class="input-field mb-3"><option value="">-- اختر الموظف --</option>${employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select><input type="date" id="att_date" class="input-field mb-3" value="${new Date().toISOString().split('T')[0]}"><div class="flex gap-3 mb-3"><input type="time" id="att_checkin" class="input-field" placeholder="وقت الحضور"><input type="time" id="att_checkout" class="input-field" placeholder="وقت الانصراف"></div><label class="flex items-center gap-2 mb-2"><input type="checkbox" id="att_late"> متأخر</label><label class="flex items-center gap-2 mb-2"><input type="checkbox" id="att_absent"> غائب</label><textarea id="att_notes" class="input-field" rows="2" placeholder="ملاحظات..."></textarea><div class="flex gap-2 mt-4"><button onclick="saveAttendance()" class="btn-olive flex-1">حفظ</button><button onclick="closeModal()" class="border px-4 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function saveAttendance() {
    const employeeId = parseInt(document.getElementById('att_employee').value);
    if (!employeeId) { showToast('اختر موظفاً', 'error'); return; }
    const date = document.getElementById('att_date').value;
    const existing = APP.attendanceRecords.find(r => r.employeeId === employeeId && r.date === date);
    if (existing) { showToast('يوجد سجل حضور لهذا الموظف في هذا التاريخ بالفعل', 'warning'); return; }
    const checkIn = document.getElementById('att_checkin').value;
    const checkOut = document.getElementById('att_checkout').value;
    const late = document.getElementById('att_late').checked;
    const absent = document.getElementById('att_absent').checked;
    APP.attendanceRecords.push({
        id: Date.now(), employeeId, date, checkIn, checkOut, late, absent,
        notes: document.getElementById('att_notes').value, recordedBy: APP.currentUser?.name
    });
    closeModal(); showToast('تم تسجيل الحضور', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('attendance');
}

// ==================== الإجازات ====================
function renderLeaveRequests(container) {
    let leaves = APP.leaveRequests || [];
    let html = `<div class="flex justify-between mb-4"><h3 class="font-bold text-olive">طلبات الإجازات</h3><button onclick="showLeaveRequestModal()" class="btn-olive px-3 py-1 text-sm rounded">+ طلب إجازة جديد</button></div><div class="space-y-3 max-h-[500px] overflow-y-auto">`;
    if (!leaves.length) html += '<p class="text-gray-400 text-center">لا توجد طلبات إجازة</p>';
    else {
        leaves.forEach(l => {
            const emp = APP.employees.find(e => e.id === l.employeeId);
            html += `<div class="border rounded-lg p-3"><div class="flex justify-between"><div><p class="font-bold">${emp ? emp.name : 'موظف'}</p><p class="text-xs">${l.startDate} → ${l.endDate} (${l.days} يوم)</p><p class="text-sm">${l.reason}</p></div><div><span class="badge ${l.status === 'approved' ? 'bg-green-100 text-success' : (l.status === 'rejected' ? 'bg-red-100 text-danger' : 'bg-yellow-100 text-warning')}">${l.status === 'approved' ? 'موافقة' : (l.status === 'rejected' ? 'مرفوضة' : 'قيد المراجعة')}</span><div class="flex gap-1 mt-2">${l.status === 'pending' && (APP.currentUser?.role === 'admin' || APP.currentUser?.role === 'hr') ? `<button onclick="approveLeave(${l.id})" class="text-xs bg-success text-white px-2 py-1 rounded">موافقة</button><button onclick="rejectLeave(${l.id})" class="text-xs bg-danger text-white px-2 py-1 rounded">رفض</button>` : ''}</div></div></div></div>`;
        });
    }
    html += `</div>`;
    container.innerHTML = html;
    lucide.createIcons();
}
function showLeaveRequestModal() {
    const employees = APP.employees.filter(e => e.active !== false);
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">طلب إجازة</h3></div><div class="p-6"><select id="leave_employee" class="input-field mb-3"><option value="">-- اختر الموظف --</option>${employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select><div class="flex gap-3 mb-3"><input type="date" id="leave_start" class="input-field" placeholder="تاريخ البداية"><input type="date" id="leave_end" class="input-field" placeholder="تاريخ النهاية"></div><select id="leave_type" class="input-field mb-3"><option value="سنوية">إجازة سنوية</option><option value="مرضية">إجازة مرضية</option><option value="طارئة">إجازة طارئة</option><option value="بدون راتب">إجازة بدون راتب</option></select><textarea id="leave_reason" class="input-field" rows="2" placeholder="سبب الإجازة"></textarea><div class="flex gap-2 mt-4"><button onclick="saveLeaveRequest()" class="btn-olive flex-1">إرسال الطلب</button><button onclick="closeModal()" class="border px-4 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function saveLeaveRequest() {
    const employeeId = parseInt(document.getElementById('leave_employee').value);
    const startDate = document.getElementById('leave_start').value;
    const endDate = document.getElementById('leave_end').value;
    if (!employeeId || !startDate || !endDate) { showToast('جميع الحقول مطلوبة', 'error'); return; }
    const start = new Date(startDate), end = new Date(endDate);
    const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
    APP.leaveRequests.push({
        id: Date.now(), employeeId, startDate, endDate, days,
        type: document.getElementById('leave_type').value,
        reason: document.getElementById('leave_reason').value,
        status: 'pending', requestedBy: APP.currentUser?.name, requestDate: new Date().toISOString().split('T')[0]
    });
    closeModal(); showToast('تم إرسال طلب الإجازة', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('leaves');
}
function approveLeave(id) {
    const leave = APP.leaveRequests.find(l => l.id === id);
    if (leave) { leave.status = 'approved'; showToast('تمت الموافقة على الإجازة', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('leaves'); }
}
function rejectLeave(id) {
    const leave = APP.leaveRequests.find(l => l.id === id);
    if (leave) { leave.status = 'rejected'; showToast('تم رفض الإجازة', 'success'); saveToFirebase(); saveToLocalStorage(); renderHRTab('leaves'); }
}

// ==================== جداول العمل ====================
function renderWorkSchedules(container) {
    let html = `<div class="flex justify-between mb-4"><h3 class="font-bold text-olive">جداول العمل</h3><button onclick="showAddScheduleModal()" class="btn-olive px-3 py-1 text-sm rounded">+ إضافة جدول</button></div><div id="schedulesList" class="space-y-2"></div>`;
    container.innerHTML = html;
    loadSchedules();
}
function loadSchedules() {
    const container = document.getElementById('schedulesList');
    if (!container) return;
    let schedules = Object.entries(APP.employeeSchedules || {}).map(([empId, s]) => ({ employeeId: parseInt(empId), ...s }));
    if (!schedules.length) { container.innerHTML = '<p class="text-gray-400 text-center">لا توجد جداول عمل مسجلة</p>'; return; }
    let html = `<table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>الموظف</th><th>اليوم</th><th>وقت البداية</th><th>وقت النهاية</th><th>إجراءات</th></tr></thead><tbody>`;
    schedules.forEach(s => {
        const emp = APP.employees.find(e => e.id === s.employeeId);
        html += `<tr><td class="p-2">${emp ? emp.name : 'موظف'}</td><td class="p-2">${s.day}</td><td class="p-2">${s.start}</td><td class="p-2">${s.end}</td><td class="p-2"><button onclick="deleteSchedule(${s.employeeId}, '${s.day}')" class="text-danger"><i data-lucide="trash-2"></i></button></td></tr>`;
    });
    html += `</tbody>}</div>`;
    container.innerHTML = html;
    lucide.createIcons();
}
function showAddScheduleModal() {
    const employees = APP.employees.filter(e => e.active !== false);
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إضافة جدول عمل</h3></div><div class="p-6"><select id="schedule_employee" class="input-field mb-3"><option value="">-- اختر الموظف --</option>${employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select><select id="schedule_day" class="input-field mb-3"><option value="الأحد">الأحد</option><option value="الإثنين">الإثنين</option><option value="الثلاثاء">الثلاثاء</option><option value="الأربعاء">الأربعاء</option><option value="الخميس">الخميس</option><option value="الجمعة">الجمعة</option><option value="السبت">السبت</option></select><div class="flex gap-3 mb-3"><input type="time" id="schedule_start" class="input-field" value="08:00"><input type="time" id="schedule_end" class="input-field" value="17:00"></div><div class="flex gap-2 mt-4"><button onclick="saveSchedule()" class="btn-olive flex-1">حفظ</button><button onclick="closeModal()" class="border px-4 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function saveSchedule() {
    const employeeId = parseInt(document.getElementById('schedule_employee').value);
    const day = document.getElementById('schedule_day').value;
    const start = document.getElementById('schedule_start').value;
    const end = document.getElementById('schedule_end').value;
    if (!employeeId) { showToast('اختر موظفاً', 'error'); return; }
    if (!APP.employeeSchedules[employeeId]) APP.employeeSchedules[employeeId] = {};
    APP.employeeSchedules[employeeId][day] = { start, end };
    closeModal(); showToast('تم إضافة الجدول', 'success'); saveToFirebase(); saveToLocalStorage(); loadSchedules();
}
function deleteSchedule(employeeId, day) {
    if (APP.employeeSchedules[employeeId] && APP.employeeSchedules[employeeId][day]) {
        delete APP.employeeSchedules[employeeId][day];
        if (Object.keys(APP.employeeSchedules[employeeId]).length === 0) delete APP.employeeSchedules[employeeId];
        showToast('تم حذف الجدول', 'success'); saveToFirebase(); saveToLocalStorage(); loadSchedules();
    }
}

// ==================== تقارير HR ====================
function renderHRReports(container) {
    const totalEmployees = APP.employees.length;
    const activeEmployees = APP.employees.filter(e => e.active !== false).length;
    const totalAttendance = APP.attendanceRecords.length;
    const totalLeaves = APP.leaveRequests.length;
    const approvedLeaves = APP.leaveRequests.filter(l => l.status === 'approved').length;
    const pendingLeaves = APP.leaveRequests.filter(l => l.status === 'pending').length;
    let html = `<h3 class="font-bold text-olive mb-3">إحصائيات الموارد البشرية</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4"><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold">${totalEmployees}</div><div>إجمالي الموظفين</div></div><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold">${activeEmployees}</div><div>نشطون</div></div><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold">${totalAttendance}</div><div>سجلات حضور</div></div><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold">${totalLeaves}</div><div>طلبات إجازة</div></div><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold text-success">${approvedLeaves}</div><div>إجازات موافق عليها</div></div><div class="bg-gray-50 p-3 rounded text-center"><div class="text-2xl font-bold text-warning">${pendingLeaves}</div><div>قيد المراجعة</div></div></div><button onclick="exportHRReportCSV()" class="btn-accent w-full mt-2 py-2 rounded-lg">📥 تصدير تقرير HR CSV</button>`;
    container.innerHTML = html;
    lucide.createIcons();
}
function exportHRReportCSV() {
    const rows = [['الموظف', 'القسم', 'الوظيفة', 'تاريخ التعيين', 'الحالة', 'الراتب']];
    APP.employees.forEach(e => rows.push([e.name, e.dept || '', e.position || '', e.hireDate || '', e.active !== false ? 'نشط' : 'غير نشط', e.salary || 0]));
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'})); a.download = 'تقرير_الموارد_البشرية.csv'; a.click(); showToast('تم التصدير', 'success');
}

// ==================== إعدادات HR ====================
function renderHRSettings(container) {

    container.innerHTML = html;

function saveHRSettings() {

        start: document.getElementById('hr_work_start').value,
        end: document.getElementById('hr_work_end').value
    };

// ==================== تحديث قائمة التنقل (NAV_CONFIG) لتشمل الموارد البشرية ====================
// تم بالفعل إضافة id:'hr' في NAV_CONFIG للأدوار admin و hr في الجزء الثاني.

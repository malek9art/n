<script>
// ==================== Firebase Configuration ====================
const firebaseConfig = {
    apiKey: "AIzaSyCAVOwsOwIBERN4QimSgky_-QpF7vmVcaE",
    authDomain: "hospital-d79e3.firebaseapp.com",
    databaseURL: "https://hospital-d79e3-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hospital-d79e3",
    storageBucket: "hospital-d79e3.firebasestorage.app",
    messagingSenderId: "624434865556",
    appId: "1:624434865556:web:fc0b25653a87bbb17c1b81"
};

let db;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    console.log('Firebase initialized');
} catch (e) { console.error('Firebase init error:', e); }

// ==================== Global APP Object (موسع) ====================
const APP = {
    currentUser: null,
    currentSection: 'dashboard',
    darkMode: localStorage.getItem('darkMode') === 'true',
    users: [], patients: [], employees: [], medications: [], appointments: [], prescriptions: [], medicalRecords: [],
    notifications: [], labResults: [], radiologyResults: [], radiologyRequests: [], dentalProcedures: [], dentalPricing: [],
    pharmacyDispenses: [], labTests: [], labRequests: [], nursingTasks: [], vitalSigns: [], drugAdministrations: [],
    purchaseOrders: [], dentalVisits: [], therapySessions: [], attendanceRecords: [], leaveRequests: [], departmentSchedules: {},
    hrSettings: { absenceDeductionPerDay: 50, lateThresholdMinutes: 15 },
    monthlyReport: { emergency:0, surgery:0, xray:0, admission:0, internal:0, operations:0, dental:0, lab:0, pharmacy:0, therapy:0, nutrition:0, vaccines:0, ecg:0 },
    nextId: { patient:1001, employee:1, med:1, appointment:1, prescription:1, labResult:1, radiologyResult:1, dental:1, radiologyRequest:1 },
    dataReady: false,
    savedReports: { medical: [], referral: [], death: [] },
    employeeSchedules: {},
    labSupplies: [],
    labPurchaseOrders: [],
    labPurchaseOrderAttachments: {},
    dentalSupplies: [],
    dentalPurchaseOrders: [],
    dentalPurchaseOrderAttachments: {},
    therapyPrograms: [],
    therapyPatientRecords: {},
    nursingPatientRecords: {},
    emergencyVisits: [],
    admissionRecords: [],
    purchaseOrderAttachments: {},
    archiveCorrespondence: { outgoing: [], incoming: [] },
    radiologyImageAttachments: {}  // لتخزين صور الأشعة محلياً
};

// ==================== Helper Functions & Initialization ====================
function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

function saveToLocalStorage() {
    const toStore = {
        darkMode: APP.darkMode,
        users: APP.users, patients: APP.patients, employees: APP.employees, medications: APP.medications,
        appointments: APP.appointments, prescriptions: APP.prescriptions, medicalRecords: APP.medicalRecords,
        notifications: APP.notifications, labResults: APP.labResults, radiologyResults: APP.radiologyResults,
        radiologyRequests: APP.radiologyRequests, dentalProcedures: APP.dentalProcedures, dentalPricing: APP.dentalPricing,
        pharmacyDispenses: APP.pharmacyDispenses, labTests: APP.labTests, labRequests: APP.labRequests,
        nursingTasks: APP.nursingTasks, vitalSigns: APP.vitalSigns, drugAdministrations: APP.drugAdministrations,
        purchaseOrders: APP.purchaseOrders, dentalVisits: APP.dentalVisits, therapySessions: APP.therapySessions,
        attendanceRecords: APP.attendanceRecords, leaveRequests: APP.leaveRequests, departmentSchedules: APP.departmentSchedules,
        hrSettings: APP.hrSettings, nextId: APP.nextId, savedReports: APP.savedReports, employeeSchedules: APP.employeeSchedules,
        labSupplies: APP.labSupplies, labPurchaseOrders: APP.labPurchaseOrders, dentalSupplies: APP.dentalSupplies,
        dentalPurchaseOrders: APP.dentalPurchaseOrders, therapyPrograms: APP.therapyPrograms,
        therapyPatientRecords: APP.therapyPatientRecords, nursingPatientRecords: APP.nursingPatientRecords,
        emergencyVisits: APP.emergencyVisits, admissionRecords: APP.admissionRecords,
        archiveCorrespondence: APP.archiveCorrespondence,
        radiologyImageAttachments: APP.radiologyImageAttachments
    };
    localStorage.setItem('hospitalOfflineData', JSON.stringify(toStore));
}

function loadFromLocalStorage() {
    const data = localStorage.getItem('hospitalOfflineData');
    if (data) {
        try {
            const parsed = JSON.parse(data);
            Object.assign(APP, parsed);
            if (parsed.darkMode !== undefined) document.body.classList.toggle('dark-mode', parsed.darkMode);
            if (!APP.archiveCorrespondence) APP.archiveCorrespondence = { outgoing: [], incoming: [] };
            if (!APP.radiologyImageAttachments) APP.radiologyImageAttachments = {};
            return true;
        } catch(e) {}
    } else {
        if (!APP.archiveCorrespondence) APP.archiveCorrespondence = { outgoing: [], incoming: [] };
        if (!APP.radiologyImageAttachments) APP.radiologyImageAttachments = {};
    }
    return false;
}

function playNotificationSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.3;
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
        oscillator.stop(audioCtx.currentTime + 1);
    } catch(e) {}
}

function saveLoginState(user) {
    if (user) localStorage.setItem('loggedInUser', JSON.stringify({ id: user.id, username: user.username, name: user.name, role: user.role, dept: user.dept }));
    else localStorage.removeItem('loggedInUser');
}

function restoreLoginState() {
    const saved = localStorage.getItem('loggedInUser');
    if (saved && db) {
        try {
            const savedUser = JSON.parse(saved);
            const user = APP.users.find(u => u.id === savedUser.id && u.active);
            if (user) {
                APP.currentUser = user;
                document.getElementById('currentUserName').textContent = user.name;
                document.getElementById('currentUserRole').textContent = user.dept;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                buildSidebar();
                navigateTo(getDefaultSection(user.role));
                loadNotifications();
                updateNotifBadge();
                showToast('تم تسجيل الدخول تلقائياً كـ ' + user.name, 'success');
                return true;
            }
        } catch(e) {}
    }
    return false;
}

function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; if (icon) icon.setAttribute('data-lucide', 'eye-off'); }
    else { input.type = 'password'; if (icon) icon.setAttribute('data-lucide', 'eye'); }
    lucide.createIcons();
}

function showToast(msg, type = 'info') {
    const colors = { success:'bg-success', error:'bg-danger', info:'bg-info', warning:'bg-warning' };
    const t = document.createElement('div');
    t.className = `toast ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium top-4`;
    t.innerHTML = `<span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function openModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.remove('hidden'); lucide.createIcons(); }
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

function showConfirm(msg, onConfirm, onCancel) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay fixed inset-0 bg-black/50 flex items-center justify-center z-[10000]';
    overlay.innerHTML = `<div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 text-center"><div class="text-4xl mb-4">❓</div><p class="text-lg font-bold mb-2">تأكيد العملية</p><p class="text-sm text-gray-600 mb-6">${msg}</p><div class="flex gap-3 justify-center"><button id="confirmYes" class="btn-olive px-6 py-2 rounded-lg">نعم، تأكيد</button><button id="confirmNo" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">إلغاء</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('confirmYes').onclick = () => { document.body.removeChild(overlay); if (onConfirm) onConfirm(); };
    document.getElementById('confirmNo').onclick = () => { document.body.removeChild(overlay); if (onCancel) onCancel(); };
}
function showModernConfirm(msg, onYes, onNo) { showConfirm(msg, onYes, onNo); }

// ==================== Notifications ====================
function loadNotifications() {
    if (!APP.notifications.length) APP.notifications = [{ id:1, text:'مرحباً بك في نظام المستشفى', time:'الآن', read:false, targetRole:'all' }];
}

function updateNotifBadge() {
    const unread = APP.notifications.filter(n => !n.read && (n.targetRole === 'all' || n.targetRole === APP.currentUser?.role)).length;
    const badge = document.getElementById('notifBadge');
    if (badge) badge.classList.toggle('hidden', unread === 0);
}

function renderNotifications() {
    const container = document.getElementById('notificationsContainer');
    const relevant = APP.notifications.filter(n => n.targetRole === 'all' || n.targetRole === APP.currentUser?.role);
    if (!relevant.length) { container.innerHTML = '<p class="text-gray-400 text-sm text-center">لا توجد إشعارات</p>'; return; }
    container.innerHTML = relevant.map(n => `<div class="p-3 rounded-lg ${n.read ? 'bg-gray-50' : 'bg-olive50'} flex justify-between items-center"><div class="flex-1 cursor-pointer" onclick="markNotifRead(${n.id})"><p class="text-sm ${n.read ? 'text-gray-500' : 'text-gray-800'}">${n.text}</p><span class="text-xs text-gray-400">${n.time}</span></div><div class="flex gap-1"><button onclick="deleteNotification(${n.id})" class="text-danger hover:text-red-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('');

function saveCorrespondence(type) {
    if (type === 'outgoing') {
        const title = document.getElementById('corr_title').value.trim();
        const to = document.getElementById('corr_to').value.trim();
        const content = document.getElementById('corr_content').value.trim();
        if (!title || !to || !content) { showToast('العنوان، الجهة، والنص مطلوبة', 'error'); return; }
        const newId = Date.now();
        APP.archiveCorrespondence.outgoing.push({
            id: newId, number: document.getElementById('corr_number').value.trim(),
            title, to, date: document.getElementById('corr_date').value,
            content, createdAt: new Date().toISOString()
        });
    } else {
        const from = document.getElementById('corr_from').value.trim();
        const subject = document.getElementById('corr_subject').value.trim();
        const content = document.getElementById('corr_content').value.trim();
        if (!from || !subject || !content) { showToast('المرسل، الموضوع، والمحتوى مطلوبة', 'error'); return; }
        const files = document.getElementById('corr_files').files;
        const fileData = [];
        if (files.length) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e) { fileData.push({ name: file.name, type: file.type, data: e.target.result }); if (fileData.length === files.length) finalizeSave(); };
                reader.onerror = function() { showToast('خطأ في قراءة الملف', 'error'); };
            });
        } else { finalizeSave(); }
        function finalizeSave() {
            const newId = Date.now();
            APP.archiveCorrespondence.incoming.push({
                id: newId, from, subject, date: document.getElementById('corr_date').value,
                content, files: fileData, receivedAt: new Date().toISOString()
            });
            saveAndClose();
        }
        return;
    }
    saveAndClose();
    function saveAndClose() {
        closeModal(); showToast('تم حفظ البرقية في الأرشيف', 'success'); saveToFirebase(); saveToLocalStorage();
        if (document.getElementById('correspondenceTabContent')) renderCorrespondenceTab(type === 'outgoing' ? 'outgoing' : 'incoming');
    }
}

// دالة مساعدة لتنظيف النصوص من الـ HTML لمنع XSS
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
// ==================== Firebase Sync ====================
function syncFromFirebase() {
    showLoading();
    if (!db) {
        console.warn('Firebase غير متاح، تشغيل من التخزين المحلي');
        if (!loadFromLocalStorage()) createInitialAdminIfNeeded();
        APP.dataReady = true; hideLoading(); enableLoginButton();
        return;
    }
    const mergeArray = (existing, incoming, idKey = 'id') => {
        if (!incoming) return existing;
        const map = new Map(existing.map(item => [item[idKey], item]));
        incoming.forEach(item => { if (map.has(item[idKey])) map.set(item[idKey], { ...map.get(item[idKey]), ...item }); else map.set(item[idKey], item); });
        return Array.from(map.values());
    };
    db.ref('/hospital').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            APP.users = mergeArray(APP.users, data.users);
            APP.patients = mergeArray(APP.patients, data.patients);
            APP.employees = mergeArray(APP.employees, data.employees);
            APP.medications = mergeArray(APP.medications, data.medications);
            APP.appointments = mergeArray(APP.appointments, data.appointments);
            APP.prescriptions = mergeArray(APP.prescriptions, data.prescriptions);
            APP.medicalRecords = mergeArray(APP.medicalRecords, data.medicalRecords);
            APP.labResults = mergeArray(APP.labResults, data.labResults);
            APP.radiologyResults = mergeArray(APP.radiologyResults, data.radiologyResults);
            APP.radiologyRequests = mergeArray(APP.radiologyRequests, data.radiologyRequests);
            APP.dentalProcedures = mergeArray(APP.dentalProcedures, data.dentalProcedures);
            APP.dentalPricing = mergeArray(APP.dentalPricing, data.dentalPricing);
            APP.pharmacyDispenses = mergeArray(APP.pharmacyDispenses, data.pharmacyDispenses);
            APP.labTests = mergeArray(APP.labTests, data.labTests);
            APP.labRequests = mergeArray(APP.labRequests, data.labRequests);

function mergeLocalData(data) { const mergeArray = (existing, incoming, idKey='id') => { if(!incoming) return existing; const map=new Map(existing.map(i=>[i[idKey],i])); incoming.forEach(i=>{ if(map.has(i[idKey])) map.set(i[idKey],{...map.get(i[idKey]),...i}); else map.set(i[idKey],i); }); return Array.from(map.values()); }; APP.users=mergeArray(APP.users,data.users); APP.patients=mergeArray(APP.patients,data.patients); APP.employees=mergeArray(APP.employees,data.employees); APP.medications=mergeArray(APP.medications,data.medications); APP.appointments=mergeArray(APP.appointments,data.appointments); APP.prescriptions=mergeArray(APP.prescriptions,data.prescriptions); APP.medicalRecords=mergeArray(APP.medicalRecords,data.medicalRecords); APP.labResults=mergeArray(APP.labResults,data.labResults); APP.radiologyResults=mergeArray(APP.radiologyResults,data.radiologyResults); APP.radiologyRequests=mergeArray(APP.radiologyRequests,data.radiologyRequests); APP.dentalProcedures=mergeArray(APP.dentalProcedures,data.dentalProcedures); APP.dentalPricing=mergeArray(APP.dentalPricing,data.dentalPricing); APP.pharmacyDispenses=mergeArray(APP.pharmacyDispenses,data.pharmacyDispenses); APP.labTests=mergeArray(APP.labTests,data.labTests); APP.labRequests=mergeArray(APP.labRequests,data.labRequests); APP.nursingTasks=mergeArray(APP.nursingTasks,data.nursingTasks); APP.vitalSigns=mergeArray(APP.vitalSigns,data.vitalSigns); APP.drugAdministrations=mergeArray(APP.drugAdministrations,data.drugAdministrations); if(data.nextId) APP.nextId={...APP.nextId,...data.nextId}; if(data.notifications) APP.notifications=mergeArray(APP.notifications,data.notifications,'id'); if(data.savedReports) APP.savedReports={...APP.savedReports,...data.savedReports}; if(data.employeeSchedules) APP.employeeSchedules=data.employeeSchedules; if(data.labSupplies) APP.labSupplies=data.labSupplies; if(data.labPurchaseOrders) APP.labPurchaseOrders=data.labPurchaseOrders; if(data.dentalSupplies) APP.dentalSupplies=data.dentalSupplies; if(data.dentalPurchaseOrders) APP.dentalPurchaseOrders=data.dentalPurchaseOrders; if(data.therapyPrograms) APP.therapyPrograms=data.therapyPrograms; if(data.therapyPatientRecords) APP.therapyPatientRecords=data.therapyPatientRecords; if(data.nursingPatientRecords) APP.nursingPatientRecords=data.nursingPatientRecords; if(data.emergencyVisits) APP.emergencyVisits=data.emergencyVisits; if(data.admissionRecords) APP.admissionRecords=data.admissionRecords; if(data.archiveCorrespondence) APP.archiveCorrespondence=data.archiveCorrespondence; if(data.radiologyImageAttachments) APP.radiologyImageAttachments=data.radiologyImageAttachments; saveToLocalStorage(); }

function handleLogin() {
    if (!APP.dataReady) { showToast('جاري الاتصال بقاعدة البيانات...', 'warning'); return; }
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    const e = document.getElementById('loginError');
    if (!u || !p) { e.textContent = 'يرجى إدخال جميع البيانات'; e.classList.remove('hidden'); return; }
    const user = APP.users.find(x => (x.username === u || x.email === u) && x.password === p && x.active);
    if (!user) { e.textContent = 'بيانات غير صحيحة أو الحساب معطل'; e.classList.remove('hidden'); return; }
    APP.currentUser = user;
    saveLoginState(user);
    document.getElementById('currentUserName').textContent = user.name;
    document.getElementById('currentUserRole').textContent = user.dept;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboardPage').classList.remove('hidden');
    buildSidebar();
    navigateTo(getDefaultSection(user.role));
    showToast('مرحباً ' + user.name, 'success');
    loadNotifications();
    updateNotifBadge();
    if (user.role === 'admin' || user.role === 'doctor') document.getElementById('sendNotifBtn').style.display = '';
    else document.getElementById('sendNotifBtn').style.display = 'none';
}

// ==================== Section Render Dispatcher (مبدئي) ====================
function renderSection(section) {
    const c = document.getElementById('contentArea');
    if (!c) return;
    c.scrollTop = 0;
    const role = APP.currentUser?.role || 'admin';
    const renderers = {
        dashboard: () => renderDashboard(c),
        archive: () => renderArchiveManager(c),
        users:     () => { if(role === 'admin') renderUsers(c); else accessDenied(c); },
        patients:  () => { if(role === 'doctor') renderDoctorPatients(c); else if(role === 'reception') renderReceptionPatients(c); else renderPatients(c); },
        appointments: () => { if(role === 'doctor') renderDoctorAppointments(c); else renderAppointments(c); },
        medical:   () => { if(role === 'reception') accessDenied(c); else renderMedical(c); },
        prescriptions: () => renderPrescriptions(c),
        pharmacy:  () => renderPharmacy(c),
        lab:       () => { if(role === 'lab') renderLabTechnicianDashboard(c); else if(role === 'doctor') renderDoctorLabRequest(c); else renderLabAdminView(c); },
        radiology: () => { if(role === 'radiology') renderRadiologyTechnicianDashboard(c); else if(role === 'doctor') renderDoctorRadiologyRequest(c); else renderRadiologyAdminView(c); },
        dental:    () => renderDental(c),
        therapy:   () => renderTherapy(c),
        hr:        () => { if(role === 'hr' || role === 'admin') renderHR(c); else accessDenied(c); },
        reports:   () => { if(role === 'doctor') renderDoctorReports(c); else if(role === 'admin') renderReports(c); else accessDenied(c); },
        nursing:   () => { if(role === 'nurse' || role === 'admin' || role === 'doctor') renderNursing(c); else accessDenied(c); }
    };
    if (renderers[section]) { try { renderers[section](c); } catch(e) { console.error('Renderer error:', e); c.innerHTML = '<p class="text-danger">حدث خطأ في تحميل القسم</p>'; } }
    else c.innerHTML = `<p class="text-gray-500 text-center py-10">القسم ${section} غير متوفر</p>`;
    lucide.createIcons();
}

function accessDenied(c) { c.innerHTML = '<p class="text-danger text-center py-10">⛔ غير مصرح لك بالوصول</p>'; }
function filterTable(inputId, tableId) { const filter = document.getElementById(inputId).value.toUpperCase(); Array.from(document.getElementById(tableId).querySelectorAll('tbody tr')).forEach(row => { row.style.display = Array.from(row.cells).some(cell => cell.textContent.toUpperCase().includes(filter)) ? '' : 'none'; }); }

function renderPatients(c) {
    const isDoctor = APP.currentUser?.role === 'doctor';
    c.innerHTML = `<div class="fade-in"><div class="flex justify-between items-center mb-4 flex-wrap gap-2"><h2 class="font-bold text-lg text-olive"><i data-lucide="user-check" class="w-5 h-5 inline"></i> ${isDoctor ? 'قائمة المرضى' : 'المرضى والتسجيل'}</h2><div class="flex gap-2"><div class="search-container relative"><input id="patientSearchInput" type="text" class="input-field w-56" placeholder="🔍 بحث بالاسم أو الرقم الطبي..." autocomplete="off"><div id="patientSearchResults" class="search-results"></div></div><button onclick="showAddPatientModal()" class="btn-olive px-4 py-2 rounded-lg text-sm">+ مريض جديد</button></div></div><div class="bg-white rounded-xl border overflow-x-auto"><table id="patientsTable" class="w-full text-sm"><thead><tr class="bg-olive text-white"><th class="p-3 text-right">الرقم الطبي</th><th class="p-3 text-right">الاسم</th><th class="p-3 text-right hide-mobile">الهوية</th><th class="p-3 text-right">العمر</th><th class="p-3 text-right">القسم</th><th class="p-3 text-right">الحالة</th><th class="p-3 text-right">إجراءات</th></tr></thead><tbody id="patientsTbody">${renderPatientRows('')}</tbody>}</div></div>`;
    lucide.createIcons();
    // تفعيل البحث الذكي للمرضى (حد أقصى 3 نتائج)
    const input = document.getElementById('patientSearchInput');
    const resultsDiv = document.getElementById('patientSearchResults');
    if (input && resultsDiv) {
        input.addEventListener('input', function() {
            const term = this.value.trim();
            if (term.length < 1) { resultsDiv.style.display = 'none'; document.getElementById('patientsTbody').innerHTML = renderPatientRows(''); return; }
            const results = searchPatientsGlobal(term, 3);
            if (results.length === 0) { resultsDiv.innerHTML = '<div class="p-2 text-gray-500">لا توجد نتائج</div>'; resultsDiv.style.display = 'block'; document.getElementById('patientsTbody').innerHTML = renderPatientRows(term); return; }
            resultsDiv.innerHTML = results.map(p => `<div class="autocomplete-item" onclick="selectPatientFromSearch('${p.id}')"><div class="font-medium">${p.name}</div><div class="text-xs text-gray-500">${p.medicalId}</div></div>`).join('');
            resultsDiv.style.display = 'block';
            document.getElementById('patientsTbody').innerHTML = renderPatientRows(term);
        });
        document.addEventListener('click', function(e) { if (!resultsDiv.contains(e.target) && e.target !== input) resultsDiv.style.display = 'none'; });
    }
}

{prescs.length ? prescs.map(pr => `<p>${pr.meds} - ${pr.date} ${pr.dispensed ? '(تم الصرف)' : '(معلق)'}</p>`).join('') : '<p>لا توجد</p>'}</div><div class="section"><h3>الفحوصات المخبرية</h3>${labs.length ? labs.map(l => `<p>${l.testName}: ${l.result} - ${l.date}</p>`).join('') : '<p>لا توجد</p>'}</div><div class="section"><h3>الأشعة</h3>${rads.length ? rads.map(r => `<p>${r.type}: ${r.findings || 'قيد المراجعة'} - ${r.date}</p>`).join('') : '<p>لا توجد</p>'}</div><div class="footer"><p>تمت الطباعة: ${new Date().toLocaleDateString('ar-SA')}</p></div><script>window.onload=function(){window.print();}<\/script></body></html>`);

// ==================== Appointments ====================
function renderAppointments(c) {
    const today = new Date().toISOString().split('T')[0];
    const isDoctor = APP.currentUser?.role === 'doctor';
    const isReception = APP.currentUser?.role === 'reception';
    let filteredAppointments = APP.appointments;
    if (isDoctor) filteredAppointments = APP.appointments.filter(a => a.doctor === APP.currentUser?.name && a.date === today);
    else if (isReception) filteredAppointments = APP.appointments.filter(a => a.date === today);
    c.innerHTML = `<div class="fade-in"><div class="flex justify-between items-center mb-4"><h2 class="font-bold text-lg text-olive"><i data-lucide="calendar" class="w-5 h-5 inline"></i> المواعيد والحجوزات</h2><button onclick="showAddAppointmentModal()" class="btn-olive px-4 py-2 rounded-lg text-sm">+ موعد جديد</button></div><div class="bg-white rounded-xl border p-4 mb-4"><div class="flex items-center gap-4 mb-2"><label class="text-sm font-bold text-olive">تصفية حسب التاريخ:</label><input type="date" id="apptDateFilter" class="input-field w-40" value="${filteredAppointments.length > 0 ? filteredAppointments[0].date : today}" onchange="filterAppointmentsByDate()"><button onclick="document.getElementById('apptDateFilter').value='';filterAppointmentsByDate();" class="text-xs text-accent">عرض الكل</button></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="appointmentsGrid">${renderAppointmentCards(filteredAppointments)}</div></div>`;
    lucide.createIcons();
}
function filterAppointmentsByDate() {
    const date = document.getElementById('apptDateFilter').value;
    let filtered = APP.appointments;
    if (date) filtered = APP.appointments.filter(a => a.date === date);
    if (APP.currentUser?.role === 'doctor') filtered = filtered.filter(a => a.doctor === APP.currentUser?.name);
    document.getElementById('appointmentsGrid').innerHTML = renderAppointmentCards(filtered);
    lucide.createIcons();
}
function renderAppointmentCards(appointments) {
    if (!appointments.length) return '<div class="col-span-2 text-center py-12 text-gray-400"><i data-lucide="calendar" class="w-12 h-12 mx-auto mb-2 opacity-30"></i><p>لا توجد مواعيد</p></div>';
    return appointments.map(a => `<div class="bg-white rounded-xl p-4 border border-gray-100 card-hover"><div class="flex justify-between items-start"><div><p class="font-bold text-olive">${a.patientName}</p><p class="text-xs text-gray-500">${a.doctor} - ${a.dept || ''}</p></div><span class="badge ${a.status==='مؤكد'?'bg-green-100 text-success':a.status==='ملغي'?'bg-red-100 text-danger':a.status==='مكتمل'?'bg-blue-100 text-info':'bg-yellow-100 text-warning'} text-xs">${a.status||'محجوز'}</span></div><div class="flex gap-3 text-xs text-gray-600 mt-3"><span><i data-lucide="calendar-days" class="w-3.5 h-3.5 inline"></i> ${a.date}</span><span><i data-lucide="clock" class="w-3.5 h-3.5 inline"></i> ${a.time}</span></div><div class="flex gap-1 mt-3 pt-3 border-t"><button onclick="changeApptStatus(${a.id},'مؤكد')" class="text-xs px-2 py-1 bg-green-50 text-success rounded hover:bg-green-100">تأكيد</button><button onclick="changeApptStatus(${a.id},'مكتمل')" class="text-xs px-2 py-1 bg-blue-50 text-info rounded hover:bg-blue-100">إكمال</button><button onclick="changeApptStatus(${a.id},'ملغي')" class="text-xs px-2 py-1 bg-red-50 text-danger rounded hover:bg-red-100">إلغاء</button></div></div>`).join('');
}
function changeApptStatus(id, status) {
    const a = APP.appointments.find(x => x.id === id);
    if (a) { a.status = status; showToast(`تم ${status === 'مؤكد' ? 'تأكيد' : status === 'مكتمل' ? 'إكمال' : 'إلغاء'} الموعد`, 'success'); saveToFirebase(); saveToLocalStorage(); navigateTo('appointments'); }
}
function showAddAppointmentModal() {

function openCalendarPopup() {
    const today = new Date();
    let calYear = today.getFullYear();
    let calMonth = today.getMonth();
    const calOverlay = document.createElement('div');
    calOverlay.className = 'confirm-overlay fixed inset-0 bg-black/50 flex items-center justify-center z-[10001]';
    calOverlay.innerHTML = `<div class="bg-white rounded-2xl p-4 max-w-sm w-full mx-4"><div class="flex justify-between items-center mb-3"><button id="calPrev" class="p-1 rounded hover:bg-gray-100"><i data-lucide="chevron-right" class="w-5 h-5"></i></button><h3 class="font-bold text-olive text-lg" id="calMonthLabel"></h3><button id="calNext" class="p-1 rounded hover:bg-gray-100"><i data-lucide="chevron-left" class="w-5 h-5"></i></button></div><div class="grid grid-cols-7 gap-1 text-center text-xs font-bold mb-2"><div>أحد</div><div>إث</div><div>ثلا</div><div>أرب</div><div>خم</div><div>جم</div><div>سبت</div></div><div id="calDaysGrid" class="grid grid-cols-7 gap-1 text-sm"></div><button onclick="this.closest('.confirm-overlay').remove()" class="btn-olive mt-4 w-full py-2 rounded-lg">إلغاء</button></div>`;
    document.body.appendChild(calOverlay);
    const label = document.getElementById('calMonthLabel');
    const daysGrid = document.getElementById('calDaysGrid');
    function renderCalendar() {
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        label.textContent = new Date(calYear, calMonth).toLocaleDateString('ar-SA', { month:'long', year:'numeric' });
        let html = '';
        for (let i=0; i<firstDay; i++) html += '<div></div>';
        for (let d=1; d<=daysInMonth; d++) {
            const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            html += `<button class="p-2 rounded hover:bg-olive50 transition" onclick="selectCalendarDay('${dateStr}')">${d}</button>`;
        }
        daysGrid.innerHTML = html;
    }
    document.getElementById('calPrev').onclick = () => { if (calMonth === 0) { calMonth = 11; calYear--; } else calMonth--; renderCalendar(); };
    document.getElementById('calNext').onclick = () => { if (calMonth === 11) { calMonth = 0; calYear++; } else calMonth++; renderCalendar(); };
    window.selectCalendarDay = function(dateStr) { const dateInput = document.getElementById('app_date'); if (dateInput) { dateInput.value = dateStr; updateTimeOptions(); } calOverlay.remove(); };
    renderCalendar(); lucide.createIcons();
}
function updateTimeOptions() {
    const timeSelect = document.getElementById('app_time');
    if (!timeSelect) return;
    const dateStr = document.getElementById('app_date')?.value;
    if (!dateStr) return;
    const slots = [];
    for (let hour = 8; hour <= 12; hour++) { slots.push(`${String(hour).padStart(2,'0')}:00`); slots.push(`${String(hour).padStart(2,'0')}:30`); }
    slots.push(`12:00`); slots.push(`12:30`);
    for (let hour = 16; hour <= 18; hour++) { slots.push(`${String(hour).padStart(2,'0')}:00`); slots.push(`${String(hour).padStart(2,'0')}:30`); }
    slots.push(`18:00`); slots.push(`18:30`);
    const doctor = document.getElementById('app_doctor')?.value;
    const bookedSlots = APP.appointments.filter(a => a.date === dateStr && a.doctor === doctor && a.status !== 'ملغي').map(a => a.time);
    const availableSlots = slots.filter(slot => !bookedSlots.includes(slot));
    timeSelect.innerHTML = availableSlots.length ? availableSlots.map(s => `<option value="${s}">${s}</option>`).join('') : '<option value="">لا توجد أوقات متاحة</option>';
}

        quantities.push({ name, qty });
        const med = APP.medications.find(m => m.name === name || name.includes(m.name));

    });

        quantities.forEach(({ name, qty }) => {

            if (med) med.qty = Math.max(0, med.qty - qty);
        });
        pr.dispensed = true; pr.dispensedBy = APP.currentUser?.name || 'الصيدلي';
        pr.dispensedDate = new Date().toISOString().split('T')[0];
        APP.pharmacyDispenses.push({ prescriptionId: id, date: pr.dispensedDate, pharmacist: pr.dispensedBy, meds: pr.meds, notes: document.getElementById('dispense_notes')?.value || '' });
        closeModal(); showToast('تم صرف الوصفة وتحديث المخزون', 'success');
        saveToFirebase(); saveToLocalStorage(); navigateTo('prescriptions');
    });

let _currentLabTab = 'pending';
function showLabTab(tab) {
    _currentLabTab = tab;
    ['pending','results','tests','supplies','orders'].forEach(t => {
        const btn = document.getElementById(`labTab${t.charAt(0).toUpperCase() + t.slice(1)}`);
        if (btn) btn.className = (t === tab) ? 'px-4 py-2 text-sm font-medium rounded-t-lg bg-olive text-white' : 'px-4 py-2 text-sm font-medium rounded-t-lg bg-gray-100 text-gray-700';
    });
    const container = document.getElementById('labTabContent');
    if (!container) return;
    if (tab === 'pending') renderPendingLabRequests(container);
    else if (tab === 'results') renderCompletedLabResults(container);
    else if (tab === 'tests') renderLabTestsManagement(container);
    else if (tab === 'supplies') renderLabSuppliesManagement(container);
    else if (tab === 'orders') renderLabPurchaseOrdersFull(container);
}

function renderPendingLabRequests(container) {
    const pending = (APP.labRequests || []).filter(r => r.status === 'pending');
    if (!pending.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10">لا توجد طلبات معلقة</p>'; return; }
    container.innerHTML = `<div class="space-y-4">${pending.map(req => `<div class="p-4 bg-yellow-50 rounded-lg border border-yellow-200"><div class="flex justify-between items-start"><div><p class="font-bold text-lg">${req.patientName}</p><p class="text-sm text-gray-600">${req.medicalId} | ${req.requestedBy} | ${req.requestDate}</p></div><span class="badge bg-warning text-white">معلق</span></div><div class="mt-2"><strong>الفحوصات:</strong><div class="flex flex-wrap gap-2 mt-1">${req.testType.split('|').map(t => `<span class="badge bg-blue-100 text-blue-800">${t.trim()}</span>`).join('')}</div></div>${req.notes ? `<p class="text-sm text-gray-500 mt-2">📝 ${req.notes}</p>` : ''}<div class="flex gap-2 mt-4"><button onclick="enterLabResult(${req.id})" class="btn-olive px-4 py-2 rounded-lg text-sm"><i data-lucide="microscope"></i> إدخال النتيجة</button><button onclick="showVirtualLabTest(${req.id})" class="btn-accent px-4 py-2 rounded-lg text-sm"><i data-lucide="monitor"></i> فحص افتراضي</button></div></div>`).join('')}</div>`;
}

function enterLabResult(requestId) {
    const req = (APP.labRequests || []).find(r => r.id === requestId);
    if (!req) return;
    const testNames = req.testType.split('|').map(t => t.trim());
    const fieldsHtml = testNames.map((tn, i) => { 
        const test = APP.labTests.find(t => t.nameAr === tn || (t.nameAr + ' (' + t.nameEn + ')') === tn);
        return `<div class="p-3 bg-blue-50 rounded-lg mb-3"><p class="font-bold text-sm mb-2">${tn}</p><div class="grid grid-cols-2 gap-2"><input id="labres_value_${i}" class="input-field" placeholder="النتيجة *"><input id="labres_unit_${i}" class="input-field" value="${test?.unit || ''}" placeholder="الوحدة" readonly><input id="labres_normal_${i}" class="input-field" value="${test?.normalRange || ''}" placeholder="المدى الطبيعي" readonly></div></div>`;
    }).join('');
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إدخال نتيجة فحص</h3><p class="text-sm">المريض: ${req.patientName} (${req.medicalId})</p></div><div class="p-6 max-h-[70vh] overflow-y-auto">${fieldsHtml}<textarea id="labres_notes" class="input-field mt-2" rows="2" placeholder="ملاحظات فني المختبر..."></textarea><div class="flex gap-2 mt-6"><button onclick="saveLabResult(${requestId}, ${testNames.length})" class="btn-olive px-6 py-2 rounded-lg flex-1">حفظ النتيجة</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
}

function saveLabResult(requestId, testCount) {
    const req = (APP.labRequests || []).find(r => r.id === requestId);
    if (!req) return;
    const testNames = req.testType.split('|').map(t => t.trim());
    for (let i = 0; i < testCount; i++) {
        const value = document.getElementById('labres_value_' + i)?.value.trim();
        if (!value) { showToast(`الرجاء إدخال نتيجة لـ ${testNames[i]}`, 'error'); return; }
        const unit = document.getElementById('labres_unit_' + i)?.value || '';
        const normal = document.getElementById('labres_normal_' + i)?.value || '';
        const fullResult = unit ? `${value} ${unit}` : value;
        const isAbnormal = (() => { try { const parts = normal.split('-').map(Number); const val = parseFloat(value); if (parts.length===2 && !isNaN(val) && !isNaN(parts[0]) && !isNaN(parts[1])) return val < parts[0] || val > parts[1]; } catch(e){} return false; })();
        APP.labResults.push({ id: APP.labResults.length + 1, patientName: req.patientName, medicalId: req.medicalId, testName: testNames[i], result: fullResult, normalRange: normal, date: new Date().toISOString().split('T')[0], technician: APP.currentUser?.name || 'فني المختبر', notes: document.getElementById('labres_notes')?.value, isAbnormal, requestId: req.id });
    }
    req.status = 'completed'; req.completedDate = new Date().toISOString();
    closeModal(); showToast('تم حفظ النتائج وإرسالها للطبيب', 'success');
    APP.notifications.push({ id: Date.now(), text: `نتائج فحوصات المريض ${req.patientName} جاهزة`, time: 'الآن', read: false, targetRole: 'doctor' });
    playNotificationSound(); saveToFirebase(); saveToLocalStorage(); showLabTab('pending');
}

function showVirtualLabTest(requestId) {
    const req = (APP.labRequests || []).find(r => r.id === requestId);
    if (!req) return;
    const testNames = req.testType.split('|').map(t => t.trim());
    const virtualResults = testNames.map(tName => {
        const test = APP.labTests.find(t => t.nameAr === tName || (t.nameAr + ' (' + t.nameEn + ')') === tName);
        if (!test) return { name: tName, value: 'غير متاح', normal: '', unit: '' };
        let simulatedValue = ''; const range = test.normalRange;
        if (range && range.includes('-')) { const [min, max] = range.split('-').map(Number); if (!isNaN(min) && !isNaN(max)) { let randomVal = (min + Math.random() * (max - min)).toFixed(1); if (Math.random() < 0.1) randomVal = Math.random() < 0.5 ? (min - (Math.random() * 5)).toFixed(1) : (max + (Math.random() * 5)).toFixed(1); simulatedValue = randomVal; } else simulatedValue = 'طبيعي'; } else simulatedValue = 'طبيعي';
        return { name: tName, value: simulatedValue, normal: range, unit: test.unit };
    });
    let html = `<div class="modal-header"><h3 class="font-bold text-lg">فحص افتراضي - ${req.patientName}</h3><p class="text-xs text-info">هذه النتائج محاكاة لأغراض التدريب</p></div><div class="p-6">${virtualResults.map(vr => `<div class="p-3 bg-gray-50 rounded mb-2"><p class="font-bold">${vr.name}</p><p>النتيجة: <strong class="text-olive">${vr.value} ${vr.unit}</strong> <span class="text-xs text-gray-500">(المدى: ${vr.normal || 'غير محدد'})</span></p></div>`).join('')}<div class="flex gap-2 mt-4"><button onclick="closeModal();enterLabResult(${requestId})" class="btn-olive flex-1">تأكيد وإدخال يدوي</button><button onclick="closeModal()" class="border px-4 py-2 rounded-lg">إغلاق</button></div></div>`;
    openModal(html);
}

function renderCompletedLabResults(container) {
    const results = APP.labResults.slice().reverse();
    if (!results.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10">لا توجد نتائج</p>'; return; }
    let html = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>المريض</th><th>الفحص</th><th>النتيجة</th><th>المدى الطبيعي</th><th>التاريخ</th><th>الفني</th></tr></thead><tbody>`;
    results.forEach(r => { const isAbnormal = r.isAbnormal || (r.result && r.normalRange && (()=>{ try { const parts = r.normalRange.split('-').map(Number); const val = parseFloat(r.result); if(parts.length===2 && !isNaN(val)) return val < parts[0] || val > parts[1]; } catch(e){} return false; })()); html += `<tr><td class="p-2">${r.patientName}</td><td class="p-2">${r.testName}</td><td class="p-2 font-bold ${isAbnormal ? 'text-danger' : 'text-success'}">${r.result}</td><td class="p-2">${r.normalRange || '-'}</td><td class="p-2">${r.date}</td><td class="p-2">${r.technician || '-'}</td></tr>`; });
    html += `</tbody></table></div>`; container.innerHTML = html; lucide.createIcons();
}

function renderLabTestsManagement(container) {
    let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-olive">قائمة الفحوصات</h3><button onclick="showAddLabTestModal()" class="btn-olive px-3 py-1 text-sm rounded">+ فحص جديد</button></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>الفحص (عربي)</th><th>الفحص (إنجليزي)</th><th>التصنيف</th><th>المدى الطبيعي</th><th>الوحدة</th><th>السعر</th><th>مدة المعالجة</th><th>افتراضي</th><th>إجراءات</th></tr></thead><tbody>`;

function showAddLabTestModal() {
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إضافة فحص جديد</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="lt_nameAr" class="input-field" placeholder="اسم الفحص بالعربية *"><input id="lt_nameEn" class="input-field" placeholder="الاسم بالإنجليزية *"><select id="lt_category" class="input-field"><option>دم</option><option>كيمياء</option><option>دهون</option><option>فيتامينات</option><option>بول</option><option>هرمونات</option><option>أخرى</option></select><input id="lt_normal" class="input-field" placeholder="المدى الطبيعي"><input id="lt_unit" class="input-field" placeholder="الوحدة"><input id="lt_price" type="number" class="input-field" placeholder="السعر" value="0"><input id="lt_time" type="number" class="input-field" placeholder="مدة المعالجة (دقيقة)" value="30"><label class="flex items-center gap-2"><input type="checkbox" id="lt_virtual"> دعم الفحص الافتراضي</label></div><div class="flex gap-2 mt-6"><button onclick="addLabTest()" class="btn-olive flex-1">إضافة</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`);

function addLabTest() { const nameAr = document.getElementById('lt_nameAr').value.trim(); const nameEn = document.getElementById('lt_nameEn').value.trim(); if (!nameAr || !nameEn) { showToast('أدخل الاسم', 'error'); return; } const newId = Date.now(); APP.labTests.push({ id: newId, nameAr, nameEn, category: document.getElementById('lt_category').value, normalRange: document.getElementById('lt_normal').value, unit: document.getElementById('lt_unit').value, price: parseFloat(document.getElementById('lt_price').value) || 0, processingTime: parseInt(document.getElementById('lt_time').value) || 30, virtualAvailable: document.getElementById('lt_virtual').checked }); closeModal(); showToast('تمت الإضافة', 'success'); saveToFirebase(); saveToLocalStorage(); showLabTab('tests'); }
function editLabTestItem(id) { showToast('وظيفة التعديل قيد التطوير', 'info'); }
function deleteLabTestItem(id) { showModernConfirm('حذف هذا الفحص؟', () => { APP.labTests = APP.labTests.filter(x => x.id !== id); showToast('تم الحذف', 'success'); saveToFirebase(); saveToLocalStorage(); showLabTab('tests'); }); }

function renderLabSuppliesManagement(container) {
    let supplies = APP.labSupplies || [];
    let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-olive">مخزون المستلزمات والمحاليل</h3><button onclick="showAddLabSupplyModal()" class="btn-olive px-3 py-1 text-sm rounded">+ صنف جديد</button></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th>الاسم</th><th>التصنيف</th><th>الكمية</th><th>الوحدة</th><th>الحد الأدنى</th><th>الصلاحية</th><th>السعر</th><th>إجراءات</th></tr></thead><tbody>`;

    html += `</tbody></table></div>`; container.innerHTML = html; lucide.createIcons();

function showAddLabSupplyModal() { openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إضافة مستلزم/محلول جديد</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="sup_name" class="input-field" placeholder="الاسم *"><select id="sup_category" class="input-field"><option>محاليل</option><option>كاشفات</option><option>مستهلكات</option><option>أجهزة</option></select><input id="sup_qty" type="number" class="input-field" placeholder="الكمية" value="0"><input id="sup_unit" class="input-field" placeholder="الوحدة (لتر، قطعة، زجاجة)" value="قطعة"><input id="sup_min" type="number" class="input-field" placeholder="الحد الأدنى" value="10"><input id="sup_expiry" type="date" class="input-field" placeholder="تاريخ الصلاحية"><input id="sup_price" type="number" step="0.01" class="input-field" placeholder="السعر" value="0"></div><div class="flex gap-2 mt-6"><button onclick="addLabSupply()" class="btn-olive flex-1">إضافة</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`); }
function addLabSupply() { const name = document.getElementById('sup_name').value.trim(); if (!name) { showToast('الاسم مطلوب', 'error'); return; } const newId = Date.now(); APP.labSupplies.push({ id: newId, name, category: document.getElementById('sup_category').value, qty: parseInt(document.getElementById('sup_qty').value) || 0, unit: document.getElementById('sup_unit').value, minQty: parseInt(document.getElementById('sup_min').value) || 10, expiry: document.getElementById('sup_expiry').value, price: parseFloat(document.getElementById('sup_price').value) || 0 }); closeModal(); showToast('تمت الإضافة', 'success'); saveToFirebase(); saveToLocalStorage(); showLabTab('supplies'); }
function adjustLabSupply(id) { const s = APP.labSupplies.find(x => x.id === id); if (!s) return; const newQty = prompt(`تعديل كمية ${s.name} (الحالية: ${s.qty} ${s.unit})`, s.qty); if (newQty !== null && !isNaN(parseFloat(newQty))) { s.qty = parseFloat(newQty); showToast('تم التحديث', 'success'); saveToFirebase(); saveToLocalStorage(); showLabTab('supplies'); } }
function deleteLabSupply(id) { showModernConfirm('حذف هذا الصنف؟', () => { APP.labSupplies = APP.labSupplies.filter(x => x.id !== id); showToast('تم الحذف', 'success'); saveToFirebase(); saveToLocalStorage(); showLabTab('supplies'); }); }

function addItemToLabPO() { const supplyId = parseInt(document.getElementById('lab_po_supply_select').value); const qty = parseInt(document.getElementById('lab_po_qty').value) || 1; const supply = APP.labSupplies.find(s => s.id === supplyId); if (!supply) return; if (window._labPOItems.find(i => i.supplyId === supplyId)) { showToast('الصنف مضاف مسبقاً', 'warning'); return; } window._labPOItems.push({ supplyId, name: supply.name, qty, unit: supply.unit }); renderLabPOItems(); }
function renderLabPOItems() { const container = document.getElementById('lab_po_items_list'); if (!container) return; if (!window._labPOItems.length) { container.innerHTML = '<p class="text-gray-400">لم تضف أصناف بعد</p>'; return; } container.innerHTML = window._labPOItems.map((item, i) => `<div class="flex justify-between items-center p-2 bg-gray-50 rounded"><span>${item.name} - ${item.qty} ${item.unit}</span><button onclick="removeLabPOItem(${i})" class="text-red-500"><i data-lucide="x"></i></button></div>`).join(''); lucide.createIcons(); }

function showAddLabRequestModal() {

    lucide.createIcons();
    // تفعيل البحث الذكي للمريض في طلب الفحص

    const patientResults = document.getElementById('labreq_patient_results');
    if (patientInput && patientResults) {
        patientInput.addEventListener('input', function() {

            const results = searchPatientsGlobal(term, 3);

    const parts = [
        { id: 'skull', label: 'الجمجمة', x: 180, y: 35, w: 70, h: 55, rx: 35, ry: 40 },

        { id: 'ribcage', label: 'القفص الصدري', x: 140, y: 100, w: 150, h: 110, rx: 20 },
        { id: 'pelvis', label: 'الحوض', x: 170, y: 280, w: 90, h: 55, rx: 25 },
        { id: 'femur_left', label: 'الفخذ الأيسر', x: 155, y: 335, w: 35, h: 100, rx: 12 },

        { id: 'foot_right', label: 'القدم اليمنى', x: 225, y: 528, w: 60, h: 30, rx: 12 }
    ];
    let svg = `<svg viewBox="0 0 420 580" width="100%" height="100%" style="background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%); border-radius: 28px; box-shadow: 0 20px 35px rgba(0,0,0,0.4);">
        <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
        <radialGradient id="boneGrad" cx="40%" cy="30%" r="60%"><stop offset="0%" stop-color="#FFF2E0"/><stop offset="70%" stop-color="#DCC8A0"/><stop offset="100%" stop-color="#B2965C"/></radialGradient>
        <radialGradient id="boneGradSel" cx="40%" cy="30%" r="60%"><stop offset="0%" stop-color="#FFEAB0"/><stop offset="60%" stop-color="#F0C674"/><stop offset="100%" stop-color="#C79A2E"/></radialGradient></defs>

window.selectDetailedBodyPart = function(partId) {
    document.querySelectorAll('.body-part').forEach(el => el.classList.remove('selected'));
    const sel = document.querySelector(`.body-part[data-part="${partId}"]`);
    if (sel) sel.classList.add('selected');
    const hidden = document.getElementById('radiology_selected_part');
    if (hidden) hidden.value = partId;
    const labelSpan = document.getElementById('selectedPartLabel');
    if (labelSpan) {
        const names = { skull:'الجمجمة', cervical_spine:'العمود الفقري العنقي', thoracic_spine:'العمود الفقري الصدري', lumbar_spine:'العمود الفقري القطني', ribcage:'القفص الصدري', pelvis:'الحوض', femur_left:'الفخذ الأيسر', femur_right:'الفخذ الأيمن', tibia_fibula_left:'الساق اليسرى', tibia_fibula_right:'الساق اليمنى', foot_left:'القدم اليسرى', foot_right:'القدم اليمنى' };
        labelSpan.textContent = names[partId] || partId;
    }
};

// دوال مساعدة لحفظ الصور محلياً ومشاركة واتساب
function saveRadiologyImages(requestId, files) {
    if (!APP.radiologyImageAttachments) APP.radiologyImageAttachments = {};
    if (!APP.radiologyImageAttachments[requestId]) APP.radiologyImageAttachments[requestId] = [];
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            APP.radiologyImageAttachments[requestId].push({ name: file.name, type: file.type, data: e.target.result, date: new Date().toISOString() });
            saveToLocalStorage();
            showToast(`تم حفظ صورة ${file.name} محلياً`, 'success');
        };
        reader.onerror = function() { showToast('خطأ في قراءة الملف', 'error'); };
    });
}

function shareRadiologyReportViaWhatsApp(requestId, doctorPhone, patientPhone) {
    const req = APP.radiologyRequests.find(r => r.id === requestId);
    if (!req || req.status !== 'completed') { showToast('التقرير غير مكتمل بعد', 'error'); return; }
    let message = `*تقرير أشعة - المستشفى السعودي الميداني العبر*\n\nالمريض: ${req.patientName}\nالتاريخ: ${req.reportDate}\nنوع الأشعة: ${req.radiologyType}\nالمنطقة: ${req.bodyPart}\n\nالنتائج:\n${req.report}\n\nتم الإرسال بواسطة: ${req.technician}`;
    if (doctorPhone) {
        let url = `https://wa.me/${doctorPhone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
        showToast('تم فتح واتساب لإرسال التقرير للطبيب', 'success');
    }
    if (patientPhone) {
        let url2 = `https://wa.me/${patientPhone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`;
        setTimeout(() => { window.open(url2, '_blank'); }, 500);
        showToast('تم فتح واتساب لإرسال التقرير للمريض', 'success');
    }
}

function saveRadiologyReport(requestId) {
    const req = (APP.radiologyRequests || []).find(r => r.id === requestId);
    if (!req) return;
    const findings = document.getElementById('radrep_findings').value.trim();
    if (!findings) { showToast('أدخل النتائج', 'error'); return; }
    const conclusion = document.getElementById('radrep_conclusion').value.trim();
    const fullReport = findings + (conclusion ? '\n\nالاستنتاج: ' + conclusion : '');
    req.status = 'completed';
    req.report = fullReport;
    req.reportDate = new Date().toISOString().split('T')[0];
    req.technician = document.getElementById('radrep_technician').value || APP.currentUser?.name;
    
    // حفظ الصور المرفقة محلياً
    const imageFiles = document.getElementById('rad_images').files;
    if (imageFiles.length > 0) saveRadiologyImages(requestId, imageFiles);
    
    APP.radiologyResults.push({
        id: APP.radiologyResults.length + 1,
        patientName: req.patientName,
        medicalId: req.medicalId,
        type: req.radiologyType,
        bodyPart: req.bodyPart,
        position: req.position,
        findings: fullReport,
        date: req.reportDate,
        technician: req.technician,
        requestId: req.id
    });
    closeModal();
    showToast('تم حفظ التقرير وإرساله للطبيب', 'success');
    APP.notifications.push({ id: Date.now(), text: `تقرير الأشعة للمريض ${req.patientName} جاهز`, time: 'الآن', read: false, targetRole: 'doctor' });
    playNotificationSound();
    saveToFirebase();
    saveToLocalStorage();
    navigateTo('radiology');
}

        let path = `<g transform="translate(${cx},${cy})" cursor="pointer" onclick="toggleDentalTooth(${toothNum})">`;
        path += `<path d="M${-w/2},0 C${-w/2-3},${sign*6} ${-w/2-1},${sign*12} ${-w/4},${sign*h} C${-2},${sign*(h-4)} ${2},${sign*(h-4)} ${w/4},${sign*h} C${w/2+1},${sign*12} ${w/2+3},${sign*6} ${w/2},0 Z" fill="${baseColor}" stroke="${strokeColor}" stroke-width="1.5" filter="url(#toothShadow)"/>`;

            path += `<path d="M-6,${sign*12} L0,${sign*18} L6,${sign*12}" fill="none" stroke="#BD9E6B" stroke-width="1"/>`;
            path += `<path d="M-2,${sign*4} L-2,${sign*14}" fill="none" stroke="#D4B88A" stroke-width="0.8"/>`;

            path += `<path d="M-4,${sign*8} L4,${sign*8}" fill="none" stroke="#BD9E6B" stroke-width="1"/>`;
        }
        path += `<path d="M${-w/4},${sign*h} C${-w/4-4},${sign*h+sign*8} ${-w/8},${sign*h+sign*14} 0,${sign*h+sign*18} C${w/8},${sign*h+sign*14} ${w/4+4},${sign*h+sign*8} ${w/4},${sign*h} Z" fill="#E8D5B5" stroke="#B88D5A" stroke-width="1"/>`;

    Object.entries(toothPositions).forEach(([num, pos]) => {
        const toothNum = parseInt(num);
        const isSelected = selectedTeeth.includes(toothNum);
        svg += drawTooth(pos.cx, pos.cy, pos.type, toothNum, isSelected);
    });
    svg += `</svg>`;
    return svg;
}

// دوال اختيار الأسنان (عامة)
window.toggleDentalTooth = function(toothNum) {
    if (!window._selectedDentalTeeth) window._selectedDentalTeeth = [];
    const idx = window._selectedDentalTeeth.indexOf(toothNum);
    if (idx > -1) {
        window._selectedDentalTeeth.splice(idx, 1);
        delete window._dentalTeethDetails[toothNum];
    } else {
        window._selectedDentalTeeth.push(toothNum);
        if (!window._dentalTeethDetails) window._dentalTeethDetails = {};
        window._dentalTeethDetails[toothNum] = { diagnosis: '', procedure: '', notes: '' };
    }
    // تحديث العرض
    const container = document.getElementById('dentalArchContainer');
    if (container) {
        container.innerHTML = getDentalArchCleanSVG(window._selectedDentalTeeth);
        // إعادة ربط الحدث
        Array.from(container.querySelectorAll('g')).forEach(g => {
            const onclickAttr = g.getAttribute('onclick');
            if (onclickAttr && onclickAttr.includes('toggleDentalTooth')) {
                g.style.cursor = 'pointer';
            }
        });
    }
    updateDentalSelectedDisplay();
    renderDentalTeethDetailsForm();
};

function updateDentalSelectedDisplay() {
    const names = (window._selectedDentalTeeth || []).map(t => `${t}`).join('، ');
    const labelSpan = document.getElementById('dv_selectedLabel');

function exportDentalPurchaseOrderToPDF(po, archive = false) {
    const html = `<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>طلب أسنان #${po.id}</title><style>body{font-family:'Tajawal',sans-serif;padding:20px}.header{background:#556B2F;color:white;padding:15px;text-align:center}.header img{width:60px}.items table{width:100%;border-collapse:collapse}</style></head><body><div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" class="logo-img"><h2>المستشفى السعودي الميداني - العبر</h2><h3>طلب شراء للأسنان #${po.id}</h3></div><div><p><strong>المورد:</strong> ${po.supplier}</p><p><strong>تاريخ الطلب:</strong> ${po.date}</p><p><strong>التسليم المتوقع:</strong> ${po.expectedDelivery || '-'}</p></div><div class="items"><table border="1"><thead><tr><th>الصنف</th><th>الكمية</th></tr></thead><tbody>${po.items.map(i => `<tr><td>${i.name}</td><td>${i.qty} ${i.unit}</td></tr>`).join('')}</tbody></table></div><p><strong>الملاحظات:</strong> ${po.notes || '-'}</p><script>window.print();<\/script></body></html>`;
    const blob = new Blob([html], { type: 'text/html' }); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `dental_order_${po.id}.html`; a.click();
    if (archive) {
        fetch(url).then(res => res.blob()).then(blob => {
            const reader = new FileReader();
            reader.onloadend = function() { if (!APP.dentalPurchaseOrderAttachments) APP.dentalPurchaseOrderAttachments = {}; APP.dentalPurchaseOrderAttachments[po.id] = reader.result; saveToLocalStorage(); };
            reader.readAsDataURL(blob);
        }).catch(()=>{});
    }
}

function rejectDentalPurchaseOrder(id) { const po = APP.dentalPurchaseOrders.find(o => o.id === id); if (po) { po.status = 'rejected'; showToast('تم الرفض', 'success'); saveToFirebase(); saveToLocalStorage(); renderDentalTab('orders'); } }

    const pending = (APP.nursingTasks || []).filter(t => t.status === 'pending');
    const completed = (APP.nursingTasks || []).filter(t => t.status === 'completed').slice(-10).reverse();
    if (!pending.length && !completed.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10">لا توجد مهام تمريضية مسجلة</p>'; return; }
    let html = `<div><h3 class="font-bold text-warning mb-2">المهام المعلقة (${pending.length})</h3><div class="space-y-2">`;
    pending.forEach(t => {
        html += `<div class="border-l-4 border-warning bg-yellow-50 p-3 rounded"><div class="flex justify-between"><div><p class="font-bold">${t.patientName} (${t.medicalId})</p><p class="text-sm">${t.type}: ${t.description || ''}</p><p class="text-xs text-gray-500">طلب: ${t.requestedBy} | ${t.date}</p></div><button onclick="completeNursingTask(${t.id})" class="btn-olive text-xs px-3 py-1 rounded">إكمال</button></div></div>`;
    });
    html += `</div><div class="mt-6"><h3 class="font-bold text-success mb-2">المهام المكتملة حديثاً</h3><div class="space-y-2">`;
    completed.forEach(t => {
        html += `<div class="border-l-4 border-success bg-green-50 p-3 rounded"><div class="flex justify-between"><div><p class="font-bold">${t.patientName}</p><p class="text-sm">${t.type}</p><p class="text-xs text-gray-500">أكملها: ${t.completedBy} | ${t.completedDate}</p></div></div></div>`;

    lucide.createIcons();

function renderNursingPatientRecords(container) {
    container.innerHTML = `<div class="mb-4"><label class="font-bold text-olive">اختر مريضاً لعرض السجل التمريضي:</label><select id="nursingRecordPatientSelect" class="input-field w-64 mr-2" onchange="loadNursingPatientRecord()"><option value="">-- اختر مريض --</option>${APP.patients.map(p => `<option value="${p.id}">${p.name} (${p.medicalId})</option>`).join('')}</select></div><div id="nursingRecordDetail" class="bg-gray-50 rounded-lg p-4 min-h-[250px]"><p class="text-gray-400 text-center">اختر مريضاً لعرض السجل التمريضي الكامل.</p></div>`;
}

function loadNursingPatientRecord() {
    const patientId = parseInt(document.getElementById('nursingRecordPatientSelect').value);
    if (!patientId) return;
    const patient = APP.patients.find(p => p.id === patientId);
    const nursingRecord = APP.nursingPatientRecords?.[patientId] || { carePlan: [], notes: [], triage: null, admissions: [] };
    const vitals = (APP.vitalSigns || []).filter(v => v.patientId === patientId).slice(-10);
    const tasks = (APP.nursingTasks || []).filter(t => t.patientId === patientId);
    const emergencyVisit = APP.emergencyVisits?.find(v => v.patientId === patientId);
    const admission = APP.admissionRecords?.find(a => a.patientId === patientId && !a.dischargeDate);
    const container = document.getElementById('nursingRecordDetail');
    container.innerHTML = `<div><h3 class="font-bold text-olive text-lg">السجل التمريضي - ${patient.name} (${patient.medicalId})</h3>${admission ? `<div class="bg-blue-100 p-2 rounded mt-2"><span class="font-bold">حالة التنويم:</span> من ${admission.admitDate} | القسم: ${admission.ward} | التشخيص: ${admission.diagnosis}</div>` : ''}${emergencyVisit ? `<div class="bg-red-100 p-2 rounded mt-2"><span class="font-bold">زيارة طوارئ سابقة:</span> ${emergencyVisit.date} | التقييم: ${emergencyVisit.triage}</div>` : ''}<div class="mt-3"><h4 class="font-bold">خطط الرعاية التمريضية</h4><ul class="list-disc pr-5">${nursingRecord.carePlan.map(c => `<li>${c.date}: ${c.plan} (بواسطة ${c.nurse})</li>`).join('') || '<li>لا توجد خطط مسجلة</li>'}</ul><button onclick="addCarePlan(${patientId})" class="btn-olive text-xs mt-1 px-2 py-1 rounded">+ إضافة خطة رعاية</button></div><div class="mt-3"><h4 class="font-bold">ملاحظات التمريض</h4><ul class="list-disc pr-5">${nursingRecord.notes.map(n => `<li>${n.date}: ${n.text} (${n.nurse})</li>`).join('') || '<li>لا توجد ملاحظات</li>'}</ul><button onclick="addNursingNoteToRecord(${patientId})" class="btn-accent text-xs mt-1 px-2 py-1 rounded">+ إضافة ملاحظة</button></div><div class="mt-3"><h4 class="font-bold">آخر العلامات الحيوية</h4><div class="grid grid-cols-2 gap-2 text-sm">${vitals.length ? vitals.map(v => `<div>${new Date(v.date).toLocaleString()}: ${v.temperature}°C, ${v.bloodPressure}</div>`).join('') : '<p>لا توجد</p>'}</div></div><div class="mt-3"><h4 class="font-bold">المهام التمريضية المنفذة</h4><ul>${tasks.slice(-5).map(t => `<li>${t.type} - ${t.status} (${t.date})</li>`).join('') || '<li>لا توجد</li>'}</ul></div></div>`;
    lucide.createIcons();
}

function addCarePlan(patientId) {
    const plan = prompt('أدخل خطة الرعاية التمريضية (مثال: مراقبة العلامات الحيوية كل 4 ساعات، تغيير الضماد يومياً)');
    if (!plan) return;
    if (!APP.nursingPatientRecords[patientId]) APP.nursingPatientRecords[patientId] = { carePlan: [], notes: [] };
    APP.nursingPatientRecords[patientId].carePlan.push({ date: new Date().toISOString().split('T')[0], plan, nurse: APP.currentUser?.name });
    showToast('تمت إضافة خطة الرعاية', 'success');
    saveToFirebase(); saveToLocalStorage(); loadNursingPatientRecord();
}
function addNursingNoteToRecord(patientId) {
    const text = prompt('أدخل الملاحظة التمريضية:');
    if (!text) return;
    if (!APP.nursingPatientRecords[patientId]) APP.nursingPatientRecords[patientId] = { carePlan: [], notes: [] };
    APP.nursingPatientRecords[patientId].notes.push({ date: new Date().toISOString().split('T')[0], text, nurse: APP.currentUser?.name });
    showToast('تمت إضافة الملاحظة', 'success');
    saveToFirebase(); saveToLocalStorage(); loadNursingPatientRecord();
}
function addTriageNote(patientId) {
    const triage = prompt('تقييم أولي للمريض في الطوارئ (الدرجة، الأعراض الرئيسية، الإجراءات الأولية)');
    if (!triage) return;
    if (!APP.emergencyVisits) APP.emergencyVisits = [];
    APP.emergencyVisits.push({ patientId, date: new Date().toISOString().split('T')[0], triage, nurse: APP.currentUser?.name });
    showToast('تم تسجيل التقييم الأولي', 'success');
    saveToFirebase(); saveToLocalStorage(); renderNursingTab('patients');
}
function admitPatient(patientId) {
    const ward = prompt('اختر الجناح (العناية المركزة، الجناح الداخلي، جراحة)');
    if (!ward) return;
    const diagnosis = prompt('التشخيص المبدئي للتنويم');
    if (!APP.admissionRecords) APP.admissionRecords = [];
    APP.admissionRecords.push({ patientId, admitDate: new Date().toISOString().split('T')[0], ward, diagnosis, nurse: APP.currentUser?.name });
    const patient = APP.patients.find(p => p.id === patientId);
    if (patient) patient.status = 'مقيم';
    showToast(`تم تحويل المريض إلى التنويم في قسم ${ward}`, 'success');
    saveToFirebase(); saveToLocalStorage(); renderNursingTab('patients');
}
function showNursingCarePlan(patientId) {
    document.getElementById('nursingRecordPatientSelect').value = patientId;
    loadNursingPatientRecord();
    renderNursingTab('records');
}
function addNursingNote(patientId) { addNursingNoteToRecord(patientId); }

function openNursingDrugModal() {
    const pending = APP.prescriptions.filter(p => !p.dispensed);

    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إعطاء دواء</h3></div><div class="p-6"><select id="ad_prescription_select" class="input-field mb-3"><option value="">-- اختر الوصفة --</option>${pending.map(pr => `<option value="${pr.id}">${pr.patient} - ${pr.meds}</option>`).join('')}</select><button onclick="loadAdminForm()" class="btn-olive w-full">متابعة</button></div>`);

function loadAdminForm() {
    const prescId = document.getElementById('ad_prescription_select').value;

function administerDrugFromList(prescriptionId) {
    const pr = APP.prescriptions.find(x => x.id === prescriptionId);
    if (!pr) return;
    openModal(`<div class="modal-header"><h3 class="font-bold text-lg">إعطاء دواء - ${pr.patient}</h3></div><div class="p-6"><p class="text-sm mb-3"><strong>الوصفة:</strong> ${pr.meds}</p><div class="grid grid-cols-2 gap-3"><input id="ad_time" type="time" class="input-field" value="${new Date().toTimeString().slice(0,5)}"><input id="ad_dose" class="input-field" placeholder="الجرعة المعطاة"></div><textarea id="ad_notes" class="input-field mt-3" rows="2" placeholder="ملاحظات..."></textarea><div class="flex gap-2 mt-4"><button onclick="confirmDrugAdmin(${prescriptionId})" class="btn-olive flex-1">تأكيد</button><button onclick="closeModal()" class="border px-6 py-2 rounded-lg">إلغاء</button></div></div>`);
}
function confirmDrugAdmin(prescriptionId) {
    APP.drugAdministrations = APP.drugAdministrations || [];
    APP.drugAdministrations.push({ id: Date.now(), prescriptionId, nurse: APP.currentUser?.name, time: document.getElementById('ad_time').value, dose: document.getElementById('ad_dose').value, notes: document.getElementById('ad_notes').value, date: new Date().toISOString().split('T')[0] });
    const pr = APP.prescriptions.find(p => p.id === prescriptionId);
    if (pr) pr.dispensed = true;
    closeModal(); showToast('تم تسجيل إعطاء الدواء', 'success');
    saveToFirebase(); saveToLocalStorage(); renderNursingTab(_currentNursingTab);
}
function completeNursingTask(taskId) {
    const task = (APP.nursingTasks || []).find(t => t.id === taskId);
    if (task) { task.status = 'completed'; task.completedBy = APP.currentUser?.name; task.completedDate = new Date().toISOString().split('T')[0]; showToast('تم إكمال المهمة', 'success'); saveToFirebase(); saveToLocalStorage(); renderNursingTab(_currentNursingTab); }
}
function showNursingReport() {

}

function renderDashboard(c) {
    const role = APP.currentUser?.role;
    if (role === 'admin') renderAdminDashboard(c);
    else if (role === 'reception') renderReceptionDashboard(c);
    else if (role === 'doctor') renderDoctorDashboard(c);
    else if (role === 'lab') renderLabDashboard(c);
    else if (role === 'radiology') renderRadiologyDashboard(c);
    else if (role === 'pharmacy') renderPharmacyDashboard(c);
    else if (role === 'nurse') renderNursingDashboard(c);
    else c.innerHTML = '<p class="text-center py-10 text-gray-400">لوحة تحكم غير متاحة</p>';
}

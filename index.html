<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة المستشفى | المستشفى السعودي الميداني</title>

  <!-- مكتبات الأيقونات والرسوم البيانية -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- خط Noto Kufi Arabic -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- إعدادات Tailwind الأساسية (الألوان) -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            olive: { 50:'#f6f7f2',100:'#e8eadb',200:'#d3d7ba',300:'#b5bb8e',400:'#98a06a',500:'#7a8450',600:'#5f673d',700:'#4a5032',800:'#3c412b',900:'#343827' },
            gold: { 50:'#fefcf0',100:'#fdf6d1',200:'#faeaa3',300:'#f6d96b',400:'#f1c83e',500:'#d9a825',600:'#b8841b',700:'#945f19',800:'#7a4d1c',900:'#65401c' }
          }
        }
      }
    }
  </script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, get, update, remove, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCAVOwsOwIBERN4QimSgky_-QpF7vmVcaE",
      authDomain: "hospital-d79e3.firebaseapp.com",
      projectId: "hospital-d79e3",
      storageBucket: "hospital-d79e3.firebasestorage.app",
      messagingSenderId: "624434865556",
      appId: "1:624434865556:web:fc0b25653a87bbb17c1b81"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // تعريض الكائنات للنطاق العام
    window.firebaseApp = app;
    window.auth = auth;
    window.db = db;
    window.firebaseAuth = { signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword };

</head>
<body class="h-full bg-olive-50 dark:bg-gray-900 text-olive-900 dark:text-gray-100 overflow-auto">

<div id="app" class="h-full w-full flex flex-col">
  <!-- حاوية الإشعارات -->
  <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2"></div>
  <!-- سيتم حقن المحتوى الرئيسي هنا عبر JavaScript -->
  <div id="app-content" class="flex-1 flex flex-col"></div>
</div>

<!-- مؤشر التحميل العام -->
<div id="global-loading" class="fixed inset-0 bg-black/20 z-[10000] hidden items-center justify-center">
  <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-xl flex items-center gap-3">
    <div class="loading-spinner"></div>
    <span class="text-sm">جاري التحميل...</span>
  </div>
</div>
<style>
  * {
    font-family: 'Noto Kufi Arabic', sans-serif;
  }
  html, body {
    height: 100%;
    margin: 0;
  }
  .fade-in {
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-hover {
    transition: all 0.2s;
  }
  .card-hover:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: #b5bb8e;
    border-radius: 3px;
  }
  .toast {
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  .loading-spinner {
    border: 3px solid rgba(95,103,61,0.2);
    border-radius: 50%;
    border-top: 3px solid #5f673d;
    width: 24px;
    height: 24px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
<script>
  window.HMS = {
    currentUser: null,
    userRole: null,
    userData: null,
    departments: [],
    deathTypes: [],
    patients: [],
    employees: [],
    inventory: [],
    appointments: []
  };

  window.showToast = (msg, type = 'info') => {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast px-4 py-2 rounded-lg text-white ${
      type === 'success' ? 'bg-olive-600' : (type === 'error' ? 'bg-red-600' : 'bg-gray-700')
    }`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  };

  window.showLoading = (show) => {
    document.getElementById('global-loading').classList.toggle('hidden', !show);
  };

  window.toggleDark = () => {
    document.documentElement.classList.toggle('dark');
  };

  const dbRef = (path) => window.firebaseDB.ref(window.db, path);
  const dbGet = async (path) => (await window.firebaseDB.get(dbRef(path))).val();
  const dbSet = (path, data) => window.firebaseDB.set(dbRef(path), data);
  const dbPush = (path, data) => window.firebaseDB.push(dbRef(path), data);
  const dbUpdate = (path, data) => window.firebaseDB.update(dbRef(path), data);
  const dbRemove = (path) => window.firebaseDB.remove(dbRef(path));

  window.dbGet = dbGet;
  window.dbSet = dbSet;
  window.dbPush = dbPush;
  window.dbUpdate = dbUpdate;
  window.dbRemove = dbRemove;

  async function loadDepartments() {
    const depts = await dbGet('departments');
    if (depts) {
      window.HMS.departments = Object.entries(depts).map(([key, val]) => ({ key, ...val }));
    } else {
      window.HMS.departments = [
        { key:'emergency', label:'الطوارئ', icon:'🚑', color:'#ef4444' },
        { key:'inpatient', label:'التنويم', icon:'🛏️', color:'#06b6d4' },
        { key:'internal', label:'الباطنية', icon:'💊', color:'#10b981' },
        { key:'surgery', label:'الجراحة', icon:'🔪', color:'#3b82f6' }
      ];
    }
    const deaths = await dbGet('deathTypes');
    if (deaths) {
      window.HMS.deathTypes = Object.entries(deaths).map(([key, val]) => ({ key, ...val }));
    } else {
      window.HMS.deathTypes = [
        { key:'natural', label:'طبيعية', icon:'⚫', color:'#6b7280' },
        { key:'accident', label:'حوادث', icon:'🔴', color:'#dc2626' }
      ];
    }
  }
  window.loadDepartments = loadDepartments;

  window.closeModal = (id) => {
    const modal = document.getElementById(id);
    if (modal) modal.remove();
  };

  window.logout = async () => {
    try {
      await window.firebaseAuth.signOut(window.auth);
      window.HMS.currentUser = null;
      window.HMS.userRole = null;
      window.HMS.userData = null;
    } catch(e) {
      showToast('خطأ في تسجيل الخروج', 'error');
    }
  };
</script>
<script>
  window.renderLoginPage = () => {
    const appContent = document.getElementById('app-content');
    appContent.innerHTML = `
      <div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
          <div class="text-center">
            <img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="شعار المستشفى" class="mx-auto h-20 w-20 rounded-xl object-contain bg-white shadow-md" onerror="this.style.background='linear-gradient(135deg,#5f673d,#d9a825)';this.alt='الشعار';">
            <h2 class="mt-6 text-3xl font-extrabold text-olive-800 dark:text-olive-200">نظام إدارة المستشفى</h2>
            <p class="mt-2 text-sm text-olive-600 dark:text-olive-400">المستشفى السعودي الميداني - العبر</p>
          </div>
          <form class="mt-8 space-y-6" id="login-form" onsubmit="return false;">
            <div class="rounded-md shadow-sm -space-y-px">
              <div>
                <label for="email" class="sr-only">البريد الإلكتروني</label>
                <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-olive-300 dark:border-gray-600 placeholder-olive-500 dark:placeholder-gray-400 text-olive-900 dark:text-white rounded-t-md focus:outline-none focus:ring-olive-500 focus:border-olive-500 focus:z-10 sm:text-sm bg-white dark:bg-gray-800" placeholder="البريد الإلكتروني">
              </div>
              <div>
                <label for="password" class="sr-only">كلمة المرور</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-olive-300 dark:border-gray-600 placeholder-olive-500 dark:placeholder-gray-400 text-olive-900 dark:text-white rounded-b-md focus:outline-none focus:ring-olive-500 focus:border-olive-500 focus:z-10 sm:text-sm bg-white dark:bg-gray-800" placeholder="كلمة المرور">
              </div>
            </div>
            <div>
              <button type="submit" id="login-btn" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-olive-600 hover:bg-olive-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-olive-500">
                <span class="absolute right-0 inset-y-0 flex items-center pr-3">
                  <i data-lucide="log-in" class="h-5 w-5 text-olive-300 group-hover:text-olive-200"></i>
                </span>
                تسجيل الدخول
              </button>
            </div>
            <div class="text-center">
              <button type="button" onclick="showFirstTimeSetup()" class="text-sm text-gold-600 hover:text-gold-500">إنشاء حساب مدير النظام (لأول مرة)</button>
            </div>
          </form>
          <div id="setup-section" class="hidden mt-4 p-4 border border-dashed border-olive-300 dark:border-gray-600 rounded-lg">
            <h3 class="font-bold text-md mb-3 text-center">تهيئة النظام - إنشاء مدير</h3>
            <form id="setup-form" onsubmit="return false;">
              <div class="space-y-3">
                <input id="setup-email" type="email" placeholder="البريد الإلكتروني" class="w-full px-3 py-2 border rounded bg-white dark:bg-gray-700" required>
                <input id="setup-password" type="password" placeholder="كلمة المرور" class="w-full px-3 py-2 border rounded bg-white dark:bg-gray-700" required>
                <input id="setup-name" type="text" placeholder="الاسم الكامل" class="w-full px-3 py-2 border rounded bg-white dark:bg-gray-700" required>
                <button type="submit" class="w-full py-2 bg-gold-500 text-white rounded-lg hover:bg-gold-600">إنشاء حساب المدير</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    `;
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = 'جاري تسجيل الدخول...';
      try {
        const userCredential = await window.firebaseAuth.signInWithEmailAndPassword(window.auth, email, password);
        const user = userCredential.user;
        const userRef = dbRef(`users/${user.uid}`);
        const snapshot = await dbGet(`users/${user.uid}`);
        if (snapshot) {
          window.HMS.currentUser = user;
          window.HMS.userData = snapshot;
          window.HMS.userRole = snapshot.role;
          renderMainApp('dashboard');
        } else {
          await window.firebaseAuth.signOut(window.auth);
          showToast('المستخدم غير مسجل في قاعدة البيانات', 'error');
        }
      } catch (error) {
        let msg = 'فشل تسجيل الدخول';
        if (error.code === 'auth/user-not-found') msg = 'المستخدم غير موجود';
        else if (error.code === 'auth/wrong-password') msg = 'كلمة المرور خاطئة';
        else if (error.code === 'auth/invalid-email') msg = 'بريد إلكتروني غير صالح';
        showToast(msg, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="absolute right-0 inset-y-0 flex items-center pr-3"><i data-lucide="log-in" class="h-5 w-5 text-olive-300 group-hover:text-olive-200"></i></span>تسجيل الدخول';
        lucide.createIcons();
      }
    });

    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('setup-email').value;
      const password = document.getElementById('setup-password').value;
      const name = document.getElementById('setup-name').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'جاري الإنشاء...';
      try {
        const usersRef = dbRef('users');
        const adminQuery = window.firebaseDB.query(usersRef, window.firebaseDB.orderByChild('role'), window.firebaseDB.equalTo('Admin'));
        const snapshot = await window.firebaseDB.get(adminQuery);
        if (snapshot.exists()) {
          showToast('يوجد مدير نظام بالفعل. لا يمكن إنشاء مدير جديد من هذه الواجهة.', 'error');
          btn.disabled = false;
          btn.textContent = 'إنشاء حساب المدير';
          return;
        }
        const userCredential = await window.firebaseAuth.createUserWithEmailAndPassword(window.auth, email, password);
        const user = userCredential.user;
        const userData = {
          email: email,
          fullName: name,
          role: 'Admin',
          department: 'الإدارة',
          createdAt: new Date().toISOString()
        };
        await dbSet(`users/${user.uid}`, userData);
        showToast('تم إنشاء حساب المدير بنجاح. يمكنك الآن تسجيل الدخول.', 'success');
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('email').value = email;
        document.getElementById('password').value = '';
      } catch (error) {
        let msg = 'حدث خطأ';
        if (error.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم بالفعل';
        else if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة (6 أحرف على الأقل)';
        showToast(msg, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'إنشاء حساب المدير';
      }
    });
  };

  window.showFirstTimeSetup = () => {
    document.getElementById('setup-section').classList.remove('hidden');
  };
</script>
<script>
  window.renderMainApp = async (activePage = 'dashboard', subParams = null) => {
    const userData = window.HMS.userData;
    const role = window.HMS.userRole;
    const appContent = document.getElementById('app-content');
    
    const navItems = [
      { id: 'dashboard', label: 'لوحة التحكم', icon: 'layout-dashboard', roles: ['Admin', 'Doctor', 'Nurse', 'Accountant', 'HR Manager', 'Pharmacist', 'Receptionist'] },
      { id: 'patients', label: 'المرضى والعيادات', icon: 'users', roles: ['Admin', 'Doctor', 'Nurse', 'Receptionist'] },
      { id: 'departments', label: 'الأقسام الطبية', icon: 'building', roles: ['Admin', 'Doctor', 'Nurse'] },
      { id: 'pharmacy', label: 'الصيدلية والمستودع', icon: 'pill', roles: ['Admin', 'Pharmacist'] },
      { id: 'hr', label: 'الموارد البشرية', icon: 'briefcase', roles: ['Admin', 'HR Manager'] },
      { id: 'reports', label: 'التقارير', icon: 'file-text', roles: ['Admin', 'Doctor', 'Accountant', 'HR Manager'] },
      { id: 'admin', label: 'الإدارة', icon: 'settings', roles: ['Admin'] },
      { id: 'users', label: 'إدارة المستخدمين', icon: 'shield', roles: ['Admin'] }
    ];

    const filteredNav = navItems.filter(item => item.roles.includes(role));

    let html = `
      <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-olive-200 dark:border-gray-700 sticky top-0 z-50">
        <div class="w-full px-4 py-3 flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="شعار المستشفى" class="w-10 h-10 rounded-lg object-contain bg-white shadow-sm">
            <div>
              <h1 class="text-lg md:text-xl font-bold text-olive-800 dark:text-olive-200">نظام إدارة المستشفى</h1>
              <p class="text-xs text-olive-500 dark:text-olive-400">${userData.fullName} (${role})</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleDark()" class="p-2 rounded-lg bg-olive-100 dark:bg-gray-700 hover:bg-olive-200 dark:hover:bg-gray-600 transition">
              <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i><i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button onclick="logout()" class="hidden md:flex items-center gap-1 px-3 py-2 rounded-lg text-sm font-semibold bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200 transition">
              <i data-lucide="log-out" class="w-4 h-4"></i> خروج
            </button>
          </div>
        </div>
        <nav class="w-full px-4 pb-2 flex gap-2 overflow-x-auto">
    `;

    filteredNav.forEach(item => {
      html += `<button onclick="navigateTo('${item.id}')" data-nav="${item.id}" class="nav-btn px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap bg-olive-100 dark:bg-gray-700 text-olive-700 dark:text-gray-300">
        <i data-lucide="${item.icon}" class="w-3 h-3 inline ml-1"></i> ${item.label}
      </button>`;
    });

    html += `
        </nav>
      </header>
      <main class="flex-1 w-full overflow-auto" id="main-content"></main>
      <footer class="bg-white dark:bg-gray-800 border-t py-3 px-4 text-center text-xs text-olive-500">جميع الحقوق محفوظة للمستشفى السعودي الميداني - العبر © 2026</footer>
    `;

    appContent.innerHTML = html;
    lucide.createIcons();

    await loadPageContent(activePage, subParams);

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.remove('bg-olive-600', 'text-white');
      btn.classList.add('bg-olive-100', 'dark:bg-gray-700', 'text-olive-700');
    });
    const activeBtn = document.querySelector(`[data-nav="${activePage}"]`);
    if (activeBtn) {
      activeBtn.classList.add('bg-olive-600', 'text-white');
      activeBtn.classList.remove('bg-olive-100', 'dark:bg-gray-700', 'text-olive-700');
    }
  };

  window.navigateTo = (page, subParams) => {
    renderMainApp(page, subParams);
  };

  window.loadPageContent = async (page, params) => {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
    
    if (page === 'dashboard') {
      const role = window.HMS.userRole;
      if (role === 'Receptionist') await renderReceptionistDashboard();
      else if (role === 'Doctor') await renderDoctorDashboard();
      else if (role === 'Nurse') await renderNurseDashboard();
      else await renderAdminDashboard();
    } else if (page === 'patients') {
      await renderPatientsPage(params);
    } else if (page === 'departments') {
      await renderDepartmentsPage();
    } else if (page === 'pharmacy') {
      await renderPharmacyPage();
    } else if (page === 'hr') {
      await renderHRPage();
    } else if (page === 'reports') {
      await renderReportsPage();
    } else if (page === 'admin') {
      await renderAdminPage();
    } else if (page === 'users') {
      await renderUsersPage();
    } else {
      mainContent.innerHTML = `<div class="p-6 text-center">الصفحة غير موجودة</div>`;
    }
  };
</script>
<script>
  async function renderAdminDashboard() {
    const mainContent = document.getElementById('main-content');
    await loadDepartments();
    const patientsCount = (await dbGet('patients')) ? Object.keys(await dbGet('patients')).length : 0;
    const employeesCount = (await dbGet('employees')) ? Object.keys(await dbGet('employees')).length : 0;
    const appointmentsToday = 0;
    const revenue = 0;
    
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <div class="card-hover bg-white dark:bg-gray-800 rounded-xl p-4 border"><div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center"><i data-lucide="users" class="w-4 h-4 text-blue-600"></i></div><span class="text-xs">إجمالي المرضى</span></div><p class="text-2xl font-bold">${patientsCount}</p></div>
          <div class="card-hover bg-white dark:bg-gray-800 rounded-xl p-4 border"><div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 rounded-lg bg-green-100 dark:bg-green-900/30 flex items-center justify-center"><i data-lucide="calendar" class="w-4 h-4 text-green-600"></i></div><span class="text-xs">مواعيد اليوم</span></div><p class="text-2xl font-bold">${appointmentsToday}</p></div>

      const doctors = Object.entries(users).filter(([id, u]) => u.role === 'Doctor');
      doctorSelect.innerHTML = '<option value="">اختر طبيباً</option>' + doctors.map(([id, u]) => `<option value="${id}">${u.fullName}</option>`).join('');

  async function renderDoctorDashboard() {
    const mainContent = document.getElementById('main-content');
    const doctorId = window.HMS.currentUser.uid;
    const doctorName = window.HMS.userData?.fullName || 'الطبيب';
    mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
    const today = new Date().toISOString().split('T')[0];
    const appointmentsRef = window.firebaseDB.query(window.firebaseDB.ref(window.db, 'appointments'), window.firebaseDB.orderByChild('doctorId'), window.firebaseDB.equalTo(doctorId));
    const appointmentsSnapshot = await window.firebaseDB.get(appointmentsRef);
    const todaysAppointments = [];
    const waitingPatients = [];
    if (appointmentsSnapshot.exists()) {
      const apps = appointmentsSnapshot.val();
      Object.entries(apps).forEach(([id, app]) => {
        if (app.date === today && app.status !== 'completed') {
          todaysAppointments.push({ id, ...app });
          if (app.status === 'waiting') waitingPatients.push({ id, ...app });
        }
      });
    }
    const patients = await dbGet('patients') || {};
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <h2 class="text-xl font-bold mb-4">لوحة تحكم الطبيب - د. ${doctorName}</h2>
        <div class="grid grid-cols-3 gap-3 mb-6">
          <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">مواعيد اليوم</span><p class="text-2xl font-bold">${todaysAppointments.length}</p></div>
          <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">قيد الانتظار</span><p class="text-2xl font-bold">${waitingPatients.length}</p></div>
          <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">مرضى هذا الأسبوع</span><p class="text-2xl font-bold" id="weekly-count">-</p></div>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
            <h3 class="font-semibold mb-3"><i data-lucide="calendar" class="w-4 h-4 inline ml-1"></i> جدول مواعيد اليوم</h3>
            <div class="space-y-2 max-h-96 overflow-y-auto">
              ${todaysAppointments.length === 0 ? '<p class="text-center py-4 text-gray-500">لا توجد مواعيد اليوم</p>' : todaysAppointments.sort((a,b)=> (a.time||'').localeCompare(b.time||'')).map(app => {
                const patient = patients[app.patientId] || { fullName: 'مريض' };
                return `<div class="border rounded-lg p-3 flex justify-between items-center">
                  <div><span class="font-bold">${patient.fullName}</span><br><span class="text-xs">${app.time || ''}</span></div>
                  <div><span class="px-2 py-1 rounded-full text-xs ${app.status==='confirmed'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${app.status==='confirmed'?'مؤكد':'انتظار'}</span></div>
                  <button onclick="startConsultation('${app.patientId}')" class="text-olive-600 text-sm"><i data-lucide="stethoscope" class="w-4 h-4"></i> بدء الكشف</button>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
            <h3 class="font-semibold mb-3"><i data-lucide="users" class="w-4 h-4 inline ml-1"></i> المرضى المنتظرين</h3>
            <div class="space-y-2">
              ${waitingPatients.length === 0 ? '<p class="text-center py-4 text-gray-500">لا يوجد مرضى منتظرين</p>' : waitingPatients.map(app => {
                const patient = patients[app.patientId] || { fullName: 'مريض' };
                return `<div class="border rounded-lg p-3 flex justify-between items-center bg-yellow-50 dark:bg-yellow-900/20">
                  <div><span class="font-bold">${patient.fullName}</span><br><span class="text-xs">${app.time || ''}</span></div>
                  <button onclick="startConsultation('${app.patientId}')" class="px-3 py-1 bg-olive-600 text-white rounded-lg text-xs">استدعاء</button>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
    lucide.createIcons();
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
    const weekApps = Object.values(appointmentsSnapshot.val() || {}).filter(a => a.date >= weekAgo);
    document.getElementById('weekly-count').textContent = new Set(weekApps.map(a => a.patientId)).size;
  }

  window.startConsultation = (patientId) => { viewPatient(patientId); };

  async function renderNurseDashboard() {
    const mainContent = document.getElementById('main-content');
    const nurseDepartment = window.HMS.userData?.department || 'الطوارئ';
    mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
    const admissions = await dbGet('admissions') || {};
    const patients = await dbGet('patients') || {};
    const deptPatients = Object.entries(admissions).filter(([id, adm]) => adm.department === nurseDepartment && adm.status === 'active');
    const vitalsList = [];
    for (let [admId, adm] of deptPatients) {
      const patientVitals = await dbGet(`medicalRecords/${adm.patientId}/vitals`);
      const latest = patientVitals ? Object.entries(patientVitals).sort((a,b) => (b[1].date||'').localeCompare(a[1].date||''))[0] : null;
      vitalsList.push({ patientId: adm.patientId, admission: adm, latestVital: latest ? latest[1] : null });
    }
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <h2 class="text-xl font-bold mb-4">لوحة تحكم الممرض - قسم ${nurseDepartment}</h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
          <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">المرضى في القسم</span><p class="text-2xl font-bold">${deptPatients.length}</p></div>
          <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border"><span class="text-xs">تنبيهات الأدوية</span><p class="text-2xl font-bold text-orange-500">0</p></div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
          <h3 class="font-semibold mb-3">المرضى في القسم وآخر العلامات الحيوية</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr><th>المريض</th><th>الغرفة</th><th>آخر ضغط</th><th>آخر نبض</th><th>حرارة</th><th>إجراءات</th></tr></thead>
              <tbody>
                ${vitalsList.length === 0 ? '<tr><td colspan="6" class="text-center py-4">لا يوجد مرضى في هذا القسم</td></tr>' : vitalsList.map(v => {
                  const patient = patients[v.patientId] || { fullName: 'مريض' };
                  return `<tr><td>${patient.fullName}</td><td>${v.admission.room || '—'}</td><td>${v.latestVital?.bloodPressure || '—'}</td><td>${v.latestVital?.pulse || '—'}</td><td>${v.latestVital?.temperature || '—'}</td><td><button onclick="viewPatient('${v.patientId}')" class="text-olive-600"><i data-lucide="activity" class="w-4 h-4"></i> فتح</button></td></tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

    lucide.createIcons();

</script>
<script>
  async function renderPatientsPage(params) {
    const mainContent = document.getElementById('main-content');
    if (params && params.view === 'medicalRecord' && params.patientId) {
      await viewPatient(params.patientId);
      return;
    }
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-lg">إدارة المرضى</h2>
            <button onclick="showAddPatientModal()" class="px-4 py-2 bg-olive-600 text-white rounded-lg text-sm"><i data-lucide="plus" class="w-4 h-4 inline"></i> مريض جديد</button>
          </div>
          <div class="mb-4 flex gap-2">
            <input type="text" id="patient-search" placeholder="بحث..." class="flex-1 px-3 py-2 border rounded-lg bg-white dark:bg-gray-700">
            <button onclick="searchPatients()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 rounded-lg">بحث</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr class="border-b-2"><th class="py-2 px-2 text-right">الرقم الطبي</th><th class="py-2 px-2 text-right">الاسم</th><th class="py-2 px-2 text-right">تاريخ الميلاد</th><th class="py-2 px-2 text-right">الهاتف</th><th class="py-2 px-2 text-center">إجراءات</th></tr></thead>
              <tbody id="patients-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    `;
    lucide.createIcons();
    await loadPatientsList();
  }

  async function loadPatientsList() {
    const patients = await dbGet('patients');
    const tbody = document.getElementById('patients-table-body');
    if (!patients) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">لا يوجد مرضى</td></tr>'; return; }
    let html = '';
    Object.entries(patients).forEach(([id, p]) => {
      html += `<tr class="border-b"><td>${p.medicalId || id}</td><td>${p.fullName}</td><td>${p.birthDate || '-'}</td><td>${p.phone || '-'}</td>
        <td class="text-center"><button onclick="viewPatient('${id}')" class="text-blue-600 mx-1"><i data-lucide="eye" class="w-4 h-4 inline"></i></button>
        <button onclick="editPatient('${id}')" class="text-olive-600 mx-1"><i data-lucide="edit" class="w-4 h-4 inline"></i></button></td></tr>`;
    });
    tbody.innerHTML = html;
    lucide.createIcons();
  }

  window.searchPatients = async () => {
    const term = document.getElementById('patient-search')?.value.trim().toLowerCase() || '';
    const tbody = document.getElementById('patients-table-body');
    if (!tbody) return;
    const patients = await dbGet('patients') || {};
    const filtered = Object.entries(patients).filter(([id, p]) => p.fullName?.toLowerCase().includes(term) || p.medicalId?.toLowerCase().includes(term) || p.phone?.includes(term));
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">لا توجد نتائج</td></tr>'; return; }
    let html = '';
    filtered.forEach(([id, p]) => {
      html += `<tr class="border-b"><td>${p.medicalId || id}</td><td>${p.fullName}</td><td>${p.birthDate || '-'}</td><td>${p.phone || '-'}</td>
        <td class="text-center"><button onclick="viewPatient('${id}')" class="text-blue-600 mx-1"><i data-lucide="eye" class="w-4 h-4 inline"></i></button>
        <button onclick="editPatient('${id}')" class="text-olive-600 mx-1"><i data-lucide="edit" class="w-4 h-4 inline"></i></button></td></tr>`;
    });
    tbody.innerHTML = html;
    lucide.createIcons();
  };

  window.showAddPatientModal = () => {
    const modal = document.createElement('div');
    modal.id = 'patient-modal';
    modal.className = 'fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <h3 class="font-bold text-lg mb-4">إضافة مريض جديد</h3>
        <form id="add-patient-form" onsubmit="return false;">
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-sm mb-1">الاسم الكامل</label><input name="fullName" required class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">الرقم الطبي</label><input name="medicalId" required class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">تاريخ الميلاد</label><input name="birthDate" type="date" class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">الجنس</label><select name="gender" class="w-full px-3 py-2 border rounded"><option>ذكر</option><option>أنثى</option></select></div>
            <div><label class="block text-sm mb-1">فصيلة الدم</label><input name="bloodType" class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">رقم الهاتف</label><input name="phone" class="w-full px-3 py-2 border rounded"></div>
            <div class="col-span-2"><label class="block text-sm mb-1">العنوان</label><input name="address" class="w-full px-3 py-2 border rounded"></div>
            <div class="col-span-2"><label class="block text-sm mb-1">الأمراض المزمنة</label><input name="chronicDiseases" class="w-full px-3 py-2 border rounded"></div>
            <div class="col-span-2"><label class="block text-sm mb-1">الحساسية</label><input name="allergies" class="w-full px-3 py-2 border rounded"></div>
          </div>
          <div class="flex gap-3 mt-6">
            <button type="submit" class="flex-1 py-2 rounded-lg bg-olive-600 text-white">حفظ</button>
            <button type="button" onclick="closeModal('patient-modal')" class="flex-1 py-2 rounded-lg border">إلغاء</button>
          </div>
        </form>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('add-patient-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const patient = Object.fromEntries(formData.entries());
      patient.registeredAt = new Date().toISOString();
      const newRef = dbPush('patients');
      await dbSet(`patients/${newRef.key}`, patient);
      showToast('تمت إضافة المريض', 'success');
      closeModal('patient-modal');
      loadPatientsList();
    });
  };

  window.viewPatient = async (patientId) => {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>`;
    const patient = (await dbGet(`patients/${patientId}`)) || {};
    const visits = (await dbGet(`medicalRecords/${patientId}/visits`)) || {};
    const vitals = (await dbGet(`medicalRecords/${patientId}/vitals`)) || {};
    const role = window.HMS.userRole;
    const canEditMedical = ['Admin', 'Doctor'].includes(role);
    const canAddVitals = ['Admin', 'Doctor', 'Nurse'].includes(role);
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="bg-white dark:bg-gray-800 rounded-xl border p-4 mb-4">
          <div class="flex justify-between items-center">
            <div>
              <h2 class="font-bold text-xl">${patient.fullName || 'مريض'}</h2>
              <p class="text-sm text-olive-600">رقم الملف: ${patient.medicalId || patientId} | تاريخ الميلاد: ${patient.birthDate || ''} | فصيلة الدم: ${patient.bloodType || ''}</p>
            </div>
            <button onclick="navigateTo('patients')" class="text-olive-600"><i data-lucide="arrow-right" class="w-5 h-5"></i> عودة</button>
          </div>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl border">
          <div class="border-b px-4 py-2 flex gap-4">
            <button class="tab-btn active px-4 py-2 text-sm font-semibold border-b-2 border-olive-600 text-olive-600" onclick="switchPatientTab('visits', '${patientId}')">الزيارات</button>
            <button class="tab-btn px-4 py-2 text-sm font-semibold" onclick="switchPatientTab('vitals', '${patientId}')">العلامات الحيوية</button>
            <button class="tab-btn px-4 py-2 text-sm font-semibold" onclick="switchPatientTab('prescriptions', '${patientId}')">الوصفات الطبية</button>
            <button class="tab-btn px-4 py-2 text-sm font-semibold" onclick="switchPatientTab('tests', '${patientId}')">الفحوصات</button>
          </div>
          <div id="patient-tab-content" class="p-4"></div>
        </div>
      </div>
    `;
    lucide.createIcons();
    switchPatientTab('visits', patientId);
  };

  window.switchPatientTab = async (tab, patientId) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('border-b-2', 'border-olive-600', 'text-olive-600'));
    event.target.classList.add('border-b-2', 'border-olive-600', 'text-olive-600');
    const contentDiv = document.getElementById('patient-tab-content');
    const role = window.HMS.userRole;
    const canEdit = ['Admin', 'Doctor'].includes(role);
    const canAddVitals = ['Admin', 'Doctor', 'Nurse'].includes(role);
    if (tab === 'visits') {
      const visits = (await dbGet(`medicalRecords/${patientId}/visits`)) || {};
      contentDiv.innerHTML = await renderVisitsTab(patientId, visits, canEdit);
    } else if (tab === 'vitals') {
      const vitals = (await dbGet(`medicalRecords/${patientId}/vitals`)) || {};
      contentDiv.innerHTML = await renderVitalsTab(patientId, vitals, canAddVitals);
    } else {
      contentDiv.innerHTML = `<p class="text-center py-8 text-gray-500">قيد التطوير</p>`;
    }
    lucide.createIcons();
  };

  async function renderVisitsTab(patientId, visits, canEdit) {
    let html = `<div class="flex justify-between items-center mb-3"><h3 class="font-semibold">سجل الزيارات</h3>`;

    else {
      html += `<div class="space-y-3">`;
      Object.entries(visits).sort((a,b) => (b[1].date || '').localeCompare(a[1].date || '')).forEach(([vid, visit]) => {
        html += `<div class="border rounded-lg p-3"><div class="flex justify-between"><span class="font-bold">${visit.date || ''}</span><span class="text-sm">د. ${visit.doctor || ''}</span></div>

        <form id="edit-patient-form" onsubmit="return false;">

<script>
  async function renderDepartmentsPage() {
    const mainContent = document.getElementById('main-content');
    await loadDepartments();
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-lg">الأقسام الطبية</h2>
            <button onclick="showAddDepartmentModal()" class="px-4 py-2 bg-olive-600 text-white rounded-lg text-sm"><i data-lucide="plus" class="w-4 h-4 inline"></i> إضافة قسم</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="departments-list"></div>
        </div>
        <div class="mt-6 bg-white dark:bg-gray-800 rounded-xl border p-4">
          <h3 class="font-bold text-lg mb-4">جدول المواعيد</h3>
          <div id="appointments-calendar"></div>
        </div>
      </div>
    `;
    renderDepartmentsList();
    await loadAppointmentsForCalendar();
    lucide.createIcons();
  }

  function renderDepartmentsList() {
    const container = document.getElementById('departments-list');
    container.innerHTML = window.HMS.departments.map(d => `
      <div class="border rounded-lg p-3 flex items-center justify-between">
        <div class="flex items-center gap-2"><span class="text-2xl">${d.icon}</span><span class="font-semibold">${d.label}</span></div>
        <div>
          <button onclick="editDepartment('${d.key}')" class="text-olive-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button>
          <button onclick="deleteDepartment('${d.key}')" class="text-red-500 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  window.showAddDepartmentModal = () => {
    const modal = document.createElement('div');
    modal.id = 'dept-modal';
    modal.className = 'fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-md w-full">
        <h3 class="font-bold text-lg mb-4">إضافة قسم جديد</h3>
        <form id="add-dept-form" onsubmit="return false;">
          <div class="space-y-3">
            <div><label class="block text-sm mb-1">اسم القسم</label><input name="label" required class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">الأيقونة (Emoji)</label><input name="icon" value="📌" class="w-full px-3 py-2 border rounded"></div>
            <div><label class="block text-sm mb-1">اللون</label><input name="color" type="color" value="#5f673d" class="w-full h-10 border rounded"></div>
          </div>
          <div class="flex gap-3 mt-6">
            <button type="submit" class="flex-1 py-2 rounded-lg bg-olive-600 text-white">حفظ</button>
            <button type="button" onclick="closeModal('dept-modal')" class="flex-1 py-2 rounded-lg border">إلغاء</button>
          </div>
        </form>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('add-dept-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const dept = Object.fromEntries(formData.entries());
      const key = dept.label.replace(/\s+/g, '_').toLowerCase();
      await dbSet(`departments/${key}`, dept);
      showToast('تم إضافة القسم', 'success');
      closeModal('dept-modal');
      await loadDepartments();
      renderDepartmentsList();
    });
  };

  window.editDepartment = async (key) => {
    const dept = window.HMS.departments.find(d => d.key === key);
    if (!dept) return;
    const modal = document.createElement('div');
    modal.id = 'edit-dept-modal';
    modal.className = 'fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-md w-full">
        <h3 class="font-bold text-lg mb-4">تعديل القسم</h3>
        <div class="space-y-3">
          <div><label>اسم القسم</label><input id="edit-dept-label" value="${dept.label}" class="w-full px-3 py-2 border rounded"></div>
          <div><label>الأيقونة</label><input id="edit-dept-icon" value="${dept.icon}" class="w-full px-3 py-2 border rounded"></div>
          <div><label>اللون</label><input id="edit-dept-color" type="color" value="${dept.color}" class="w-full h-10 border rounded"></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="saveDeptChanges('${key}')" class="flex-1 py-2 rounded-lg bg-olive-600 text-white">حفظ</button>
          <button onclick="closeModal('edit-dept-modal')" class="flex-1 py-2 rounded-lg border">إلغاء</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.saveDeptChanges = async (key) => {
    const label = document.getElementById('edit-dept-label').value;
    const icon = document.getElementById('edit-dept-icon').value;
    const color = document.getElementById('edit-dept-color').value;
    await dbUpdate(`departments/${key}`, { label, icon, color });
    await loadDepartments();
    renderDepartmentsList();
    closeModal('edit-dept-modal');
    showToast('تم تحديث القسم', 'success');
  };

  window.deleteDepartment = async (key) => {
    if (!confirm('هل أنت متأكد من حذف هذا القسم؟')) return;
    await dbRemove(`departments/${key}`);
    await loadDepartments();
    renderDepartmentsList();
    showToast('تم حذف القسم', 'success');
  };

  async function loadAppointmentsForCalendar() {
    const apps = await dbGet('appointments');
    const container = document.getElementById('appointments-calendar');
    if (!container) return;
    if (!apps) { container.innerHTML = '<p class="p-4 text-center">لا توجد مواعيد</p>'; return; }
    const today = new Date().toISOString().split('T')[0];
    const todayApps = Object.entries(apps).filter(([id, a]) => a.date === today);
    let html = '<div class="space-y-2">';
    const patients = await dbGet('patients') || {};
    const users = await dbGet('users') || {};
    todayApps.forEach(([id, app]) => {
      const patient = patients[app.patientId] || { fullName: 'مريض' };
      const doctor = users[app.doctorId] || { fullName: 'طبيب' };
      html += `<div class="border p-2 rounded flex justify-between"><span>${patient.fullName}</span><span>د. ${doctor.fullName}</span><span>${app.time || ''}</span><span class="text-xs px-2 py-1 rounded ${app.status==='confirmed'?'bg-green-100':'bg-yellow-100'}">${app.status}</span></div>`;
    });
    html += '</div>';
    container.innerHTML = html || '<p class="p-4 text-center">لا توجد مواعيد اليوم</p>';
  }

  async function renderPharmacyPage() {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
            <div class="flex justify-between items-center mb-4">
              <h2 class="font-bold text-lg">المخزون الحالي</h2>
              <button onclick="showAddMedicineModal()" class="px-3 py-1 bg-olive-600 text-white rounded-lg text-sm"><i data-lucide="plus" class="w-4 h-4 inline"></i> إضافة دواء</button>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead><tr><th>الدواء</th><th>الكمية</th><th>السعر</th><th>الانتهاء</th></tr></thead>
                <tbody id="inventory-table"></tbody>
              </table>
            </div>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-xl border p-4">
            <h2 class="font-bold text-lg mb-4">الوصفات المعلقة للصرف</h2>
            <div id="pending-prescriptions">لا توجد وصفات معلقة</div>
          </div>
        </div>
      </div>
    `;
    await loadInventory();
    lucide.createIcons();
  }

  async function loadInventory() {
    const inv = await dbGet('inventory');
    const tbody = document.getElementById('inventory-table');
    if (!inv) { tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">لا توجد أدوية</td></tr>'; return; }
    let html = '';
    Object.entries(inv).forEach(([id, med]) => {
      html += `<tr><td>${med.name || med.tradeName}</td><td>${med.quantity}</td><td>${med.price}</td><td>${med.expiryDate || '-'}</td></tr>`;
    });
    tbody.innerHTML = html;
  }

  window.showAddMedicineModal = () => {
    const modal = document.createElement('div');
    modal.id = 'med-modal';
    modal.className = 'fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-md w-full">
        <h3 class="font-bold text-lg mb-4">إضافة دواء للمخزون</h3>
        <form id="add-med-form" onsubmit="return false;">
          <div class="space-y-3">
            <div><label>الاسم العلمي</label><input name="scientificName" class="w-full px-3 py-2 border rounded" required></div>
            <div><label>الاسم التجاري</label><input name="tradeName" class="w-full px-3 py-2 border rounded" required></div>
            <div><label>الكمية</label><input name="quantity" type="number" class="w-full px-3 py-2 border rounded" required></div>
            <div><label>سعر الوحدة</label><input name="price" type="number" step="0.01" class="w-full px-3 py-2 border rounded" required></div>
            <div><label>تاريخ الانتهاء</label><input name="expiryDate" type="date" class="w-full px-3 py-2 border rounded"></div>
          </div>
          <div class="flex gap-3 mt-6">
            <button type="submit" class="flex-1 py-2 rounded-lg bg-olive-600 text-white">حفظ</button>
            <button type="button" onclick="closeModal('med-modal')" class="flex-1 py-2 rounded-lg border">إلغاء</button>
          </div>
        </form>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('add-med-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const med = Object.fromEntries(formData.entries());
      med.quantity = Number(med.quantity);
      med.price = Number(med.price);
      med.name = med.tradeName;
      const newRef = dbPush('inventory');
      await dbSet(`inventory/${newRef.key}`, med);
      showToast('تمت إضافة الدواء', 'success');
      closeModal('med-modal');
      loadInventory();
    });
  };
</script>

  async function loadEmployees() {
    const emps = await dbGet('employees');
    const tbody = document.getElementById('employees-table');
    const totalSpan = document.getElementById('hr-total-employees');
    if (!emps) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">لا يوجد موظفون</td></tr>';
      totalSpan.textContent = '0';
      return;
    }
    const empArray = Object.entries(emps);
    totalSpan.textContent = empArray.length;

  window.getReportDateRange = () => {
    const type = document.querySelector('input[name="report-type"]:checked').value;
    const year = document.getElementById('report-year').value;
    let from, to;
    if (type === 'monthly') {
      const m = document.getElementById('report-month').value;
      from = `${year}-${String(m).padStart(2,'0')}-01`;
      to = `${year}-${String(m).padStart(2,'0')}-${new Date(year, m, 0).getDate()}`;
    } else if (type === 'custom') {
      from = document.getElementById('custom-from').value;
      to = document.getElementById('custom-to').value;
      if (!from || !to) { showToast('حدد الفترة', 'error'); return null; }
    } else {
      from = `${year}-01-01`; to = `${year}-12-31`;
    }
    return { from, to, type };
  };

  window.generateReportPDF = async () => {
    showToast('جاري إنشاء التقرير...', 'info');
    const range = getReportDateRange(); if (!range) return;
    const visits = await dbGet('medicalRecords') || {};
    let totalVisits = 0;
    Object.values(visits).forEach(patientVisits => {
      if (patientVisits.visits) {
        Object.values(patientVisits.visits).forEach(v => { if (v.date >= range.from && v.date <= range.to) totalVisits++; });
      }
    });
    const html = generateProfessionalPDF({ title: 'تقرير إحصائي', range, visits: totalVisits, revenue: 0 });
    const w = window.open('','_blank'); w.document.write(html); w.document.close(); w.print();
    showToast('تم تحميل التقرير', 'success');
  };

  }

  window.generateReportExcel = () => { showToast('وظيفة Excel قيد التطوير', 'info'); };
  window.createMedicalReport = () => { showToast('إنشاء تقرير طبي قيد التطوير', 'info'); };

  async function renderAdminPage() {
    const mainContent = document.getElementById('main-content');
    await loadDepartments();
    mainContent.innerHTML = `
      <div class="p-4 md:p-6 fade-in">
        <div class="bg-white dark:bg-gray-800 rounded-xl border p-5">
          <h2 class="font-bold text-lg mb-5"><i data-lucide="settings" class="w-5 h-5 inline ml-2"></i>إدارة الأقسام والوفيات</h2>
          <div class="grid md:grid-cols-2 gap-6">
            <div>
              <h3 class="font-semibold mb-3 text-olive-700">الأقسام الطبية</h3>
              <div id="dept-manage-list" class="space-y-2 mb-4"></div>
              <button onclick="addNewDept()" class="text-sm text-olive-600 hover:underline"><i data-lucide="plus-circle" class="w-4 h-4 inline"></i> إضافة قسم جديد</button>
            </div>
            <div>
              <h3 class="font-semibold mb-3 text-olive-700">أنواع الوفيات</h3>
              <div id="death-manage-list" class="space-y-2 mb-4"></div>
              <button onclick="addNewDeath()" class="text-sm text-olive-600 hover:underline"><i data-lucide="plus-circle" class="w-4 h-4 inline"></i> إضافة نوع وفاة</button>
            </div>
          </div>
        </div>
      </div>
    `;
    renderManageLists();
    lucide.createIcons();
  }

  function renderManageLists() {
    const deptList = document.getElementById('dept-manage-list');
    const deathList = document.getElementById('death-manage-list');
    if (deptList) {
      deptList.innerHTML = window.HMS.departments.map(d => `
        <div class="flex items-center justify-between p-2 bg-olive-50 dark:bg-gray-700 rounded">
          <span>${d.icon} ${d.label}</span>
          <div>
            <button onclick="editDepartment('${d.key}')" class="text-olive-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button>
            <button onclick="deleteDepartment('${d.key}')" class="text-red-500 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>
      `).join('');
    }
    if (deathList) {
      deathList.innerHTML = window.HMS.deathTypes.map(d => `
        <div class="flex items-center justify-between p-2 bg-olive-50 dark:bg-gray-700 rounded">
          <span>${d.icon} ${d.label}</span>
          <div>
            <button onclick="editDeath('${d.key}')" class="text-olive-600 mx-1"><i data-lucide="edit" class="w-4 h-4"></i></button>
            <button onclick="deleteDeath('${d.key}')" class="text-red-500 mx-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>
      `).join('');
    }
    lucide.createIcons();
  }

  window.addNewDept = async () => {
    const newKey = 'dept_' + Date.now();
    const newDept = { key: newKey, label: 'قسم جديد', icon: '📌', color: '#6b7280' };
    await dbSet(`departments/${newKey}`, newDept);
    await loadDepartments();
    renderManageLists();
    showToast('تمت إضافة قسم جديد', 'success');
  };

  window.addNewDeath = async () => {
    const newKey = 'death_' + Date.now();
    const newDeath = { key: newKey, label: 'نوع وفاة جديد', icon: '⚫', color: '#6b7280' };
    await dbSet(`deathTypes/${newKey}`, newDeath);
    await loadDepartments();
    renderManageLists();
    showToast('تمت إضافة نوع وفاة', 'success');
  };

  window.editDeath = (key) => {
    const death = window.HMS.deathTypes.find(d => d.key === key);
    if (!death) return;
    const modal = document.createElement('div');
    modal.id = 'edit-death-modal';
    modal.className = 'fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-md w-full">
        <h3 class="font-bold text-lg mb-4">تعديل نوع الوفاة</h3>
        <div class="space-y-3">
          <div><label>الاسم</label><input id="edit-death-label" value="${death.label}" class="w-full px-3 py-2 border rounded"></div>
          <div><label>الأيقونة</label><input id="edit-death-icon" value="${death.icon}" class="w-full px-3 py-2 border rounded"></div>
          <div><label>اللون</label><input id="edit-death-color" type="color" value="${death.color}" class="w-full h-10 border rounded"></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="saveDeathChanges('${key}')" class="flex-1 py-2 rounded-lg bg-olive-600 text-white">حفظ</button>
          <button onclick="closeModal('edit-death-modal')" class="flex-1 py-2 rounded-lg border">إلغاء</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  };

  window.saveDeathChanges = async (key) => {
    const label = document.getElementById('edit-death-label').value;
    const icon = document.getElementById('edit-death-icon').value;
    const color = document.getElementById('edit-death-color').value;
    await dbUpdate(`deathTypes/${key}`, { label, icon, color });
    await loadDepartments();
    renderManageLists();
    closeModal('edit-death-modal');
    showToast('تم تحديث نوع الوفاة', 'success');
  };

  window.deleteDeath = async (key) => {
    if (!confirm('هل أنت متأكد من حذف نوع الوفاة هذا؟')) return;
    await dbRemove(`deathTypes/${key}`);
    await loadDepartments();
    renderManageLists();
    showToast('تم حذف نوع الوفاة', 'success');
  };

  (function checkEnvironment() {
    if (window.location.protocol === 'file:') {
      document.body.innerHTML = `
        <div style="direction: rtl; font-family: 'Noto Kufi Arabic'; padding: 40px; text-align: center; background: #f8d7da; color: #721c24; height: 100vh;">
          <h2>لا يمكن تشغيل النظام مباشرة من الملف</h2>
          <p>يجب فتح المشروع عبر خادم محلي مثل Live Server في VS Code.</p>
          <p>السبب: Firebase Authentication لا يعمل عبر file:// لأسباب أمنية.</p>
        </div>
      `;
      return;
    }

    function waitForFirebase(callback) {
      if (window.firebaseAuth && window.firebaseAuth.onAuthStateChanged) callback();
      else setTimeout(() => waitForFirebase(callback), 100);
    }

    waitForFirebase(() => {
      window.firebaseAuth.onAuthStateChanged(window.auth, async (user) => {
        if (user) {
          try {
            const snapshot = await dbGet(`users/${user.uid}`);
            if (snapshot) {
              window.HMS.currentUser = user;
              window.HMS.userData = snapshot;
              window.HMS.userRole = snapshot.role;
              renderMainApp('dashboard');
            } else {
              await window.firebaseAuth.signOut(window.auth);
              renderLoginPage();
            }
          } catch (e) { renderLoginPage(); }
        } else {
          renderLoginPage();
        }
      });
    });

    setTimeout(() => {
      if (!window.HMS.currentUser && document.getElementById('app-content').children.length === 0) {
        renderLoginPage();
      }
    }, 500);
  })();
</script>
</body>
</html>

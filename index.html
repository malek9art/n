<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
        }
        
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .tab-active {
            background-color: #3b82f6;
            color: white;
        }
        
        .sidebar {
            transition: all 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 40;
                height: 100vh;
                top: 0;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay {
                display: none;
            }
            .sidebar.open + .sidebar-overlay {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 30;
            }
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <!-- تكوين Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        'tajawal': ['Tajawal', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-tajawal">
    <!-- شاشة التحميل -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="loading-spinner"></div>
        <p class="mt-4 text-lg text-gray-700">جاري تحميل النظام...</p>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">

    <!-- التطبيق الرئيسي -->

            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <!-- المحتوى -->

    <!-- التطبيق الرئيسي -->
    <script>
        // ========== تكوين Firebase ==========
        // Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyC8Mdbq_mJujfvJEicI37gv8OCigSFA33k",
  authDomain: "abu-huthaifa-system-855a3.firebaseapp.com",
  projectId: "abu-huthaifa-system-855a3",
  storageBucket: "abu-huthaifa-system-855a3.firebasestorage.app",
  messagingSenderId: "587225741049",
  appId: "1:587225741049:web:3f2e82409729a686ca1428"
};

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========== حالة التطبيق ==========
        let currentUser = null;
        let userRole = 'delegate'; // delegate, supervisor, admin
        let currentView = 'dashboard';
        let operations = [];
        let todaySummary = {
            collections: 0,
            deposits: 0,
            expenses: 0,
            transfers: 0,
            cashIn: 0,
            cashOut: 0
        };

        // ========== تهيئة التطبيق ==========
        document.addEventListener('DOMContentLoaded', function() {
            // إخفاء شاشة التحميل بعد 2 ثانية (محاكاة)
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                // التحقق من حالة المصادقة
                checkAuthState();
            }, 2000);
            
            // إعداد مستمعي الأحداث
            setupEventListeners();
        });

        // ========== إعداد مستمعي الأحداث ==========
        function setupEventListeners() {
            // تسجيل الدخول
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // تبديل الشريط الجانبي
            document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
            
            // قائمة المستخدم
            document.getElementById('userMenuToggle').addEventListener('click', toggleUserMenu);
            
            // تسجيل الخروج
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            
            // إغلاق القوائم عند النقر خارجها
            document.addEventListener('click', closeAllMenus);
        }

        // ========== إدارة المصادقة ==========
        function checkAuthState() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    // جلب بيانات المستخدم من Firestore
                    loadUserData(user.uid);
                } else {
                    showLoginScreen();
                }
            });
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // عرض حالة التحميل
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="loading-spinner mx-auto" style="width: 20px; height: 20px;"></div>';
            submitBtn.disabled = true;
            
            // تسجيل الدخول باستخدام Firebase Auth
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // تم تسجيل الدخول بنجاح
                    currentUser = userCredential.user;
                    loadUserData(currentUser.uid);
                })
                .catch((error) => {
                    // خطأ في تسجيل الدخول
                    console.error('خطأ في تسجيل الدخول:', error);
                    alert('فشل تسجيل الدخول: ' + error.message);
                    
                    // إعادة تعيين زر الإرسال
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                });
        }

        function handleLogout() {
            auth.signOut().then(() => {
                showLoginScreen();
            }).catch((error) => {
                console.error('خطأ في تسجيل الخروج:', error);
            });
        }

        // ========== إدارة واجهة المستخدم ==========
        function showLoginScreen() {
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        function showMainApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('loadingScreen').classList.add('hidden');
            
            // تحميل الواجهة المناسبة
            loadUserInterface();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleUserMenu(e) {
            e.stopPropagation();
            document.getElementById('userMenu').classList.toggle('hidden');
        }

        function closeAllMenus() {
            document.getElementById('userMenu').classList.add('hidden');
        }

        // ========== إدارة بيانات المستخدم ==========
        function loadUserData(userId) {
            db.collection('users').doc(userId).get()
                .then((doc) => {
                    if (doc.exists) {
                        const userData = doc.data();
                        userRole = userData.role || 'delegate';
                        
                        // تحديث واجهة المستخدم
                        updateUserUI(userData);
                        
                        // عرض التطبيق الرئيسي
                        showMainApp();
                        
                        // تحميل بيانات العمليات
                        loadOperationsData();
                    } else {
                        // إذا لم تكن هناك بيانات مستخدم، إنشاء سجل جديد
                        createUserRecord(userId);
                    }
                })
                .catch((error) => {
                    console.error('خطأ في جلب بيانات المستخدم:', error);
                });
        }

        function updateUserUI(userData) {
            const name = userData.name || 'مستخدم';
            const role = userData.role || 'مندوب';
            
            document.getElementById('userName').textContent = name;
            document.getElementById('userInitials').textContent = name.charAt(0);
            document.getElementById('menuUserName').textContent = name;
            document.getElementById('menuUserRole').textContent = 
                role === 'admin' ? 'مدير النظام' : 
                role === 'supervisor' ? 'مشرف' : 'مندوب تحصيل';
                
            document.getElementById('appTitle').textContent = 
                role === 'admin' ? 'لوحة الإدارة - نظام الإيداعات' : 
                role === 'supervisor' ? 'لوحة المشرف - نظام الإيداعات' : 
                'لوحة المندوب - نظام الإيداعات';
        }

        function createUserRecord(userId) {
            // إنشاء سجل مستخدم جديد
            const userData = {
                name: 'مستخدم جديد',
                email: currentUser.email,
                role: 'delegate',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                isActive: true
            };
            
            db.collection('users').doc(userId).set(userData)
                .then(() => {
                    loadUserData(userId);
                })
                .catch((error) => {
                    console.error('خطأ في إنشاء سجل المستخدم:', error);
                });
        }

        // ========== تحميل الواجهة المناسبة ==========
        function loadUserInterface() {
            // تحميل القائمة الجانبية
            loadSidebarMenu();
            
            // تحميل المحتوى الرئيسي
            loadMainContent();
        }

        function loadSidebarMenu() {
            const sidebarMenu = document.getElementById('sidebarMenu');
            let menuItems = '';
            
            if (userRole === 'admin') {
                menuItems = `
                    <li>
                        <a href="#" class="dashboard-nav flex items-center px-4 py-3 text-gray-700 bg-blue-50 rounded-lg border-r-4 border-primary">
                            <span class="material-icons text-primary mr-3">dashboard</span>
                            <span class="font-medium">لوحة التحكم</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="operations-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">payments</span>
                            <span class="font-medium">العمليات المالية</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="reports-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">assessment</span>
                            <span class="font-medium">التقارير</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="users-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">groups</span>
                            <span class="font-medium">إدارة المستخدمين</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="settings-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">admin_panel_settings</span>
                            <span class="font-medium">إدارة النظام</span>
                        </a>
                    </li>
                `;
            } else if (userRole === 'supervisor') {
                menuItems = `
                    <li>
                        <a href="#" class="dashboard-nav flex items-center px-4 py-3 text-gray-700 bg-blue-50 rounded-lg border-r-4 border-primary">
                            <span class="material-icons text-primary mr-3">dashboard</span>
                            <span class="font-medium">لوحة التحكم</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="operations-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">payments</span>
                            <span class="font-medium">العمليات المالية</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="reports-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">assessment</span>
                            <span class="font-medium">التقارير</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="delegates-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">supervisor_account</span>
                            <span class="font-medium">إدارة المندوبين</span>
                        </a>
                    </li>
                `;
            } else {
                // واجهة المندوب
                menuItems = `
                    <li>
                        <a href="#" class="dashboard-nav flex items-center px-4 py-3 text-gray-700 bg-blue-50 rounded-lg border-r-4 border-primary">
                            <span class="material-icons text-primary mr-3">dashboard</span>
                            <span class="font-medium">لوحة التحكم</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="collections-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">payments</span>
                            <span class="font-medium">التحصيلات</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="deposits-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">account_balance</span>
                            <span class="font-medium">الإيداعات</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="expenses-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">receipt</span>
                            <span class="font-medium">المصروفات</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="cash-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">swap_horiz</span>
                            <span class="font-medium">الاستلام والتسليم</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="reports-nav flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-lg">
                            <span class="material-icons mr-3">assessment</span>
                            <span class="font-medium">التقارير</span>
                        </a>
                    </li>
                `;
            }
            
            sidebarMenu.innerHTML = menuItems;
            
            // إضافة مستمعي الأحداث لعناصر القائمة
            sidebarMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // تحديث العنصر النشط
                    sidebarMenu.querySelectorAll('a').forEach(item => {
                        item.classList.remove('bg-blue-50', 'border-primary');
                        item.classList.add('hover:bg-gray-50');
                    });
                    
                    this.classList.add('bg-blue-50', 'border-primary');
                    this.classList.remove('hover:bg-gray-50');
                    
                    // تحميل المحتوى المناسب
                    const viewClass = this.className.split(' ')[0]; // أول كلاس في القائمة
                    const viewName = viewClass.split('-')[0]; // الجزء الأول من اسم الكلاس
                    loadView(viewName);
                });
            });
        }

        function loadMainContent() {
            // تحميل العرض الافتراضي (لوحة التحكم)
            loadView('dashboard');
        }

        function loadView(viewName) {
            currentView = viewName;
            const mainContent = document.getElementById('mainContent');
            
            // عرض حالة التحميل
            mainContent.innerHTML = `
                <div class="flex justify-center items-center h-64">
                    <div class="loading-spinner"></div>
                </div>
            `;
            
            // محاكاة تحميل المحتوى
            setTimeout(() => {
                if (userRole === 'admin' || userRole === 'supervisor') {
                    loadManagementView(viewName);
                } else {
                    loadDelegateView(viewName);
                }
            }, 500);
        }

        // ========== واجهة المندوب ==========
        function loadDelegateView(viewName) {
            const mainContent = document.getElementById('mainContent');
            
            if (viewName === 'dashboard') {
                mainContent.innerHTML = getDelegateDashboardHTML();
                setupDelegateDashboard();
            } else if (viewName === 'collections') {
                mainContent.innerHTML = getCollectionsHTML();
                setupCollections();
            } else if (viewName === 'deposits') {
                mainContent.innerHTML = getDepositsHTML();
                setupDeposits();
            } else if (viewName === 'expenses') {
                mainContent.innerHTML = getExpensesHTML();
                setupExpenses();
            } else if (viewName === 'cash') {
                mainContent.innerHTML = getCashHTML();
                setupCash();
            } else if (viewName === 'reports') {
                mainContent.innerHTML = getReportsHTML();
                setupReports();
            }
        }

        function getDelegateDashboardHTML() {
            return `

                    <div class="bg-white rounded-xl card-shadow p-4 border border-gray-100">

                            </div>
                            <div>
                                <p class="text-sm text-gray-500">المصروفات</p>
                                <p class="text-xl font-bold text-gray-800" id="dashboardExpenses">0 ريال</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl card-shadow p-4 border border-gray-100">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center ml-3">
                                <span class="material-icons text-purple-600">swap_horiz</span>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">صافي اليوم</p>
                                <p class="text-xl font-bold text-gray-800" id="dashboardNet">0 ريال</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl card-shadow p-6 border border-gray-100">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">الإجراءات السريعة</h3>
                        <div class="space-y-3">
                            <button id="quickCollection" class="w-full text-right py-3 px-4 bg-blue-50 text-blue-700 rounded-lg border border-blue-200 font-medium hover:bg-blue-100 transition flex items-center justify-between">
                                <span class="material-icons text-blue-500">arrow_left</span>
                                <span>إضافة تحصيل جديد</span>
                            </button>
                            <button id="quickDeposit" class="w-full text-right py-3 px-4 bg-green-50 text-green-700 rounded-lg border border-green-200 font-medium hover:bg-green-100 transition flex items-center justify-between">
                                <span class="material-icons text-green-500">arrow_left</span>
                                <span>تسجيل إيداع بنكي</span>
                            </button>
                            <button id="quickExpense" class="w-full text-right py-3 px-4 bg-orange-50 text-orange-700 rounded-lg border border-orange-200 font-medium hover:bg-orange-100 transition flex items-center justify-between">
                                <span class="material-icons text-orange-500">arrow_left</span>
                                <span>تسجيل مصروف جديد</span>
                            </button>
                            <button id="quickReport" class="w-full text-right py-3 px-4 bg-purple-50 text-purple-700 rounded-lg border border-purple-200 font-medium hover:bg-purple-100 transition flex items-center justify-between">
                                <span class="material-icons text-purple-500">arrow_left</span>
                                <span>إنشاء تقرير يومي</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl card-shadow p-6 border border-gray-100">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">آخر العمليات</h3>
                        <div id="recentOperations" class="space-y-3">

        }

        function setupDelegateDashboard() {
            // تحديث الإحصائيات
            updateDashboardStats();
            
            // إعداد مستمعي الأزرار
            document.getElementById('quickCollection').addEventListener('click', () => loadView('collections'));
            document.getElementById('quickDeposit').addEventListener('click', () => loadView('deposits'));
            document.getElementById('quickExpense').addEventListener('click', () => loadView('expenses'));
            document.getElementById('quickReport').addEventListener('click', () => loadView('reports'));
            
            // تحميل العمليات الحديثة
            loadRecentOperations();
        }

        function updateDashboardStats() {
            document.getElementById('dashboardCollections').textContent = formatCurrency(todaySummary.collections);
            document.getElementById('dashboardDeposits').textContent = formatCurrency(todaySummary.deposits);
            document.getElementById('dashboardExpenses').textContent = formatCurrency(todaySummary.expenses);
            
            const netAmount = todaySummary.collections - todaySummary.deposits - todaySummary.expenses;
            document.getElementById('dashboardNet').textContent = formatCurrency(netAmount);
            
            // تلوين صافي اليوم
            const netElement = document.getElementById('dashboardNet');
            if (netAmount < 0) {
                netElement.classList.remove('text-gray-800');
                netElement.classList.add('text-red-600');
            } else {
                netElement.classList.remove('text-red-600');
                netElement.classList.add('text-gray-800');
            }
        }

        function loadRecentOperations() {
            const recentOperationsContainer = document.getElementById('recentOperations');
            
            if (operations.length === 0) {
                recentOperationsContainer.innerHTML = '<p class="text-gray-500 text-center py-4">لا توجد عمليات حديثة</p>';
                return;
            }
            
            // عرض آخر 5 عمليات
            const recentOps = operations.slice(-5).reverse();
            let html = '';
            
            recentOps.forEach(op => {
                let icon = '';
                let color = '';
                let type = '';
                
                if (op.type === 'collection') {
                    icon = 'payments';
                    color = 'text-blue-500';
                    type = 'تحصيل';
                } else if (op.type === 'deposit') {
                    icon = 'account_balance';
                    color = 'text-green-500';
                    type = 'إيداع';
                } else if (op.type === 'expense') {
                    icon = 'receipt';
                    color = 'text-orange-500';
                    type = 'مصروف';
                } else if (op.type === 'cash') {
                    icon = 'swap_horiz';
                    color = 'text-purple-500';
                    type = op.operationType === 'receive' ? 'استلام' : 'تسليم';
                }
                
                html += `
                    <div class="flex items-center justify-between p-3 border border-gray-200 rounded-lg">
                        <div class="flex items-center">
                            <span class="material-icons ${color} text-sm ml-2">${icon}</span>
                            <div>
                                <p class="text-sm font-medium text-gray-800">${type}</p>
                                <p class="text-xs text-gray-500">${formatDate(op.date)}</p>
                            </div>
                        </div>
                        <div class="text-sm font-medium ${op.type === 'expense' ? 'text-orange-600' : 'text-gray-800'}">
                            ${formatCurrency(op.amount)}
                        </div>
                    </div>
                `;
            });
            
            recentOperationsContainer.innerHTML = html;
        }

        // ========== إدارة البيانات مع Firebase ==========
        function loadOperationsData() {
            if (!currentUser) return;
            
            // جلب عمليات المستخدم من Firestore
            db.collection('operations')
                .where('userId', '==', currentUser.uid)
                .where('date', '==', getCurrentDateFormatted())
                .orderBy('timestamp', 'desc')
                .onSnapshot((snapshot) => {
                    operations = [];
                    todaySummary = {
                        collections: 0,
                        deposits: 0,
                        expenses: 0,
                        transfers: 0,
                        cashIn: 0,
                        cashOut: 0
                    };
                    
                    snapshot.forEach((doc) => {
                        const operation = doc.data();
                        operation.id = doc.id;
                        operations.push(operation);
                        
                        // تحديث الملخص
                        updateSummaryFromOperation(operation);
                    });
                    
                    // تحديث واجهة المستخدم
                    updateUIAfterDataLoad();
                }, (error) => {
                    console.error('خطأ في جلب العمليات:', error);
                });
        }

        function updateSummaryFromOperation(operation) {
            if (operation.type === 'collection') {
                todaySummary.collections += operation.amount;
            } else if (operation.type === 'deposit') {
                todaySummary.deposits += operation.amount;
            } else if (operation.type === 'expense') {
                todaySummary.expenses += operation.amount;
            } else if (operation.type === 'transfer') {
                todaySummary.transfers += operation.amount;
            } else if (operation.type === 'cash') {
                if (operation.operationType === 'receive') {
                    todaySummary.cashIn += operation.amount;
                } else if (operation.operationType === 'deliver') {
                    todaySummary.cashOut += operation.amount;
                }
            }
        }

        function updateUIAfterDataLoad() {
            // تحديث لوحة التحكم إذا كانت معروضة
            if (currentView === 'dashboard') {
                updateDashboardStats();
                loadRecentOperations();
            }
            
            // تحديث الإحصائيات في الشاشات الأخرى
            if (typeof updateViewStats === 'function') {
                updateViewStats();
            }
        }

        function saveOperation(operationData) {
            if (!currentUser) return;
            
            // إضافة بيانات إضافية
            operationData.userId = currentUser.uid;
            operationData.userName = document.getElementById('menuUserName').textContent;
            operationData.timestamp = firebase.firestore.FieldValue.serverTimestamp();
            
            // حفظ في Firestore
            db.collection('operations').add(operationData)
                .then((docRef) => {
                    console.log('تم حفظ العملية بنجاح:', docRef.id);
                    showSuccessMessage('تم حفظ العملية بنجاح');
                })
                .catch((error) => {
                    console.error('خطأ في حفظ العملية:', error);
                    alert('فشل في حفظ العملية: ' + error.message);
                });
        }

        // ========== دوال مساعدة ==========
        function formatCurrency(amount) {
            return new Intl.NumberFormat('ar-SA', {
                minimumFractionDigits: 2
            }).format(amount) + ' ريال';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const day = date.getDate();
            const month = date.getMonth() + 1;
            const year = date.getFullYear();
            
            return `${day}/${month}/${year}`;
        }

        function getCurrentDateFormatted() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            return `${year}-${month}-${day}`;
        }

        function showSuccessMessage(message) {
            // إنشاء عنصر الرسالة
            const messageElement = document.createElement('div');
            messageElement.className = 'fixed top-4 left-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 fade-in';
            messageElement.textContent = message;
            
            // إضافة الرسالة إلى الصفحة
            document.body.appendChild(messageElement);
            
            // إزالة الرسالة بعد 3 ثوانٍ
            setTimeout(() => {
                messageElement.remove();
            }, 3000);
        }

        // ========== دوال الواجهات الأخرى ==========
        // هذه دوال ستستخدم في الواجهات الأخرى (سيتم تنفيذها بالكامل في التطبيق النهائي)
        function getCollectionsHTML() {
            return `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة التحصيلات</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }

            return `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة الإيداعات</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }
        
        function getExpensesHTML() {
            return `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة المصروفات</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }
        
        function getCashHTML() {
            return `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة الاستلام والتسليم</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }
        
        function getReportsHTML() {
            return `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة التقارير</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }
        
        function setupCollections() {}
        function setupDeposits() {}
        function setupExpenses() {}
        function setupCash() {}
        function setupReports() {}
        
        function loadManagementView(viewName) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `<div class="text-center py-12"><h2 class="text-2xl font-bold text-gray-800">واجهة الإدارة - ${viewName}</h2><p class="text-gray-600 mt-2">سيتم تطوير هذه الواجهة قريباً</p></div>`;
        }
    </script>

  <script>
    // ==================== Firebase ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCAVOwsOwIBERN4QimSgky_-QpF7vmVcaE",
        authDomain: "hospital-d79e3.firebaseapp.com",
        databaseURL: "https://hospital-d79e3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hospital-d79e3",
        storageBucket: "hospital-d79e3.firebasestorage.app",
        messagingSenderId: "624434865556",
        appId: "1:624434865556:web:fc0b25653a87bbb17c1b81"
    };
    try { firebase.initializeApp(firebaseConfig); var db = firebase.database(); } catch (e) { console.log('Firebase init'); }

    // ==================== كائن التطبيق الرئيسي ====================
    const APP = {
        currentUser: null,
        currentSection: 'dashboard',
        darkMode: localStorage.getItem('darkMode') === 'true',
        users: [],
        patients: [],
        employees: [],
        medications: [],
        appointments: [],
        prescriptions: [],
        medicalRecords: [],
        notifications: [],
        labResults: [],
        radiologyResults: [],
        radiologyRequests: [],
        dentalProcedures: [],
        pharmacyDispenses: [],
        monthlyReport: { 
            emergency: 0, surgery: 0, xray: 0, admission: 0, internal: 0, operations: 0, dental: 0, lab: 0,
            pharmacy: 0, therapy: 0, nutrition: 0, vaccines: 0, ecg: 0,
            deaths_natural_elderly: 0, deaths_natural_children: 0, deaths_accidents_elderly: 0, deaths_accidents_children: 0
        },
        nextId: { patient: 1001, employee: 3, med: 6, appointment: 1, prescription: 1, labResult: 1, radiologyResult: 1, dental: 1, radiologyRequest: 1 },
        dataReady: false
    };

    if (APP.darkMode) document.body.classList.add('dark-mode');

    // ==================== مزامنة Firebase ====================
    function syncFromFirebase() {
        db.ref('/hospital').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                if (data.users) APP.users = data.users;
                if (data.patients) APP.patients = data.patients;
                if (data.employees) APP.employees = data.employees;
                if (data.medications) APP.medications = data.medications;
                if (data.appointments) APP.appointments = data.appointments;
                if (data.prescriptions) APP.prescriptions = data.prescriptions;
                if (data.labResults) APP.labResults = data.labResults;
                if (data.radiologyResults) APP.radiologyResults = data.radiologyResults;
                if (data.radiologyRequests) APP.radiologyRequests = data.radiologyRequests;
                if (data.dentalProcedures) APP.dentalProcedures = data.dentalProcedures;
                if (data.pharmacyDispenses) APP.pharmacyDispenses = data.pharmacyDispenses;
                if (data.medicalRecords) APP.medicalRecords = data.medicalRecords;
                if (data.nextId) APP.nextId = data.nextId;
                if (!APP.users.some(u => u.role === 'admin' && u.active)) {
                    APP.users.push({
                        id: 1, username: 'admin@hospital.sa', password: 'admin123', name: 'د. محمد السالم',
                        role: 'admin', dept: 'الإدارة', email: 'admin@hospital.sa', phone: '0501111111', active: true
                    });
                    saveToFirebase();
                }
            } else {
                APP.users = [{ id: 1, username: 'admin@hospital.sa', password: 'admin123', name: 'د. محمد السالم', role: 'admin', dept: 'الإدارة', email: 'admin@hospital.sa', phone: '0501111111', active: true }];
                APP.patients = [];
                APP.employees = [];
                APP.medications = [];
                APP.appointments = [];
                APP.prescriptions = [];
                APP.labResults = [];
                APP.radiologyResults = [];
                APP.radiologyRequests = [];
                APP.dentalProcedures = [];
                APP.pharmacyDispenses = [];
                APP.medicalRecords = [];
                APP.nextId = { patient: 1001, employee: 3, med: 6, appointment: 1, prescription: 1, labResult: 1, radiologyResult: 1, dental: 1, radiologyRequest: 1 };
                saveToFirebase();
            }
            APP.dataReady = true;
            enableLoginButton();
        }).catch(err => {
            console.log('تعذر الاتصال بـ Firebase');
            if (!APP.users.length) {
                APP.users = [{ id: 1, username: 'admin@hospital.sa', password: 'admin123', name: 'د. محمد السالم', role: 'admin', dept: 'الإدارة', email: 'admin@hospital.sa', phone: '0501111111', active: true }];
            }
            APP.dataReady = true;
            enableLoginButton();
        });
    }

    function enableLoginButton() {
        const btn = document.getElementById('loginButton');
        if (btn) {
            btn.textContent = 'دخول';
            btn.classList.remove('opacity-70');
            btn.disabled = false;
        }
    }

    function saveToFirebase() {
        const data = {
            users: APP.users, patients: APP.patients, employees: APP.employees, medications: APP.medications,
            appointments: APP.appointments, prescriptions: APP.prescriptions, labResults: APP.labResults,
            radiologyResults: APP.radiologyResults, radiologyRequests: APP.radiologyRequests,
            dentalProcedures: APP.dentalProcedures, pharmacyDispenses: APP.pharmacyDispenses,
            medicalRecords: APP.medicalRecords, nextId: APP.nextId
        };
        db.ref('/hospital').set(data).catch(e => console.log('Firebase save error'));
    }

    syncFromFirebase();

    // ==================== المصادقة والتنقل ====================
    function handleLogin() {
        if (!APP.dataReady) { showToast('جاري الاتصال بقاعدة البيانات...', 'warning'); return; }
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();
        const e = document.getElementById('loginError');
        if (!u || !p) { e.textContent = 'يرجى إدخال جميع البيانات'; e.classList.remove('hidden'); return; }
        const user = APP.users.find(x => x.username === u && x.password === p && x.active);
        if (!user) { e.textContent = 'بيانات غير صحيحة أو الحساب معطل'; e.classList.remove('hidden'); return; }
        APP.currentUser = user;
        document.getElementById('currentUserName').textContent = user.name;
        document.getElementById('currentUserRole').textContent = user.dept;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        buildSidebar();
        navigateTo('dashboard');
        showToast('مرحباً ' + user.name, 'success');
        loadNotifications();
    }

    function logout() {
        APP.currentUser = null;
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
    }

    // ==================== القوائم والتنقل ====================
    const NAV_CONFIG = {
        admin: [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'لوحة التحكم' },
            { id: 'users', icon: 'users', label: 'إدارة المستخدمين' },
            { id: 'patients', icon: 'user-check', label: 'المرضى والتسجيل' },
            { id: 'appointments', icon: 'calendar', label: 'المواعيد والحجوزات' },
            { id: 'medical', icon: 'stethoscope', label: 'السجلات الطبية' },
            { id: 'prescriptions', icon: 'pill', label: 'الوصفات الطبية' },
            { id: 'pharmacy', icon: 'package', label: 'الصيدلية' },
            { id: 'lab', icon: 'flask-conical', label: 'المختبرات' },
            { id: 'radiology', icon: 'scan', label: 'الأشعة' },
            { id: 'dental', icon: 'smile', label: 'عيادة الأسنان' },
            { id: 'therapy', icon: 'activity', label: 'العلاج الطبيعي' },
            { id: 'hr', icon: 'briefcase', label: 'الموارد البشرية' },
            { id: 'reports', icon: 'bar-chart-3', label: 'التقارير' },
        ],
        reception: [
            { id: 'patients', icon: 'user-check', label: 'تسجيل المرضى' },
            { id: 'appointments', icon: 'calendar', label: 'المواعيد' },
        ],
        doctor: [
            { id: 'appointments', icon: 'calendar', label: 'المواعيد' },
            { id: 'patients', icon: 'user-check', label: 'قائمة المرضى' },
            { id: 'medical', icon: 'stethoscope', label: 'السجلات الطبية' },
            { id: 'prescriptions', icon: 'pill', label: 'وصفة طبية' },
            { id: 'lab', icon: 'flask-conical', label: 'طلب فحوصات' },
            { id: 'radiology', icon: 'scan', label: 'طلب أشعة' },
        ],
        pharmacy: [
            { id: 'pharmacy', icon: 'package', label: 'المخزون الدوائي' },
            { id: 'prescriptions', icon: 'clipboard-check', label: 'صرف الوصفات' },
        ],
        lab: [
            { id: 'lab', icon: 'flask-conical', label: 'الفحوصات المخبرية' },
        ],
        radiology: [
            { id: 'radiology', icon: 'scan', label: 'طلبات الأشعة' },
        ],
        dental: [
            { id: 'dental', icon: 'smile', label: 'عيادة الأسنان' },
        ],
        therapy: [
            { id: 'therapy', icon: 'activity', label: 'العلاج الطبيعي' },
        ],
        hr: [
            { id: 'hr', icon: 'briefcase', label: 'الموارد البشرية' },
        ],
    };

    function buildSidebar() {
        const nav = document.getElementById('sidebarNav');
        const items = NAV_CONFIG[APP.currentUser.role] || NAV_CONFIG.admin;
        nav.innerHTML = items.map(it =>
            `<button onclick="navigateTo('${it.id}')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 text-white/80 text-sm rounded-lg" id="nav_${it.id}">
                <i data-lucide="${it.icon}" class="w-4.5 h-4.5"></i><span>${it.label}</span>
            </button>`
        ).join('');
        lucide.createIcons();
    }

    function navigateTo(section) {
        APP.currentSection = section;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav_' + section)?.classList.add('active');
        const titles = {
            dashboard: 'لوحة التحكم', users: 'إدارة المستخدمين', patients: 'المرضى والتسجيل',
            appointments: 'المواعيد والحجوزات', medical: 'السجلات الطبية', prescriptions: 'الوصفات الطبية',
            pharmacy: 'الصيدلية', lab: 'المختبرات', radiology: 'الأشعة', dental: 'عيادة الأسنان',
            therapy: 'العلاج الطبيعي', hr: 'الموارد البشرية', reports: 'التقارير'
        };
        document.getElementById('pageTitle').textContent = titles[section] || section;
        renderSection(section);
        closeSidebarMobile();
    }

    function renderSection(s) {
        const c = document.getElementById('contentArea'); c.scrollTop = 0;
        const renderers = {
            dashboard: renderDashboard, users: renderUsers, patients: renderPatients,
            appointments: renderAppointments, medical: renderMedical, prescriptions: renderPrescriptions,
            pharmacy: renderPharmacy, lab: renderLab, radiology: renderRadiology,
            dental: renderDental, therapy: renderTherapy, hr: renderHR, reports: renderReports
        };
        (renderers[s] || (() => c.innerHTML = '<p class="text-gray-500 text-center py-10">القسم غير متوفر</p>'))(c);
        lucide.createIcons();
    }

    // ==================== دوال المساعدة العامة ====================
    function openModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.remove('hidden');
        lucide.createIcons();
    }
    function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
    function showToast(msg, type = 'info') {
        const colors = { success: 'bg-success', error: 'bg-danger', info: 'bg-info', warning: 'bg-warning' };
        const t = document.createElement('div');
        t.className = `toast ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium top-4`;
        t.innerHTML = `<span>${msg}</span>`;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    function toggleDarkMode() {
        APP.darkMode = !APP.darkMode;
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', APP.darkMode);
        document.getElementById('darkModeLabel').textContent = APP.darkMode ? 'الوضع النهاري' : 'الوضع الليلي';
        lucide.createIcons();
        showToast('تم التبديل للوضع ' + (APP.darkMode ? 'الليلي' : 'النهاري'), 'success');
    }
    function toggleNotifications() { document.getElementById('notifDropdown').classList.toggle('hidden'); renderNotifications(); }
    
    function loadNotifications() {
        APP.notifications = [
            { id: 1, text: 'موعد جديد اليوم الساعة 10:00', time: '10 دقائق', read: false },
            { id: 2, text: 'مخزون أموكسيسيلين منخفض', time: '30 دقيقة', read: false },
        ];
        updateNotifBadge();
    }
    function updateNotifBadge() {
        const unread = APP.notifications.filter(n => !n.read).length;
        document.getElementById('notifBadge').classList.toggle('hidden', unread === 0);
    }
    function renderNotifications() {
        const container = document.getElementById('notificationsContainer');
        if (!APP.notifications.length) { container.innerHTML = '<p class="text-gray-400 text-sm">لا توجد إشعارات</p>'; return; }
        container.innerHTML = APP.notifications.map(n =>
            `<div class="p-3 rounded-lg ${n.read?'bg-gray-50':'bg-olive50'} flex justify-between cursor-pointer" onclick="markNotifRead(${n.id})">
                <div><p class="text-sm ${n.read?'text-gray-500':'text-gray-800'}">${n.text}</p><span class="text-xs text-gray-400">${n.time}</span></div>
                ${!n.read?'<span class="w-2 h-2 bg-info rounded-full mt-1.5"></span>':''}
            </div>`
        ).join('');
    }
    function markNotifRead(id) { const n = APP.notifications.find(x => x.id === id); if (n) n.read = true; updateNotifBadge(); renderNotifications(); }

    function toggleSidebar() { document.getElementById('sidebar').style.left = (document.getElementById('sidebar').style.left === '0px') ? '-280px' : '0px'; }
    function closeSidebarMobile() { document.getElementById('sidebar').style.left = '-280px'; }

    function filterTable(inputId, tableId) {
        const filter = document.getElementById(inputId).value.toUpperCase();
        Array.from(document.getElementById(tableId).querySelectorAll('tbody tr')).forEach(row => {
            row.style.display = Array.from(row.cells).some(cell => cell.textContent.toUpperCase().includes(filter)) ? '' : 'none';
        });
    }

    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-SA', { weekday: 'short', month: 'short', day: 'numeric' });
    document.addEventListener('click', e => { if (!e.target.closest('#notifDropdown') && !e.target.closest('[onclick*="toggleNotifications"]')) document.getElementById('notifDropdown').classList.add('hidden'); });
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
</script>
<script>
    function renderDashboard(c) {
        const totalPatients = APP.patients.length;
        const totalAppointments = APP.appointments.length;
        const totalMeds = APP.medications.length;
        const totalEmployees = APP.employees.length;
        const lowStockMeds = APP.medications.filter(m => m.qty < m.minQty).length;
        const todayAppointments = APP.appointments.filter(a => a.date === new Date().toISOString().split('T')[0]).length;
        const pendingPrescriptions = APP.prescriptions.filter(p => !p.dispensed).length;
        const emergencyPatients = APP.patients.filter(p => p.status === 'طوارئ').length;
        const pendingRadiology = APP.radiologyRequests.filter(r => r.status === 'pending').length;
        const pendingLab = APP.labResults.filter(l => l.status === 'pending').length;

        c.innerHTML = `
        <div class="fade-in">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-6">
                <div class="card-hover stats-card text-center">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-2"><i data-lucide="users" class="w-5 h-5 text-info"></i></div>
                    <p class="text-2xl font-bold text-olive">${totalPatients}</p><p class="text-xs text-gray-600">المرضى المسجلين</p>
                    <span class="text-[10px] text-info">${emergencyPatients} طوارئ</span>
                </div>
                <div class="card-hover stats-card text-center">
                    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-2"><i data-lucide="calendar" class="w-5 h-5 text-success"></i></div>
                    <p class="text-2xl font-bold text-olive">${totalAppointments}</p><p class="text-xs text-gray-600">المواعيد</p>
                    <span class="text-[10px] text-success">${todayAppointments} اليوم</span>
                </div>
                <div class="card-hover stats-card text-center">
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mx-auto mb-2"><i data-lucide="pill" class="w-5 h-5 text-purple-600"></i></div>
                    <p class="text-2xl font-bold text-olive">${totalMeds}</p><p class="text-xs text-gray-600">الأدوية</p>
                    <span class="text-[10px] text-warning">${lowStockMeds} منخفضة</span>
                </div>
                <div class="card-hover stats-card text-center">
                    <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center mx-auto mb-2"><i data-lucide="briefcase" class="w-5 h-5 text-orange-600"></i></div>
                    <p class="text-2xl font-bold text-olive">${totalEmployees}</p><p class="text-xs text-gray-600">الموظفين</p>
                    <span class="text-[10px] text-gray-400">${APP.employees.filter(e=>e.status==='نشط').length} نشط</span>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="chart-container bg-white rounded-xl p-5 border">
                    <h3 class="font-bold text-olive mb-4"><i data-lucide="pie-chart" class="w-5 h-5 inline"></i> توزيع المرضى حسب الحالة</h3>
                    <canvas id="patientsChart" height="250"></canvas>
                </div>
                <div class="chart-container bg-white rounded-xl p-5 border">
                    <h3 class="font-bold text-olive mb-4"><i data-lucide="bar-chart-3" class="w-5 h-5 inline"></i> الخدمات الشهرية</h3>
                    <canvas id="servicesChart" height="250"></canvas>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="stats-card"><p class="text-xs text-gray-600">مواعيد اليوم</p><p class="text-xl font-bold text-olive">${todayAppointments}</p></div>
                <div class="stats-card"><p class="text-xs text-gray-600">وصفات معلقة</p><p class="text-xl font-bold text-warning">${pendingPrescriptions}</p></div>
                <div class="stats-card"><p class="text-xs text-gray-600">أشعة معلقة</p><p class="text-xl font-bold text-info">${pendingRadiology}</p></div>
                <div class="stats-card"><p class="text-xs text-gray-600">فحوصات معلقة</p><p class="text-xl font-bold text-info">${pendingLab}</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl p-5 border">
                    <h3 class="font-bold text-olive mb-2"><i data-lucide="clock" class="w-5 h-5 inline"></i> أحدث المواعيد</h3>
                    <div class="space-y-2">${APP.appointments.slice(-3).reverse().map(a=>`<div class="flex justify-between p-2 bg-olive50 rounded"><div><p class="font-medium text-sm">${a.patientName}</p><p class="text-xs text-gray-500">${a.doctor} - ${a.time}</p></div><span class="badge bg-green-100 text-success">${a.status||'محجوز'}</span></div>`).join('')||'<p class="text-gray-400 text-sm">لا توجد مواعيد</p>'}</div>
                </div>
                <div class="bg-white rounded-xl p-5 border">
                    <h3 class="font-bold text-olive mb-2"><i data-lucide="alert-triangle" class="w-5 h-5 text-warning inline"></i> تنبيهات المخزون</h3>
                    <div class="space-y-2">${APP.medications.filter(m=>m.qty<m.minQty).map(m=>`<div class="flex justify-between p-2 bg-red-50 rounded"><div><p class="font-medium text-sm text-danger">${m.name}</p><p class="text-xs text-gray-500">المخزون: ${m.qty}</p></div><span class="badge bg-red-100 text-danger text-xs">منخفض</span></div>`).join('')||'<p class="text-green-600 text-sm">جميع المخزونات آمنة ✓</p>'}</div>
                </div>
            </div>
        </div>`;
        setTimeout(() => { createPatientsChart(); createServicesChart(); }, 100);
        lucide.createIcons();
    }

    function createPatientsChart() {
        const ctx = document.getElementById('patientsChart'); if (!ctx) return;
        const counts = { 'مقيم': 0, 'مراجع': 0, 'طوارئ': 0 };
        APP.patients.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
        new Chart(ctx, { type: 'doughnut', data: { labels: ['مقيم','مراجع','طوارئ'], datasets: [{ data: [counts['مقيم'], counts['مراجع'], counts['طوارئ']], backgroundColor: ['#556B2F','#D4AF37','#DC3545'], borderWidth: 2 }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Tajawal', size: 12 } } } } } });
    }

    function createServicesChart() {
        const ctx = document.getElementById('servicesChart'); if (!ctx) return;
        const report = APP.monthlyReport;
        new Chart(ctx, { type: 'bar', data: { labels: ['طوارئ','جراحة','أشعة','باطنية','عمليات','أسنان'], datasets: [{ data: [report.emergency, report.surgery, report.xray, report.internal, report.operations, report.dental], backgroundColor: ['#556B2F','#6B8E23','#D4AF37','#E8C547','#3D4A1F','#8B9A46'], borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    }
</script>
<script>
    // ==================== إدارة المستخدمين ====================
    function renderUsers(c) {
        if (APP.currentUser.role !== 'admin') { c.innerHTML = '<p class="text-danger text-center py-10">⛔ غير مصرح</p>'; return; }
        c.innerHTML = `
        <div class="fade-in">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="font-bold text-lg text-olive"><i data-lucide="users" class="w-5 h-5 inline"></i> إدارة المستخدمين</h2>
                <div class="flex gap-2"><input id="userSearch" oninput="filterTable('userSearch','usersTable')" class="input-field w-48" placeholder="🔍 بحث..."><button onclick="showAddUserModal()" class="btn-olive px-4 py-2 rounded-lg text-sm">+ إضافة</button></div>
            </div>
            <div class="bg-white rounded-xl border overflow-x-auto">
                <table id="usersTable" class="w-full text-sm"><thead><tr class="bg-olive text-white"><th class="p-3 text-right">الاسم</th><th class="p-3 text-right hide-mobile">البريد</th><th class="p-3 text-right">القسم</th><th class="p-3 text-right">الحالة</th><th class="p-3 text-right">إجراءات</th></tr></thead>
                <tbody>${APP.users.map(u=>`<tr class="table-row"><td class="p-3 font-medium">${u.name}</td><td class="p-3 text-xs hide-mobile">${u.email}</td><td class="p-3"><span class="badge bg-olive50 text-olive text-xs">${u.dept}</span></td><td class="p-3"><span class="badge ${u.active?'bg-green-100 text-success':'bg-red-100 text-danger'}">${u.active?'نشط':'معطل'}</span></td><td class="p-3"><div class="flex gap-1"><button onclick="editUser(${u.id})" class="p-1.5 rounded hover:bg-gray-100"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="toggleUserStatus(${u.id})" class="p-1.5 rounded hover:bg-gray-100"><i data-lucide="${u.active?'user-x':'user-check'}" class="w-4 h-4"></i></button><button onclick="deleteUser(${u.id})" class="p-1.5 rounded hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4 text-danger"></i></button></div></td></tr>`).join('')}</tbody></table>
            </div></div>`;
        lucide.createIcons();
    }

    function showAddUserModal() {
        openModal(`<div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3 class="font-bold text-lg">إضافة مستخدم جديد</h3><p class="text-xs text-white/70">المستشفى السعودي الميداني - العبر</p></div></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="nu_name" class="input-field" placeholder="الاسم *"><input id="nu_email" class="input-field" placeholder="البريد *"><input id="nu_user" class="input-field" placeholder="اسم المستخدم *"><input id="nu_pass" type="password" class="input-field" placeholder="كلمة المرور *"><input id="nu_phone" class="input-field" placeholder="الهاتف"><select id="nu_role" class="input-field"><option value="admin">مدير</option><option value="doctor">طبيب</option><option value="reception">استقبال</option><option value="pharmacy">صيدلي</option><option value="lab">فني مختبر</option><option value="radiology">فني أشعة</option><option value="dental">طبيب أسنان</option><option value="therapy">معالج</option><option value="hr">موارد بشرية</option></select></div><div class="flex gap-2 mt-6"><button onclick="addUser()" class="btn-olive px-6 py-2 rounded-lg flex-1">إضافة</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }

    function addUser() {
        const name=document.getElementById('nu_name').value,email=document.getElementById('nu_email').value,user=document.getElementById('nu_user').value,pass=document.getElementById('nu_pass').value;
        if(!name||!email||!user||!pass){showToast('جميع الحقول مطلوبة','error');return;}
        const depts={admin:'الإدارة',doctor:'الطبيب المناوب',reception:'الاستقبال',pharmacy:'الصيدلة',lab:'المختبرات',radiology:'الأشعة',dental:'عيادة الأسنان',therapy:'العلاج الطبيعي',hr:'الموارد البشرية'};
        APP.users.push({id:Math.max(...APP.users.map(u=>u.id),0)+1,name,email,username:user,password:pass,phone:document.getElementById('nu_phone').value,role:document.getElementById('nu_role').value,dept:depts[document.getElementById('nu_role').value],active:true});
        closeModal();showToast('تمت الإضافة','success');saveToFirebase();navigateTo('users');
    }

    function editUser(id) {
        const u=APP.users.find(x=>x.id===id);if(!u)return;
        openModal(`<div class="modal-header"><h3 class="font-bold text-lg">تعديل - ${u.name}</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="eu_name" class="input-field" value="${u.name}"><input id="eu_email" class="input-field" value="${u.email}"><input id="eu_phone" class="input-field" value="${u.phone}"><select id="eu_role" class="input-field">${['admin','doctor','reception','pharmacy','lab','radiology','dental','therapy','hr'].map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="flex gap-2 mt-6"><button onclick="updateUser(${id})" class="btn-olive px-6 py-2 rounded-lg flex-1">حفظ</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }

    function updateUser(id) {
        const u=APP.users.find(x=>x.id===id);if(!u)return;
        u.name=document.getElementById('eu_name').value;u.email=document.getElementById('eu_email').value;u.phone=document.getElementById('eu_phone').value;u.role=document.getElementById('eu_role').value;
        closeModal();showToast('تم التحديث','success');saveToFirebase();navigateTo('users');
    }

    function toggleUserStatus(id){const u=APP.users.find(x=>x.id===id);if(u){u.active=!u.active;showToast(u.active?'تم التفعيل':'تم التعطيل','success');saveToFirebase();navigateTo('users');}}
    function deleteUser(id){if(confirm('حذف؟')){APP.users=APP.users.filter(x=>x.id!==id);showToast('تم الحذف','success');saveToFirebase();navigateTo('users');}}

    // ==================== إدارة المرضى مع رقم طبي ====================
    function renderPatients(c) {
        c.innerHTML = `
        <div class="fade-in">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="font-bold text-lg text-olive"><i data-lucide="user-check" class="w-5 h-5 inline"></i> المرضى والتسجيل</h2>
                <div class="flex gap-2"><input id="patientSearch" oninput="searchPatients()" class="input-field w-56" placeholder="🔍 بحث بالاسم أو الرقم الطبي أو الهوية..."><button onclick="showAddPatientModal()" class="btn-olive px-4 py-2 rounded-lg text-sm">+ مريض جديد</button></div>
            </div>
            <div class="bg-white rounded-xl border overflow-x-auto">
                <table id="patientsTable" class="w-full text-sm"><thead><tr class="bg-olive text-white"><th class="p-3 text-right">الرقم الطبي</th><th class="p-3 text-right">الاسم</th><th class="p-3 text-right hide-mobile">الهوية</th><th class="p-3 text-right">العمر</th><th class="p-3 text-right">القسم</th><th class="p-3 text-right">الحالة</th><th class="p-3 text-right">إجراءات</th></tr></thead>
                <tbody id="patientsTbody">${renderPatientRows()}</tbody></table>
            </div></div>`;
        lucide.createIcons();
    }

    function renderPatientRows(filter='') {
        let list = APP.patients;
        if (filter) { const f=filter.toLowerCase(); list=APP.patients.filter(p=>p.name.toLowerCase().includes(f)||p.medicalId.toLowerCase().includes(f)||p.natId.includes(f)||p.phone.includes(f)); }
        return list.map(p=>`<tr class="table-row"><td class="p-3 font-bold text-olive">${p.medicalId||'MR'+p.id}</td><td class="p-3 font-medium">${p.name}</td><td class="p-3 text-xs hide-mobile">${p.natId}</td><td class="p-3">${p.age}</td><td class="p-3"><span class="badge bg-olive50 text-olive text-xs">${p.dept}</span></td><td class="p-3"><span class="badge ${p.status==='طوارئ'?'bg-red-100 text-danger':p.status==='مقيم'?'bg-blue-100 text-info':'bg-green-100 text-success'}">${p.status}</span></td><td class="p-3"><div class="flex gap-1"><button onclick="viewPatientDetails(${p.id})" class="p-1.5 rounded hover:bg-blue-100"><i data-lucide="eye" class="w-4 h-4 text-info"></i></button><button onclick="editPatient(${p.id})" class="p-1.5 rounded hover:bg-gray-100"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="printPatientFile(${p.id})" class="p-1.5 rounded hover:bg-purple-100"><i data-lucide="printer" class="w-4 h-4 text-purple-600"></i></button><button onclick="deletePatient(${p.id})" class="p-1.5 rounded hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4 text-danger"></i></button></div></td></tr>`).join('');
    }

    function searchPatients() {
        document.getElementById('patientsTbody').innerHTML = renderPatientRows(document.getElementById('patientSearch').value);
        lucide.createIcons();
    }

    function showAddPatientModal() {
        const nextId = APP.nextId.patient;
        openModal(`<div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3 class="font-bold text-lg">تسجيل مريض جديد</h3><p class="text-xs text-white/70">الرقم الطبي الجديد: MR${nextId}</p></div></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="np_name" class="input-field" placeholder="الاسم الكامل *"><input id="np_natid" class="input-field" placeholder="رقم الهوية *"><input id="np_age" type="number" class="input-field" placeholder="العمر" min="0"><select id="np_gender" class="input-field"><option>ذكر</option><option>أنثى</option></select><input id="np_phone" class="input-field" placeholder="الهاتف"><input id="np_blood" class="input-field" placeholder="فصيلة الدم"><input id="np_allergies" class="input-field" placeholder="حساسية"><input id="np_chronic" class="input-field" placeholder="أمراض مزمنة"><select id="np_dept" class="input-field"><option value="طوارئ">طوارئ</option><option value="باطنية">باطنية</option><option value="جراحة">جراحة</option><option value="عظام">عظام</option><option value="نساء">نساء</option><option value="أطفال">أطفال</option></select><select id="np_doctor" class="input-field"><option>د. خالد</option><option>د. سلمى</option><option>د. فهد</option></select></div><div class="flex gap-2 mt-6"><button onclick="addPatient()" class="btn-olive px-6 py-2 rounded-lg flex-1">تسجيل</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }

    function addPatient() {
        const name=document.getElementById('np_name').value,natId=document.getElementById('np_natid').value;
        if(!name||!natId){showToast('الاسم والهوية مطلوبان','error');return;}
        const id = APP.nextId.patient++;
        APP.patients.push({id,medicalId:'MR'+id,name,natId,age:parseInt(document.getElementById('np_age').value)||0,gender:document.getElementById('np_gender').value,phone:document.getElementById('np_phone').value,bloodType:document.getElementById('np_blood').value,allergies:document.getElementById('np_allergies').value,chronicDiseases:document.getElementById('np_chronic').value,dept:document.getElementById('np_dept').value,doctor:document.getElementById('np_doctor').value,status:'مراجع',visitDate:new Date().toISOString().split('T')[0]});
        closeModal();showToast('تم التسجيل بالرقم الطبي: MR'+id,'success');saveToFirebase();navigateTo('patients');
    }

    function viewPatientDetails(id) {
        const p=APP.patients.find(x=>x.id===id);if(!p)return;
        openModal(`<div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3 class="font-bold text-lg">${p.name}</h3><p class="text-xs text-white/70">الرقم الطبي: ${p.medicalId}</p></div></div><div class="p-6"><div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm">${Object.entries({الرقم_الطبي:p.medicalId,الهوية:p.natId,العمر:p.age,الجنس:p.gender,الهاتف:p.phone,الدم:p.bloodType,الحساسية:p.allergies,مزمنة:p.chronicDiseases,القسم:p.dept,الطبيب:p.doctor,تاريخ_الزيارة:p.visitDate,الحالة:p.status}).map(([k,v])=>`<div><span class="text-gray-500">${k.replace('_',' ')}</span><p class="font-bold">${v}</p></div>`).join('')}</div><div class="flex gap-2 mt-6"><button onclick="printPatientFile(${id})" class="btn-olive px-4 py-2 rounded-lg flex-1">🖨 طباعة الملف</button><button onclick="closeModal()" class="px-4 py-2 border rounded-lg flex-1">إغلاق</button></div></div>`);
    }

    function printPatientFile(id) {
        const p=APP.patients.find(x=>x.id===id);if(!p)return;
        const records=APP.medicalRecords.filter(r=>r.patientId===id);
        const prescs=APP.prescriptions.filter(r=>r.patient===p.name);
        const win=window.open('','_blank','width=800,height=600');
        win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>الملف الطبي - ${p.name}</title><style>body{font-family:'Tajawal',sans-serif;padding:30px;color:#333}.header{border-bottom:3px solid #556B2F;padding-bottom:20px;margin-bottom:20px;display:flex;align-items:center;gap:20px}.header img{width:80px}.header h1{color:#556B2F;margin:0}.section{margin:20px 0;page-break-inside:avoid}.section h3{color:#556B2F;border-bottom:1px solid #D4AF37;padding-bottom:5px}table{width:100%;border-collapse:collapse;margin:10px 0}th,td{padding:8px;border:1px solid #ddd;text-align:right;font-size:12px}th{background:#556B2F;color:white}.footer{text-align:center;margin-top:30px;font-size:10px;color:#666}@media print{body{padding:15px}}</style></head><body><div class="header"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"><div><h1>المستشفى السعودي الميداني - العبر</h1><p>الملف الطبي للمريض</p></div></div><div class="section"><h3>البيانات الشخصية</h3><table><tr><th>الرقم الطبي</th><td>${p.medicalId}</td><th>الاسم</th><td>${p.name}</td></tr><tr><th>الهوية</th><td>${p.natId}</td><th>العمر</th><td>${p.age}</td></tr><tr><th>الجنس</th><td>${p.gender}</td><th>فصيلة الدم</th><td>${p.bloodType||''}</td></tr><tr><th>الحساسية</th><td>${p.allergies||'لا يوجد'}</td><th>أمراض مزمنة</th><td>${p.chronicDiseases||'لا يوجد'}</td></tr></table></div><div class="section"><h3>السجل الطبي</h3>${records.length?records.map(r=>`<p style="margin:5px 0"><strong>${r.date}</strong>: ${r.note}</p>`).join(''):'<p>لا توجد ملاحظات</p>'}</div><div class="section"><h3>الوصفات</h3>${prescs.length?prescs.map(pr=>`<p style="margin:5px 0">${pr.meds} - ${pr.date}</p>`).join(''):'<p>لا توجد وصفات</p>'}</div><div class="footer"><p>المستشفى السعودي الميداني - العبر | تمت الطباعة: ${new Date().toLocaleDateString('ar-SA')}</p></div><script>window.onload=function(){window.print();}<`+`/script></body></html>`);
        win.document.close();
    }

    function editPatient(id) {
        const p=APP.patients.find(x=>x.id===id);if(!p)return;
        openModal(`<div class="modal-header"><h3>تعديل - ${p.name} (${p.medicalId})</h3></div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><input id="ep_name" class="input-field" value="${p.name}"><input id="ep_phone" class="input-field" value="${p.phone}"><input id="ep_allergies" class="input-field" value="${p.allergies||''}"><input id="ep_chronic" class="input-field" value="${p.chronicDiseases||''}"><select id="ep_status" class="input-field"><option ${p.status==='مراجع'?'selected':''}>مراجع</option><option ${p.status==='مقيم'?'selected':''}>مقيم</option><option ${p.status==='طوارئ'?'selected':''}>طوارئ</option></select></div><div class="flex gap-2 mt-6"><button onclick="updatePatient(${id})" class="btn-olive px-6 py-2 rounded-lg flex-1">حفظ</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }

    function updatePatient(id) {
        const p=APP.patients.find(x=>x.id===id);if(!p)return;
        p.name=document.getElementById('ep_name').value;p.phone=document.getElementById('ep_phone').value;p.allergies=document.getElementById('ep_allergies').value;p.chronicDiseases=document.getElementById('ep_chronic').value;p.status=document.getElementById('ep_status').value;
        closeModal();showToast('تم التحديث','success');saveToFirebase();navigateTo('patients');
    }

    function deletePatient(id){if(confirm('حذف؟')){APP.patients=APP.patients.filter(x=>x.id!==id);showToast('تم الحذف','success');saveToFirebase();navigateTo('patients');}}

    // ==================== المواعيد ====================
    function renderAppointments(c) {
        c.innerHTML = `<div class="fade-in"><div class="flex justify-between items-center mb-4"><h2 class="font-bold text-lg text-olive"><i data-lucide="calendar" class="w-5 h-5 inline"></i> المواعيد</h2><button onclick="showAddAppointmentModal()" class="btn-olive px-4 py-2 rounded-lg">+ موعد</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="apptGrid">${renderApptCards()}</div></div>`;
    }

    function renderApptCards(filter='') {
        let list=APP.appointments;if(filter){const f=filter.toLowerCase();list=APP.appointments.filter(a=>a.patientName.includes(f)||a.doctor.includes(f)||a.date.includes(f));}
        if(!list.length)return'<div class="col-span-2 text-center py-12 text-gray-400"><i data-lucide="calendar" class="w-12 h-12 mx-auto mb-2 opacity-30"></i><p>لا توجد مواعيد</p></div>';
        return list.map(a=>`<div class="bg-white rounded-xl p-4 border card-hover"><div class="flex justify-between"><div><p class="font-bold text-olive">${a.patientName}</p><p class="text-xs text-gray-500">${a.doctor}</p></div><span class="badge ${a.status==='مؤكد'?'bg-green-100 text-success':a.status==='ملغي'?'bg-red-100 text-danger':'bg-blue-100 text-info'}">${a.status||'محجوز'}</span></div><div class="flex gap-3 text-xs text-gray-600 mt-3"><span>📅 ${a.date}</span><span>🕐 ${a.time}</span></div><div class="flex gap-1 mt-3 pt-3 border-t"><button onclick="changeApptStatus(${a.id},'مؤكد')" class="text-xs px-2 py-1 bg-green-50 text-success rounded">تأكيد</button><button onclick="changeApptStatus(${a.id},'ملغي')" class="text-xs px-2 py-1 bg-red-50 text-danger rounded">إلغاء</button></div></div>`).join('');
    }

    function changeApptStatus(id,status){const a=APP.appointments.find(x=>x.id===id);if(a){a.status=status;showToast('تم','success');saveToFirebase();navigateTo('appointments');}}
    function showAddAppointmentModal() {
        openModal(`<div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3>موعد جديد</h3></div></div><div class="p-6"><select id="app_patient" class="input-field mb-3"><option value="">-- المريض --</option>${APP.patients.map(p=>`<option>${p.name} (${p.medicalId})</option>`).join('')}</select><select id="app_doctor" class="input-field mb-3"><option>د. خالد</option><option>د. سلمى</option><option>د. فهد</option></select><div class="grid grid-cols-2 gap-3"><input id="app_date" type="date" class="input-field"><input id="app_time" type="time" class="input-field"></div><div class="flex gap-2 mt-6"><button onclick="addAppointment()" class="btn-olive px-6 py-2 rounded-lg flex-1">حجز</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }
    function addAppointment() {
        const p=document.getElementById('app_patient').value,date=document.getElementById('app_date').value,time=document.getElementById('app_time').value;
        if(!p||!date||!time){showToast('أكمل البيانات','error');return;}
        APP.appointments.push({id:APP.appointments.length+1,patientName:p.split('(')[0].trim(),doctor:document.getElementById('app_doctor').value,date,time,status:'محجوز'});
        closeModal();showToast('تم الحجز','success');saveToFirebase();navigateTo('appointments');
    }
</script>
<script>
    // ==================== السجلات الطبية ====================
    function renderMedical(c) {
        c.innerHTML = `
        <div class="fade-in">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="font-bold text-lg text-olive"><i data-lucide="stethoscope" class="w-5 h-5 inline"></i> السجلات الطبية</h2>
                <input id="medicalSearch" oninput="filterMedical()" class="input-field w-56" placeholder="🔍 بحث عن مريض...">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="medicalGrid">${renderMedicalCards()}</div>
        </div>`;
    }

    function renderMedicalCards(filter='') {
        let patients = APP.patients;
        if (filter) { const f = filter.toLowerCase(); patients = APP.patients.filter(p => p.name.toLowerCase().includes(f) || p.medicalId.toLowerCase().includes(f)); }
        if (!patients.length) return '<div class="col-span-2 text-center py-12 text-gray-400"><i data-lucide="file-text" class="w-12 h-12 mx-auto mb-2 opacity-30"></i><p>لا يوجد مرضى</p></div>';
        return patients.map(p => {
            const records = APP.medicalRecords.filter(r => r.patientId === p.id);
            const prescs = APP.prescriptions.filter(r => r.patient === p.name);
            return `<div class="bg-white rounded-xl p-5 border card-hover">
                <div class="flex justify-between"><div><h3 class="font-bold text-olive">${p.name}</h3><p class="text-xs text-gray-500">${p.medicalId} | ${p.dept}</p></div><span class="badge ${p.status==='طوارئ'?'bg-red-100 text-danger':'bg-green-100 text-success'}">${p.status}</span></div>
                <div class="flex gap-2 mt-4">
                    <button onclick="viewMedicalRecord(${p.id})" class="flex-1 btn-olive text-xs py-2 rounded-lg">📋 السجل (${records.length})</button>
                    <button onclick="addMedicalNote(${p.id})" class="flex-1 bg-blue-50 text-info text-xs py-2 rounded-lg">✚ ملاحظة</button>
                </div>
            </div>`;
        }).join('');
    }

    function filterMedical() {
        document.getElementById('medicalGrid').innerHTML = renderMedicalCards(document.getElementById('medicalSearch').value);
        lucide.createIcons();
    }

    function viewMedicalRecord(patientId) {
        const p = APP.patients.find(x => x.id === patientId); if (!p) return;
        const records = APP.medicalRecords.filter(r => r.patientId === patientId);
        const prescs = APP.prescriptions.filter(r => r.patient === p.name);
        const labs = APP.labResults.filter(r => r.patientName === p.name);
        const rads = APP.radiologyResults.filter(r => r.patientName === p.name);
        openModal(`
        <div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3>السجل الطبي - ${p.name}</h3><p class="text-xs text-white/70">الرقم الطبي: ${p.medicalId}</p></div></div>
        <div class="p-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm mb-4">
                <div><span class="text-gray-500">الهوية:</span><p class="font-bold">${p.natId}</p></div><div><span class="text-gray-500">العمر:</span><p class="font-bold">${p.age}</p></div>
                <div><span class="text-gray-500">الدم:</span><p class="font-bold">${p.bloodType||''}</p></div><div><span class="text-gray-500">الحساسية:</span><p class="font-bold text-danger">${p.allergies||'لا يوجد'}</p></div>
            </div>
            <div class="border-t pt-3 mb-2"><h4 class="font-bold text-olive mb-2">📝 الملاحظات</h4>${records.length?records.map(r=>`<div class="p-2 bg-olive50 rounded mb-1"><p class="text-sm">${r.note}</p><span class="text-xs text-gray-400">${r.date} - ${r.doctor}</span></div>`).join(''):'<p class="text-gray-400 text-sm">لا توجد</p>'}</div>
            <div class="border-t pt-3 mb-2"><h4 class="font-bold text-olive mb-2">💊 الوصفات</h4>${prescs.length?prescs.map(pr=>`<div class="p-2 bg-blue-50 rounded mb-1"><p class="text-sm">${pr.meds}</p><span class="text-xs text-gray-400">${pr.date} ${pr.dispensed?'<span class="badge bg-green-100 text-success">تم الصرف</span>':'<span class="badge bg-yellow-100 text-warning">معلق</span>'}</span></div>`).join(''):'<p class="text-gray-400 text-sm">لا توجد</p>'}</div>
            <div class="border-t pt-3"><h4 class="font-bold text-olive mb-2">🔬 فحوصات</h4>${labs.length?labs.map(l=>`<div class="p-2 bg-purple-50 rounded mb-1"><p class="text-sm">${l.testName}: ${l.result}</p></div>`).join(''):'<p class="text-gray-400 text-sm">لا توجد</p>'}</div>
            ${rads.length?`<div class="border-t pt-3"><h4 class="font-bold text-olive mb-2">🩻 أشعة</h4>${rads.map(r=>`<div class="p-2 bg-orange-50 rounded mb-1"><p class="text-sm">${r.type}: ${r.findings||'قيد المراجعة'}</p></div>`).join('')}</div>`:''}
        </div>`);
    }

    function addMedicalNote(patientId) {
        const p = APP.patients.find(x => x.id === patientId);
        openModal(`<div class="modal-header"><h3>إضافة ملاحظة - ${p.name}</h3></div><div class="p-6"><textarea id="medNote" class="input-field" rows="4" placeholder="الملاحظة..."></textarea><div class="flex gap-2 mt-6"><button onclick="saveMedicalNote(${patientId})" class="btn-olive px-6 py-2 rounded-lg flex-1">حفظ</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div></div>`);
    }

    function saveMedicalNote(patientId) {
        const note = document.getElementById('medNote').value.trim();
        if (!note) { showToast('اكتب ملاحظة', 'error'); return; }
        APP.medicalRecords.push({ id: APP.medicalRecords.length + 1, patientId, note, doctor: APP.currentUser?.name || 'الطبيب', date: new Date().toLocaleDateString('ar-SA') });
        closeModal(); showToast('تم الحفظ', 'success'); saveToFirebase(); navigateTo('medical');
    }

    // ==================== الوصفات (طبيب ← صيدلية) ====================
    function renderPrescriptions(c) {
        const isDoctor = APP.currentUser?.role === 'doctor';
        const isPharmacy = APP.currentUser?.role === 'pharmacy';
        c.innerHTML = `
        <div class="fade-in">
            <div class="flex justify-between items-center mb-4"><h2 class="font-bold text-lg text-olive"><i data-lucide="pill" class="w-5 h-5 inline"></i> الوصفات الطبية</h2>${isDoctor?'<button onclick="showAddPrescriptionModal()" class="btn-olive px-4 py-2 rounded-lg">+ وصفة جديدة</button>':''}</div>
            <div class="bg-white rounded-xl border p-4">${APP.prescriptions.length?`<table class="w-full text-sm"><thead><tr class="bg-olive text-white"><th class="p-3">المريض</th><th class="p-3">الأدوية</th><th class="p-3">التاريخ</th><th class="p-3">الحالة</th><th class="p-3">إجراءات</th></tr></thead><tbody>${APP.prescriptions.map(pr=>`<tr><td class="p-3 font-medium">${pr.patient}</td><td class="p-3 text-xs">${pr.meds}</td><td class="p-3 text-xs">${pr.date}</td><td class="p-3"><span class="badge ${pr.dispensed?'bg-green-100 text-success':'bg-yellow-100 text-warning'}">${pr.dispensed?'تم الصرف':'معلق'}</span></td><td class="p-3 flex gap-1"><button onclick="viewPrescription(${pr.id})" class="p-1.5 rounded hover:bg-blue-100"><i data-lucide="eye" class="w-4 h-4 text-info"></i></button>${isPharmacy&&!pr.dispensed?`<button onclick="dispensePrescription(${pr.id})" class="p-1.5 rounded hover:bg-green-100"><i data-lucide="check-circle" class="w-4 h-4 text-success"></i></button>`:''}${isDoctor&&!pr.dispensed?`<button onclick="deletePrescription(${pr.id})" class="p-1.5 rounded hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4 text-danger"></i></button>`:''}</td></tr>`).join('')}</tbody></table>`:'<p class="text-center text-gray-500 py-10">لا توجد وصفات</p>'}</div></div>`;
        lucide.createIcons();
    }

    function showAddPrescriptionModal() {
        const medOptions = APP.medications.map(m => `<option value="${m.name}">${m.name} (${m.code}) - متبقي: ${m.qty}</option>`).join('');
        openModal(`
        <div class="modal-header flex items-center gap-3"><div class="logo-small"><img src="https://i.ibb.co/hJyzcBFf/IMG.jpg" alt="Logo"></div><div><h3>إنشاء وصفة طبية</h3></div></div>
        <div class="p-6">
            <select id="presc_patient" class="input-field mb-3"><option value="">-- اختر المريض --</option>${APP.patients.map(p => `<option>${p.name} (${p.medicalId})</option>`).join('')}</select>
            <div class="border rounded-lg p-3 bg-gray-50 mb-3">
                <label class="text-sm font-bold text-olive">🔍 اختر الأدوية</label>
                <div class="flex gap-2 mb-2"><input id="medSearchInput" class="input-field flex-1" placeholder="ابحث عن دواء..." oninput="filterMedOptions()"></div>
                <select id="medSelect" class="input-field mb-2" size="4">${medOptions}</select>
                <div class="flex gap-2"><input id="medDosage" class="input-field flex-1" placeholder="الجرعة"><button onclick="addMedToPrescription()" class="btn-olive px-4 py-2 rounded-lg">➕ إضافة</button></div>
                <div id="selectedMedsList" class="mt-3 space-y-2"></div>
            </div>
            <textarea id="presc_notes" class="input-field" rows="2" placeholder="ملاحظات..."></textarea>
            <div class="flex gap-2 mt-6"><button onclick="savePrescription()" class="btn-olive px-6 py-2 rounded-lg flex-1">إرسال للصيدلية</button><button onclick="closeModal()" class="px-6 py-2 border rounded-lg">إلغاء</button></div>
        </div>`);
        window._selectedMeds = [];
    }

    function filterMedOptions() {
        const f = document.getElementById('medSearchInput').value.toLowerCase();
        Array.from(document.getElementById('medSelect').options).forEach(o => o.style.display = o.text.toLowerCase().includes(f) ? '' : 'none');
    }

    function addMedToPrescription() {
        const sel = document.getElementById('medSelect'), dosage = document.getElementById('medDosage').value.trim();
        if (!sel.value) { showToast('اختر دواء', 'error'); return; }
        if (!dosage) { showToast('أدخل الجرعة', 'error'); return; }
        if (window._selectedMeds.find(m => m.name === sel.value)) { showToast('مضاف مسبقاً', 'warning'); return; }
        window._selectedMeds.push({ name: sel.value, dosage });
        renderSelectedMeds();
    }

    function renderSelectedMeds() {
        const c = document.getElementById('selectedMedsList');
        c.innerHTML = window._selectedMeds.length ? window._selectedMeds.map((m, i) => `<div class="flex justify-between p-2 bg-olive50 rounded"><span>${m.name} - ${m.dosage}</span><button onclick="removeMed(${i})"><i data-lucide="x" class="w-4 h-4 text-danger"></i></button></div>`).join('') : '<p class="text-gray-400">لم تضف أدوية</p>';
        lucide.createIcons();
    }

    function removeMed(i) { window._selectedMeds.splice(i, 1); renderSelectedMeds(); }

    function savePrescription() {
        const patient = document.getElementById('presc_patient').value;
        if (!patient || !window._selectedMeds.length) { showToast('اختر مريضاً وأدوية', 'error'); return; }
        const medsText = window._selectedMeds.map(m => `${m.name} - ${m.dosage}`).join(' | ');
        APP.prescriptions.push({ id: APP.prescriptions.length + 1, patient: patient.split('(')[0].trim(), meds: medsText, notes: document.getElementById('presc_notes').value, doctor: APP.currentUser?.name, date: new Date().toISOString().split('T')[0], dispensed: false });
        closeModal(); showToast('تم إرسال الوصفة للصيدلية', 'success'); saveToFirebase(); navigateTo('prescriptions');
    }

    function viewPrescription(id) {
        const pr = APP.prescriptions.find(x => x.id === id); if (!pr) return;
        openModal(`<div class="modal-header"><h3>تفاصيل الوصفة</h3></div><div class="p-6"><div class="grid grid-cols-2 gap-4 text-sm mb-4"><div><span class="text-gray-500">المريض:</span><p class="font-bold">${pr.patient}</p></div><div><span class="text-gray-500">الطبيب:</span><p class="font-bold">${pr.doctor}</p></div><div><span class="text-gray-500">التاريخ:</span><p class="font-bold">${pr.date}</p></div><div><span class="text-gray-500">الحالة:</span><span class="badge ${pr.dispensed?'bg-green-100 text-success':'bg-yellow-100 text-warning'}">${pr.dispensed?'تم الصرف':'معلق'}</span></div></div><div class="border-t pt-4"><h4 class="font-bold text-olive mb-2">💊 الأدوية</h4><p class="bg-olive50 p-3 rounded">${pr.meds}</p>${pr.notes?`<p class="mt-2 text-sm"><strong>ملاحظات:</strong> ${pr.notes}</p>`:''}</div></div>`);
    }

    function deletePrescription(id) {
        if (confirm('حذف؟')) { APP.prescriptions = APP.prescriptions.filter(x => x.id !== id); showToast('تم الحذف', 'success'); saveToFirebase(); navigateTo('prescriptions'); }
    }

    function dispensePrescription(id) {
        const pr = APP.prescriptions.find(x => x.id === id);
        if (!pr || pr.dispensed) { showToast('مصروفة مسبقاً', 'warning'); return; }
        const medNames = pr.meds.split('|').map(m => m.trim().split(' - ')[0].trim());
        let canDispense = true;
        medNames.forEach(name => {
            const med = APP.medications.find(m => m.name === name || name.includes(m.name));
            if (!med || med.qty <= 0) canDispense = false;
        });
        if (!canDispense) { showToast('المخزون غير كافٍ', 'error'); return; }
        if (!confirm('تأكيد صرف الوصفة وخصم المخزون؟')) return;
        medNames.forEach(name => {
            const med = APP.medications.find(m => m.name === name || name.includes(m.name));
            if (med && med.qty > 0) med.qty--;
        });
        pr.dispensed = true; pr.dispensedBy = APP.currentUser?.name; pr.dispensedDate = new Date().toISOString().split('T')[0];
        APP.pharmacyDispenses.push({ prescriptionId: id, date: pr.dispensedDate, pharmacist: pr.dispensedBy, meds: pr.meds });
        showToast('تم الصرف وتحديث المخزون', 'success'); saveToFirebase(); navigateTo('prescriptions');
    }
</script>

function checkIfAbnormal(result, normalRange) {
    try {
        const [low, high] = normalRange.split('-').map(s => parseFloat(s.trim()));
        const val = parseFloat(result);
        return !isNaN(val) && (val < low || val > high);
    } catch (e) { return false; }
}

window.selectBodyPart = function(part) {
    document.querySelectorAll('.body-part').forEach(el => el.classList.remove('selected'));

    if (el) el.classList.add('selected');
    const hidden = document.getElementById('radiology_selected_part');
    if (hidden) hidden.value = part;
};

function getPartName(part) {
    const names = {head:'الرأس',neck:'الرقبة',chest:'الصدر',abdomen:'البطن',pelvis:'الحوض',right_arm:'الذراع الأيمن',left_arm:'الذراع الأيسر',right_leg:'الساق الأيمن',left_leg:'الساق الأيسر',spine:'العمود الفقري'};
    return names[part] || part;
}

function showAddRadiologyRequestModal() {

function submitRadiologyRequest() {
    const patientVal = document.getElementById('radreq_patient').value;
    const part = document.getElementById('radiology_selected_part').value;
    if (!patientVal) { showToast('اختر مريضاً', 'error'); return; }

    const [patientName, medicalId] = patientVal.split('|');
    APP.radiologyRequests = APP.radiologyRequests || [];
    APP.radiologyRequests.push({
        id: Date.now(),
        patientName,
        medicalId,
        radiologyType: document.getElementById('radreq_type').value,
        bodyPart: part,
        notes: document.getElementById('radreq_notes').value,
        requestedBy: APP.currentUser?.name || 'الطبيب',

    });

        </div>
    </div>`);
}

function saveRadiologyReport(requestId) {
    const req = (APP.radiologyRequests || []).find(r => r.id === requestId);
    if (!req) return;
    const findings = document.getElementById('radrep_findings').value;
    const conclusion = document.getElementById('radrep_conclusion').value;
    if (!findings) { showToast('أدخل النتائج', 'error'); return; }
    req.status = 'completed';
    req.report = findings + (conclusion ? '\nالاستنتاج: ' + conclusion : '');
    APP.radiologyResults = APP.radiologyResults || [];
    APP.radiologyResults.push({
        id: APP.radiologyResults.length + 1,
        patientName: req.patientName,
        type: req.radiologyType,
        bodyPart: req.bodyPart,
        findings: req.report,
        date: new Date().toISOString().split('T')[0],
        technician: APP.currentUser?.name || 'فني الأشعة'
    });
    closeModal();
    showToast('تم حفظ التقرير وإرساله للطبيب', 'success');
    saveToFirebase();
    navigateTo('radiology');
}

    function updateReportPeriod() {
        const type = document.getElementById('reportType').value;
        const today = new Date();
        let start, end;
        if (type === 'monthly') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        } else if (type === 'quarterly') {
            const quarter = Math.floor(today.getMonth() / 3);
            start = new Date(today.getFullYear(), quarter * 3, 1);
            end = new Date(today.getFullYear(), (quarter + 1) * 3, 0);
        } else if (type === 'semiannual') {
            const half = today.getMonth() < 6 ? 0 : 1;
            start = new Date(today.getFullYear(), half * 6, 1);
            end = new Date(today.getFullYear(), (half + 1) * 6, 0);
        } else {
            start = new Date(today.getFullYear(), 0, 1);
            end = new Date(today.getFullYear(), 11, 31);
        }
        document.getElementById('reportStart').value = start.toISOString().split('T')[0];
        document.getElementById('reportEnd').value = end.toISOString().split('T')[0];
    }

        lucide.createIcons();
    }

    function downloadReportPDF() {
        const startDate = document.getElementById('reportStart').value;

        const reportType = document.getElementById('reportType').value;
        let reportTitle = 'تقرير شهري';

    // ==================== قالب PDF موحد (HTML يُطبع) ====================
    function generatePDFTemplate(title, dateFrom, dateTo, reportData, customData = {}) {
        const logoUrl = 'https://i.ibb.co/hJyzcBFf/IMG.jpg';
        const hospitalName = 'المستشفى السعودي الميداني - العبر';
        let bodyContent = '';

            <table>
                <tr><th>الرقم الطبي</th><td>${customData.medicalId||''}</td><th>الاسم</th><td>${customData.patientName||''}</td></tr>
                <tr><th>العمر</th><td>${customData.age||''}</td><th>الجنس</th><td>${customData.gender||''}</td></tr>
                ${customData.diagnosis ? `<tr><th>التشخيص</th><td colspan="3">${customData.diagnosis}</td></tr>` : ''}
                ${customData.treatment ? `<tr><th>العلاج</th><td colspan="3">${customData.treatment}</td></tr>` : ''}
                ${customData.recommendations ? `<tr><th>التوصيات</th><td colspan="3">${customData.recommendations}</td></tr>` : ''}
                ${customData.hospital ? `<tr><th>الجهة المحول إليها</th><td colspan="3">${customData.hospital}</td></tr>` : ''}
                ${customData.reason ? `<tr><th>سبب التحويل</th><td colspan="3">${customData.reason}</td></tr>` : ''}
                ${customData.cause ? `<tr><th>سبب الوفاة</th><td colspan="3">${customData.cause}</td></tr>` : ''}
                ${customData.details ? `<tr><th>تفاصيل</th><td colspan="3">${customData.details}</td></tr>` : ''}
                ${customData.records ? `<tr><th>السجل الطبي</th><td colspan="3">${customData.records}</td></tr>` : ''}
                <tr><th>الطبيب</th><td colspan="3">${customData.doctor||''}</td></tr>
            </table>`;
        } else if (reportData) {
            bodyContent = `<div class="stats-grid">${Object.entries(reportData).map(([k,v]) => `<div class="stat-box"><div class="number">${v}</div><div class="label">${k.replace(/_/g,' ')}</div></div>`).join('')}</div>`;
        }
        return `<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>${title}</title>
        <style>
            body{font-family:'Tajawal',Arial,sans-serif;direction:rtl;padding:40px;background:#f5f5f5}
            .header{background:linear-gradient(135deg,#556B2F,#3D4A1F);color:white;padding:30px;border-radius:10px;margin-bottom:30px;display:flex;align-items:center;gap:20px}
            .header img{width:80px;border-radius:10px}
            .header h1{margin:0;font-size:24px}
            .section{background:white;padding:20px;margin-bottom:20px;border-radius:8px;border-left:4px solid #556B2F}
            table{width:100%;border-collapse:collapse;margin:15px 0}th,td{padding:10px;border:1px solid #ddd;font-size:12px}th{background:#556B2F;color:white;width:25%}
            .footer{text-align:center;margin-top:40px;font-size:11px;color:#666}
            @media print{body{padding:20px;background:white}}
        </style></head><body>
        <div class="header"><img src="${logoUrl}" alt="Logo"><div><h1>${hospitalName}</h1><p>${title} - ${dateFrom} ${dateTo ? ' إلى ' + dateTo : ''}</p></div></div>
        <div class="section">${bodyContent}</div>
        <div class="footer"><p>${hospitalName} | ${new Date().toLocaleDateString('ar-SA')}</p></div>
        </body></html>`;
    }

    function openPDFWindow(content) {
        const win = window.open('', '_blank', 'width=900,height=700');
        win.document.write(content);
        win.document.close();
        win.onload = () => { win.print(); };
        closeModal();
        showToast('تم إنشاء التقرير، جاري الطباعة...', 'success');
    }

    // ==================== التهيئة النهائية ====================
    loadNotifications();
    updateNotifBadge();
    lucide.createIcons();

    // معالجة الأخطاء العامة
    window.onerror = function(msg) {
        if (msg.includes('export') || msg.includes('import')) return true; // كتم أخطاء SDK المفقودة
        console.error(msg);
    };
</script>
</body>
</html>
